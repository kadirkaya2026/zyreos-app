/* ── POS HESAP SAYFASI ── */
function POSPage({customers,banks}){
  const[selDate,setSelDate]=useState(todayStr());
  const fmtLongDate=dateStr=>new Date(dateStr+'T12:00:00').toLocaleDateString('tr-TR',{day:'2-digit',month:'long',year:'numeric',weekday:'long'});

  // Seçilen tarihte bankaya yatacak tüm çekim kayıtları
  const dayEntries=customers.flatMap(c=>
    (c.cariEntries||[]).filter(e=>e.type==='cekim'&&getSettlementDate(e.date)===selDate)
      .map(e=>({...e,customerName:c.name,customerCode:c.code,settlementDate:getSettlementDate(e.date)}))
  );

  // Banka bazında grupla
  const bankMap={};
  dayEntries.forEach(e=>{
    const bankObj=banks.find(b=>b.name===e.bank);
    const taksit=parseInt(e.installment)||1;
    const bankRate=bankObj&&bankObj.rates&&bankObj.rates[taksit-1]!=null?parseFloat(bankObj.rates[taksit-1]):0;
    const bankCut=parseFloat((e.amount*bankRate/100).toFixed(2));
    const netDeposit=parseFloat((e.amount-bankCut).toFixed(2));
    const ownerShare=+(netDeposit*0.01).toFixed(2);
    const customerComm=e.customerComm||0;
    const realProfit=+(customerComm-bankCut-ownerShare).toFixed(2);
    const bankNotFound=!bankObj;
    if(!bankMap[e.bank])bankMap[e.bank]={bank:e.bank,entries:[],totalAmount:0,totalBankCut:0,totalNet:0,totalOwnerShare:0,totalRealProfit:0,hasUnknown:false};
    bankMap[e.bank].entries.push({...e,bankRate,bankCut,netDeposit,ownerShare,customerComm,realProfit,bankNotFound});
    bankMap[e.bank].totalAmount+=e.amount;
    bankMap[e.bank].totalBankCut+=bankCut;
    bankMap[e.bank].totalNet+=netDeposit;
    bankMap[e.bank].totalOwnerShare+=ownerShare;
    bankMap[e.bank].totalRealProfit+=realProfit;
    if(bankNotFound)bankMap[e.bank].hasUnknown=true;
  });
  const bankRows=Object.values(bankMap).sort((a,b)=>b.totalNet-a.totalNet);

  const grandTotal=bankRows.reduce((s,r)=>s+r.totalAmount,0);
  const grandCut=bankRows.reduce((s,r)=>s+r.totalBankCut,0);
  const grandNet=bankRows.reduce((s,r)=>s+r.totalNet,0);
  const grandOwnerShare=bankRows.reduce((s,r)=>s+r.totalOwnerShare,0);
  const grandRealProfit=bankRows.reduce((s,r)=>s+r.totalRealProfit,0);

  const thS={padding:'10px 14px',textAlign:'left',color:'#64748b',fontWeight:600,fontSize:'11px',textTransform:'uppercase',borderBottom:'1px solid rgba(255,255,255,0.07)'};
  const td={padding:'10px 14px'};
  const inS={background:'rgba(30,39,64,.8)',border:'1px solid rgba(255,255,255,.1)',borderRadius:'8px',padding:'8px 12px',color:'#e2e8f0',fontSize:'14px'};

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'20px'}}>

      {/* Tarih Seçici */}
      <Card>
        <div style={{fontWeight:700,fontSize:'15px',marginBottom:'14px'}}>POS Hesap — Bankaya Yatacak Tutar</div>
        <div style={{display:'flex',gap:'14px',alignItems:'flex-end',flexWrap:'wrap'}}>
          <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
            <label style={{fontSize:'11px',color:'#64748b',fontWeight:600}}>Bankaya Yatış Tarihi</label>
            <input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} style={inS}/>
          </div>
          <div style={{padding:'8px 16px',borderRadius:'8px',background:'rgba(79,142,247,0.1)',border:'1px solid rgba(79,142,247,0.25)',color:'#4f8ef7',fontSize:'13px',fontWeight:600}}>
            Gösterilen yatış günü: {fmtLongDate(selDate)}
          </div>
        </div>
      </Card>

      {/* Özet Metrikler */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:'14px'}}>
        <MetricCard label="Toplam POS Çekim" value={fmtTL(grandTotal)} color="#4f8ef7"/>
        <MetricCard label="Toplam Banka Kesintisi" value={fmtTL(grandCut)} color="#ef4444"/>
        <MetricCard label={`Seçilen Gün Yatacak (${bankRows.length} banka)`} value={fmtTL(grandNet)} color="#22c55e" large/>
        <MetricCard label="Şirket Sahibi Payı (%1)" value={fmtTL(grandOwnerShare)} color="#f59e0b"/>
        <MetricCard label="Net Kârım" value={fmtTL(grandRealProfit)} color="#a855f7" large/>
      </div>

      {dayEntries.length===0?(
        <Card style={{textAlign:'center',padding:'60px 20px',color:'#64748b'}}>
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{marginBottom:'12px',opacity:.4}}><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
          <div style={{fontSize:'15px',fontWeight:600,marginBottom:'4px'}}>Bu tarihte yatacak işlem yok</div>
          <div style={{fontSize:'13px'}}>Seçilen tarihte bankaya yatacak kart çekimi bulunamadı</div>
        </Card>
      ):(
        <>
          {/* Banka Bazlı Özet */}
          <Card style={{padding:0,overflow:'hidden'}}>
            <div style={{padding:'14px 18px',borderBottom:'1px solid rgba(255,255,255,0.07)',fontWeight:700,fontSize:'14px'}}>
              Banka Bazlı Tahsilat Özeti
            </div>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
                <thead>
                  <tr>{['Banka','İşlem Adedi','Toplam Çekim','Banka Kesintisi','Yatacak Tutar','Şirket Sahibi Payı','Net Kârım'].map(h=><th key={h} style={thS}>{h}</th>)}</tr>
                </thead>
                <tbody>
                  {bankRows.map(r=>(
                    <tr key={r.bank} style={{borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                      <td style={{...td,fontWeight:700,fontSize:'14px'}}>{r.bank}</td>
                      <td className="tabular-nums" style={{...td,color:'#94a3b8'}}>{r.entries.length}</td>

                      </td>
                      <td className="tabular-nums" style={{...td,fontWeight:700,color:'#22c55e'}}>{fmtTL(r.totalNet)}</td>
                      <td className="tabular-nums" style={{...td,color:'#f59e0b',fontWeight:600}}>
                        <div>{fmtTL(r.totalOwnerShare)}</div>
                        <div style={{fontSize:'11px',color:'#64748b'}}>%1</div>
                      </td>
                      <td className="tabular-nums" style={{...td,fontWeight:800,fontSize:'16px',color:'#a855f7'}}>{fmtTL(r.totalRealProfit)}</td>
                    </tr>
                  ))}
                </tbody>
                <tfoot>
                  <tr style={{background:'rgba(255,255,255,0.03)',borderTop:'2px solid rgba(255,255,255,0.1)'}}>
                    <td colSpan={2} style={{...td,color:'#94a3b8',fontWeight:700,fontSize:'12px',textTransform:'uppercase'}}>Toplam ({dayEntries.length} işlem)</td>
                    <td className="tabular-nums" style={{...td,color:'#4f8ef7',fontWeight:800}}>{fmtTL(grandTotal)}</td>
                    <td className="tabular-nums" style={{...td,color:'#ef4444',fontWeight:800}}>{fmtTL(grandCut)}</td>
                    <td className="tabular-nums" style={{...td,color:'#22c55e',fontWeight:800}}>{fmtTL(grandNet)}</td>
                    <td className="tabular-nums" style={{...td,color:'#f59e0b',fontWeight:800}}>{fmtTL(grandOwnerShare)}</td>
                    <td className="tabular-nums" style={{...td,color:'#a855f7',fontWeight:800,fontSize:'16px'}}>{fmtTL(grandRealProfit)}</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </Card>

          {/* İşlem Detayları — banka bazlı */}
          {bankRows.map(r=>(
            <Card key={r.bank} style={{padding:0,overflow:'hidden'}}>
              <div style={{padding:'12px 18px',borderBottom:'1px solid rgba(255,255,255,0.07)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontWeight:700,fontSize:'13px'}}>{r.bank} — İşlem Detayları</span>
                <div style={{display:'flex',gap:'10px',alignItems:'center'}}>
                  <span style={{color:'#64748b',fontSize:'12px'}}>{r.entries.length} işlem</span>
                  <Badge color="#22c55e">Yatacak: {fmtTL(r.totalNet)}</Badge>
                </div>
              </div>
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px'}}>
                  <thead>
                    <tr>{['Müşteri','Çekim / Yatış','Taksit','Banka Oranı','Çekim Tutarı','Banka Kesintisi','Net Yatacak'].map(h=><th key={h} style={{...thS,fontSize:'10px'}}>{h}</th>)}</tr>

/* ── KAR ANALİZİ SAYFASI ── */
function ProfitPage({customers,companies}){
  const[dateFrom,setDateFrom]=useState('');
  const[dateTo,setDateTo]=useState('');
  const[filterCustomer,setFilterCustomer]=useState('');
  const[profitTab,setProfitTab]=useState('kar');
  const[rptCompany,setRptCompany]=useState('');
  const[rptFrom,setRptFrom]=useState('');
  const[rptTo,setRptTo]=useState('');

  // Tüm çekim kayıtları (müşteri adıyla birleştirilmiş)
  const allCekim=customers.flatMap(c=>
    (c.cariEntries||[]).filter(e=>e.type==='cekim').map(e=>({
      ...e,customerName:c.name,customerCode:c.code,customerId:c.id
    }))
  ).sort((a,b)=>a.date.localeCompare(b.date));

  // Filtrele
  const rows=allCekim.filter(r=>{
    if(dateFrom&&r.date<dateFrom)return false;
    if(dateTo&&r.date>dateTo)return false;
    if(filterCustomer&&r.customerId!==filterCustomer)return false;
    return true;
  });

  const totalC=rows.reduce((s,r)=>s+r.amount,0);
  const totalKom=rows.reduce((s,r)=>s+(r.customerComm||0),0);
  const totalBank=rows.reduce((s,r)=>s+(r.bankCost||0),0);
  const totalOwner=rows.reduce((s,r)=>s+(((r.amount-(r.bankCost||0))*0.01).toFixed(2)*1),0);
  const totalNet=rows.reduce((s,r)=>{
    const ownerShare=+((r.amount-(r.bankCost||0))*0.01).toFixed(2);
    return s+(r.profit||0)-ownerShare;
  },0);
  const totals={totalC,totalKom,totalBank,totalOwner,totalNet};

  // Müşteri bazlı özet
  const custMap={};
  rows.forEach(r=>{
    const ownerShare=+((r.amount-(r.bankCost||0))*0.01).toFixed(2);
    const realProfit=(r.profit||0)-ownerShare;
    if(!custMap[r.customerId])custMap[r.customerId]={id:r.customerId,name:r.customerName,code:r.customerCode,cnt:0,totalC:0,kom:0,bank:0,profit:0};
    custMap[r.customerId].cnt++;
    custMap[r.customerId].totalC+=r.amount;
    custMap[r.customerId].kom+=(r.customerComm||0);
    custMap[r.customerId].bank+=(r.bankCost||0);
    custMap[r.customerId].profit+=realProfit;
  });
  const custStats=Object.values(custMap).map(r=>({...r,margin:r.totalC>0?+(r.profit/r.totalC*100).toFixed(2):0})).sort((a,b)=>b.profit-a.profit);

  // Banka bazlı özet
  const bankMap={};
  rows.forEach(r=>{
    if(!bankMap[r.bank])bankMap[r.bank]={bank:r.bank,cnt:0,totalC:0,bankCost:0};
    bankMap[r.bank].cnt++;bankMap[r.bank].totalC+=r.amount;bankMap[r.bank].bankCost+=(r.bankCost||0);
  });
  const bankStats=Object.values(bankMap).map(b=>({...b,avgPct:b.totalC>0?+(b.bankCost/b.totalC*100).toFixed(2):0})).sort((a,b)=>b.bankCost-a.bankCost);

  const s={padding:'10px 14px'};
  const thS={padding:'10px 14px',textAlign:'left',color:'#64748b',fontWeight:600,fontSize:'11px',textTransform:'uppercase',borderBottom:'1px solid rgba(255,255,255,0.07)'};

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'20px'}}>

      {/* Tab Seçimi */}
      <div style={{display:'flex',gap:'0',marginBottom:'4px'}}>
        <button onClick={()=>setProfitTab('kar')} style={{padding:'10px 20px',borderRadius:'8px 8px 0 0',border:'none',background:profitTab==='kar'?'rgba(79,142,247,0.15)':'transparent',color:profitTab==='kar'?'#4f8ef7':'#64748b',cursor:'pointer',fontWeight:profitTab==='kar'?700:500,fontSize:'13px'}}>Kar Analizi</button>
        <button onClick={()=>setProfitTab('sirket')} style={{padding:'10px 20px',borderRadius:'8px 8px 0 0',border:'none',background:profitTab==='sirket'?'rgba(79,142,247,0.15)':'transparent',color:profitTab==='sirket'?'#4f8ef7':'#64748b',cursor:'pointer',fontWeight:profitTab==='sirket'?700:500,fontSize:'13px'}}>Şirket Raporu</button>
      </div>

      {profitTab==='kar'&&(<>

      {/* Filtreler + PDF */}
      <Card>
        <div style={{display:'flex',gap:'12px',flexWrap:'wrap',alignItems:'flex-end'}}>
          <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
            <label style={{fontSize:'11px',color:'#64748b',fontWeight:600}}>Başlangıç Tarihi</label>
            <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}
              style={{background:'rgba(30,39,64,.8)',border:'1px solid rgba(255,255,255,.1)',borderRadius:'8px',padding:'8px 12px',color:'#e2e8f0',fontSize:'13px'}}/>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
            <label style={{fontSize:'11px',color:'#64748b',fontWeight:600}}>Bitiş Tarihi</label>
            <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}
              style={{background:'rgba(30,39,64,.8)',border:'1px solid rgba(255,255,255,.1)',borderRadius:'8px',padding:'8px 12px',color:'#e2e8f0',fontSize:'13px'}}/>
          </div>

              <option value="">Tüm Müşteriler</option>
              {customers.map(c=><option key={c.id} value={c.id}>{c.code} — {c.name}</option>)}

            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="14 2 14 9 21 9"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 18 15 15"/></svg>

        <MetricCard label="Müşteri Komisyonu" value={fmtTL(totalKom)} color="#a855f7"/>
        <MetricCard label="Banka Maliyeti" value={fmtTL(totalBank)} color="#ef4444"/>

                <label style={{fontSize:'11px',color:'#64748b',fontWeight:600}}>Şirket Seç</label>
                <select value={rptCompany} onChange={e=>setRptCompany(e.target.value)} style={{background:'rgba(30,39,64,.8)',border:'1px solid rgba(255,255,255,.1)',borderRadius:'8px',padding:'8px 12px',color:'#e2e8f0',fontSize:'13px',minWidth:'200px'}}>
                  <option value="">— Tüm Şirketler —</option>
                  {(companies||[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
                <label style={{fontSize:'11px',color:'#64748b',fontWeight:600}}>Başlangıç</label>
                <input type="date" value={rptFrom} onChange={e=>setRptFrom(e.target.value)} style={{background:'rgba(30,39,64,.8)',border:'1px solid rgba(255,255,255,.1)',borderRadius:'8px',padding:'8px 12px',color:'#e2e8f0',fontSize:'13px'}}/>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
                <label style={{fontSize:'11px',color:'#64748b',fontWeight:600}}>Bitiş</label>
                <input type="date" value={rptTo} onChange={e=>setRptTo(e.target.value)} style={{background:'rgba(30,39,64,.8)',border:'1px solid rgba(255,255,255,.1)',borderRadius:'8px',padding:'8px 12px',color:'#e2e8f0',fontSize:'13px'}}/>
              </div>
            </div>
          </Card>

          {(()=>{
            const today=todayStr();
            const tomorrow=addBusinessDays(today,1);
            const dayAfter=addBusinessDays(today,2);

            const companyEntries=customers.flatMap(c=>
              (c.cariEntries||[]).filter(e=>e.type==='cekim'&&e.companyId).map(e=>({...e,customerName:c.name}))
            ).filter(e=>{
              if(rptCompany&&e.companyId!==rptCompany)return false;
              if(rptFrom&&e.date<rptFrom)return false;
              if(rptTo&&e.date>rptTo)return false;
              return true;
            });

            const getCompanyValor=(compId)=>{const comp=(companies||[]).find(c=>c.id===compId);return comp?comp.valorDays:1;};

            const withSettlement=companyEntries.map(e=>{
              const valor=getCompanyValor(e.companyId);
              const settlementDate=e.settlementDate||(e.posType==='fiziki'?addCalendarDays(e.date,1):addBusinessDays(e.date,valor));
              const netAmount=e.amount-(e.bankCost||0);
              return{...e,settlementDate,netAmount};
            });

            const todayTotal=withSettlement.filter(e=>e.settlementDate===today).reduce((s,e)=>s+e.netAmount,0);
            const tomorrowTotal=withSettlement.filter(e=>e.settlementDate===tomorrow).reduce((s,e)=>s+e.netAmount,0);
            const dayAfterTotal=withSettlement.filter(e=>e.settlementDate===dayAfter).reduce((s,e)=>s+e.netAmount,0);

            return(
              <>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:'14px'}}>
                  <MetricCard label={'Bugün Yatacak ('+fmtDate(today)+')'} value={fmtTL(todayTotal)} color="#22c55e" large/>
                  <MetricCard label={'Yarın Yatacak ('+fmtDate(tomorrow)+')'} value={fmtTL(tomorrowTotal)} color="#4f8ef7"/>
                  <MetricCard label={'Ertesi Gün ('+fmtDate(dayAfter)+')'} value={fmtTL(dayAfterTotal)} color="#f59e0b"/>
                </div>

                {withSettlement.length>0&&(
                  <Card style={{padding:0,overflow:'hidden'}}>
                    <div style={{padding:'14px 18px',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
                      <span style={{fontWeight:700,fontSize:'14px'}}>Detaylı Çekim & Yatma Tablosu ({withSettlement.length} işlem)</span>
                    </div>
                    <div style={{overflowX:'auto'}}>
                      <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
                        <thead>
                          <tr>
                            {['Çekim Tarihi','Müşteri','Şirket','Tutar','Taksit','POS Kesintisi','Net Yatacak','Yatma Tarihi'].map(h=>
                              <th key={h} style={{padding:'10px 14px',textAlign:'left',color:'#64748b',fontWeight:600,fontSize:'11px',textTransform:'uppercase',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>{h}</th>
                            )}
                          </tr>
                        </thead>
                        <tbody>
                          {withSettlement.sort((a,b)=>a.settlementDate.localeCompare(b.settlementDate)).map(e=>{
                            const isToday=e.settlementDate===today;
                            return(
                              <tr key={e.id} style={{borderBottom:'1px solid rgba(255,255,255,0.04)',background:isToday?'rgba(34,197,94,0.05)':'transparent'}}>
                                <td className="tabular-nums" style={{padding:'10px 14px',color:'#94a3b8'}}>{fmtDate(e.date)}</td>
                                <td style={{padding:'10px 14px',fontWeight:600}}>{e.customerName}</td>
                                <td style={{padding:'10px 14px',color:'#a855f7'}}>{e.companyName||'—'}</td>
                                <td className="tabular-nums" style={{padding:'10px 14px',color:'#4f8ef7',fontWeight:600}}>{fmtTL(e.amount)}</td>
                                <td style={{padding:'10px 14px',textAlign:'center'}}>{e.installment===1?'Peşin':e.installment+' Taksit'}</td>
                                <td className="tabular-nums" style={{padding:'10px 14px',color:'#ef4444'}}>{fmtTL(e.bankCost||0)}</td>
                                <td className="tabular-nums" style={{padding:'10px 14px',color:'#22c55e',fontWeight:700}}>{fmtTL(e.netAmount)}</td>
                                <td className="tabular-nums" style={{padding:'10px 14px',fontWeight:600,color:isToday?'#22c55e':'#e2e8f0'}}>{fmtDate(e.settlementDate)}{isToday&&' ✓'}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </Card>
                )}
                {withSettlement.length===0&&(
                  <div style={{textAlign:'center',padding:'60px',color:'#64748b'}}>
                    <div style={{fontSize:'15px',fontWeight:600}}>Şirket üzerinden yapılmış çekim bulunamadı</div>
                    <div style={{fontSize:'13px',marginTop:'4px'}}>Çekim girişinde şirket seçerek rapor oluşturabilirsiniz</div>
                  </div>
                )}
              </>
            );
          })()}
        </div>
      )}

    </div>
  );
}

/* ── ŞİRKETLER PAGE ── */
function CompaniesPage({companies,onUpdateCompanies}){
  const[editId,setEditId]=useState(null);
  const[modalOpen,setModalOpen]=useState(false);
  const[form,setForm]=useState({name:'',valorDays:1,posTypes:{sanal:true,fiziki:false},fizikiRate:'',bankRates:INIT_BANKS.map(b=>({bankName:b.name,sanalRates:Array(12).fill(0),fizikiRate:0}))});
  const[openBank,setOpenBank]=useState(null);
  const[fillAllVal,setFillAllVal]=useState({});

  const resetForm=()=>{
    setForm({name:'',valorDays:1,posTypes:{sanal:true,fiziki:false},fizikiRate:'',bankRates:INIT_BANKS.map(b=>({bankName:b.name,sanalRates:Array(12).fill(0),fizikiRate:0}))});
    setEditId(null);setOpenBank(null);setFillAllVal({});
  };

  const openNew=()=>{resetForm();setModalOpen(true);};

  const migrateCompany=(c)=>{
    if(c.bankRates&&c.bankRates.length>0)return c;
    const oldRates=c.rates||Array(12).fill(0);
    return{...c,bankRates:INIT_BANKS.map(b=>({bankName:b.name,sanalRates:[...oldRates],fizikiRate:parseFloat(oldRates[0])||0}))};
  };

  const openEdit=(c)=>{
    const mc=migrateCompany(c);
    setEditId(c.id);
    const bankRates=INIT_BANKS.map(b=>{
      const found=(mc.bankRates||[]).find(br=>br.bankName===b.name);
      return found?{...found}:{bankName:b.name,sanalRates:Array(12).fill(0),fizikiRate:0};
    });
    const frFound=bankRates.find(b=>parseFloat(b.fizikiRate)>0);
    const fr=frFound?frFound.fizikiRate:(bankRates[0]?bankRates[0].fizikiRate:0);
    setForm({name:mc.name,valorDays:mc.valorDays||1,posTypes:mc.posTypes||{sanal:true,fiziki:true},fizikiRate:fr?String(fr):'',bankRates});
    setFillAllVal({});
    setModalOpen(true);
  };

  const handleSave=()=>{
    if(!form.name.trim())return alert('Şirket adı giriniz.');
    if(!form.posTypes.sanal&&!form.posTypes.fiziki)return alert('En az bir POS tipi seçiniz (Sanal ve/veya Fiziki).');
    const fizikiVal=parseFloat(form.fizikiRate)||0;
    if(form.posTypes.fiziki&&!fizikiVal)return alert('Fiziki POS çekim oranı giriniz.');
    const bankRates=form.bankRates.map(br=>({...br,sanalRates:br.sanalRates.map(r=>parseFloat(r)||0),fizikiRate:fizikiVal}));
    if(editId){
      onUpdateCompanies(prev=>prev.map(c=>c.id===editId?{...c,name:form.name.trim(),valorDays:form.valorDays,posTypes:{...form.posTypes},bankRates}:c));
    }else{
      onUpdateCompanies(prev=>[...prev,{id:uid(),name:form.name.trim(),valorDays:form.valorDays,posTypes:{...form.posTypes},bankRates,createdAt:new Date().toISOString()}]);
    }
    resetForm();
    setModalOpen(false);
  };

  const handleDelete=(id)=>{
    if(!window.confirm('Bu şirketi silmek istediğinizden emin misiniz?'))return;
    onUpdateCompanies(prev=>prev.filter(c=>c.id!==id));
    if(editId===id)resetForm();
  };

  const setSanalRate=(bankIdx,rateIdx,val)=>{
    setForm(f=>{
      const br=[...f.bankRates];
      br[bankIdx]={...br[bankIdx],sanalRates:[...br[bankIdx].sanalRates]};
      br[bankIdx].sanalRates[rateIdx]=val;
      return{...f,bankRates:br};
    });
  };

  const handleFillAllForBank=(bankIdx)=>{
    const v=parseFloat(fillAllVal[bankIdx])||0;
    setForm(f=>{
      const br=[...f.bankRates];
      br[bankIdx]={...br[bankIdx],sanalRates:Array(12).fill(v)};
      return{...f,bankRates:br};
    });
  };

  const inS={background:'rgba(30,39,64,.8)',border:'1px solid rgba(255,255,255,.1)',borderRadius:'8px',padding:'8px 12px',color:'#e2e8f0',fontSize:'13px',width:'100%',boxSizing:'border-box'};
  const bankColor=(name)=>{const b=INIT_BANKS.find(x=>x.name===name);return b?b.color:'#94a3b8';};

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'20px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'12px'}}>
        <h2 style={{fontWeight:800,fontSize:'20px'}}>Şirketler (POS Yönetimi)</h2>
        <button onClick={openNew}
          style={{display:'flex',alignItems:'center',gap:'6px',background:'#4f8ef7',border:'none',borderRadius:'8px',padding:'10px 20px',color:'#fff',cursor:'pointer',fontWeight:700,fontSize:'13px'}}>
          + Yeni Şirket Ekle
        </button>
      </div>

      <Modal open={modalOpen} onClose={()=>{setModalOpen(false);resetForm();}} title={editId?'Şirket Düzenle':'Yeni Şirket Ekle'} width={720}>
        <div style={{display:'flex',gap:'12px',flexWrap:'wrap',marginBottom:'16px'}}>
          <div style={{display:'flex',flexDirection:'column',gap:'4px',flex:1,minWidth:'200px'}}>
            <label style={{fontSize:'11px',color:'#64748b',fontWeight:600}}>Şirket Adı</label>
            <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Örn: XYZ Ödeme A.Ş." style={inS}/>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'4px',minWidth:'200px'}}>
            <label style={{fontSize:'11px',color:'#64748b',fontWeight:600}}>POS Tipi (birden fazla seçilebilir)</label>
            <div style={{display:'flex',gap:'12px',marginTop:'4px'}}>
              <label style={{display:'flex',alignItems:'center',gap:'6px',cursor:'pointer',fontSize:'13px',color:form.posTypes.sanal?'#4f8ef7':'#94a3b8',fontWeight:form.posTypes.sanal?700:400}}>
                <input type="checkbox" checked={form.posTypes.sanal} onChange={e=>setForm(f=>({...f,posTypes:{...f.posTypes,sanal:e.target.checked}}))} style={{accentColor:'#4f8ef7'}}/>
                Sanal POS
              </label>
              <label style={{display:'flex',alignItems:'center',gap:'6px',cursor:'pointer',fontSize:'13px',color:form.posTypes.fiziki?'#f59e0b':'#94a3b8',fontWeight:form.posTypes.fiziki?700:400}}>
                <input type="checkbox" checked={form.posTypes.fiziki} onChange={e=>setForm(f=>({...f,posTypes:{...f.posTypes,fiziki:e.target.checked}}))} style={{accentColor:'#f59e0b'}}/>
                Fiziki POS
              </label>
            </div>
          </div>
          {form.posTypes.sanal&&(
          <div style={{display:'flex',flexDirection:'column',gap:'4px',minWidth:'240px'}}>
            <label style={{fontSize:'11px',color:'#64748b',fontWeight:600}}>Sanal POS Valör (Ödeme Süresi)</label>
            <div style={{display:'flex',gap:'8px',marginTop:'4px'}}>
              <label style={{display:'flex',alignItems:'center',gap:'6px',cursor:'pointer',fontSize:'13px',color:form.valorDays===1?'#4f8ef7':'#94a3b8',fontWeight:form.valorDays===1?700:400}}>
                <input type="radio" name="valor" checked={form.valorDays===1} onChange={()=>setForm(f=>({...f,valorDays:1}))} style={{accentColor:'#4f8ef7'}}/>
                Ertesi İş Günü
              </label>
              <label style={{display:'flex',alignItems:'center',gap:'6px',cursor:'pointer',fontSize:'13px',color:form.valorDays===2?'#4f8ef7':'#94a3b8',fontWeight:form.valorDays===2?700:400}}>
                <input type="radio" name="valor" checked={form.valorDays===2} onChange={()=>setForm(f=>({...f,valorDays:2}))} style={{accentColor:'#4f8ef7'}}/>
                2 İş Günü
              </label>
            </div>
          </div>
          )}
        </div>

        {form.posTypes.fiziki&&(
        <div style={{background:'#131929',borderRadius:'10px',border:'1px solid rgba(245,158,11,0.25)',padding:'14px 16px',marginBottom:'16px',display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap'}}>
          <label style={{fontSize:'13px',color:'#f59e0b',fontWeight:700,whiteSpace:'nowrap'}}>Fiziki POS Çekim Oranı (%)</label>
          <input type="number" step="0.01" min="0" value={form.fizikiRate} onChange={e=>setForm(f=>({...f,fizikiRate:e.target.value}))} placeholder="Örn: 1.49"
            style={{...inS,width:'110px',padding:'7px 10px',fontSize:'13px',borderColor:'rgba(245,158,11,0.35)'}}/>
          <span style={{fontSize:'11px',color:'#64748b'}}>Tüm bankalar için geçerli tek oran — her zaman ertesi gün yatar (haftasonu dahil)</span>
        </div>
        )}

        {form.posTypes.sanal&&(<>
        <div style={{fontSize:'12px',color:'#94a3b8',marginBottom:'12px',fontWeight:600}}>Banka Bazlı Sanal POS Komisyon Oranları — Her bankayı genişletip oranları girin</div>
        <div style={{display:'flex',flexDirection:'column',gap:'6px',marginBottom:'16px',maxHeight:'45vh',overflowY:'auto'}}>
          {form.bankRates.map((br,bi)=>(
            <div key={br.bankName} style={{background:'#131929',borderRadius:'10px',border:'1px solid rgba(255,255,255,0.06)',overflow:'hidden',flexShrink:0}}>
              <button onClick={()=>setOpenBank(openBank===bi?null:bi)} style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',background:'none',border:'none',cursor:'pointer',color:'#e2e8f0'}}>
                <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                  <div style={{width:'10px',height:'10px',borderRadius:'50%',background:bankColor(br.bankName)}}/>
                  <span style={{fontWeight:600,fontSize:'14px'}}>{br.bankName}</span>
                </div>
                <span style={{color:'#64748b',transform:openBank===bi?'rotate(180deg)':'none',transition:'transform 0.2s',fontSize:'14px'}}>▾</span>
              </button>
              {openBank===bi&&(
                <div style={{padding:'0 16px 16px',borderTop:'1px solid rgba(255,255,255,0.06)'}}>
                  <div style={{marginTop:'14px',marginBottom:'12px'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
                      <label style={{fontSize:'12px',color:'#64748b',fontWeight:600}}>Sanal POS Taksit Oranları (%)</label>
                      <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                        <input type="number" step="0.01" min="0" placeholder="Oran" value={fillAllVal[bi]||''} onChange={e=>setFillAllVal(p=>({...p,[bi]:e.target.value}))}
                          style={{...inS,width:'80px',padding:'5px 8px',fontSize:'12px'}}/>
                        <button onClick={()=>handleFillAllForBank(bi)} style={{padding:'5px 12px',borderRadius:'6px',border:'1px solid rgba(79,142,247,0.3)',background:'rgba(79,142,247,0.1)',color:'#4f8ef7',cursor:'pointer',fontSize:'11px',fontWeight:600,whiteSpace:'nowrap'}}>Tümüne Uygula</button>
                      </div>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:'6px'}}>
                      {br.sanalRates.map((r,ri)=>(
                        <div key={ri} style={{display:'flex',flexDirection:'column',gap:'2px'}}>
                          <label style={{fontSize:'10px',color:'#64748b',fontWeight:600,textAlign:'center'}}>{ri===0?'Peşin':(ri+1)+' Taksit'}</label>
                          <input type="number" step="0.01" min="0" value={r} onChange={e=>setSanalRate(bi,ri,e.target.value)}
                            style={{...inS,textAlign:'center',padding:'5px 4px',fontSize:'12px'}}/>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
        </>)}

        <div style={{display:'flex',gap:'8px',justifyContent:'flex-end'}}>
          <button onClick={()=>{setModalOpen(false);resetForm();}}
            style={{padding:'10px 20px',borderRadius:'8px',border:'1px solid rgba(255,255,255,0.1)',background:'transparent',color:'#94a3b8',cursor:'pointer',fontWeight:600,fontSize:'13px'}}>
            İptal
          </button>
          <button onClick={handleSave}
            style={{display:'flex',alignItems:'center',gap:'6px',background:'#4f8ef7',border:'none',borderRadius:'8px',padding:'10px 20px',color:'#fff',cursor:'pointer',fontWeight:700,fontSize:'13px'}}>
            {editId?'Güncelle':'Kaydet'}
          </button>
        </div>
      </Modal>

      {companies.length>0&&(
        <Card style={{padding:0,overflow:'hidden'}}>
          <div style={{padding:'14px 18px',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
            <span style={{fontWeight:700,fontSize:'14px'}}>Kayıtlı Şirketler ({companies.length})</span>
          </div>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
              <thead>
                <tr>
                  <th style={{padding:'10px 14px',textAlign:'left',color:'#64748b',fontWeight:600,fontSize:'11px',textTransform:'uppercase',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>Şirket Adı</th>
                  <th style={{padding:'10px 14px',textAlign:'center',color:'#64748b',fontWeight:600,fontSize:'11px',textTransform:'uppercase',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>Valör</th>
                  <th style={{padding:'10px 14px',textAlign:'center',color:'#64748b',fontWeight:600,fontSize:'11px',textTransform:'uppercase',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>POS Tipi</th>
                  <th style={{padding:'10px 14px',textAlign:'right',color:'#64748b',fontWeight:600,fontSize:'11px',textTransform:'uppercase',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>İşlem</th>
                </tr>
              </thead>
              <tbody>
                {companies.map(c=>{
                  const mc=migrateCompany(c);
                  return(
                    <tr key={c.id} style={{borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                      <td style={{padding:'10px 14px',fontWeight:600}}>{c.name}</td>
                      <td style={{padding:'10px 14px',textAlign:'center'}}>
                        <span style={{padding:'3px 10px',borderRadius:'12px',fontSize:'11px',fontWeight:700,
                          background:c.valorDays===1?'rgba(34,197,94,0.15)':'rgba(245,158,11,0.15)',
                          color:c.valorDays===1?'#22c55e':'#f59e0b'}}>
                          {c.valorDays===1?'Ertesi İş Günü':'2 İş Günü'}
                        </span>
                      </td>
                      <td style={{padding:'10px 14px',textAlign:'center'}}>
                        {(mc.posTypes?mc.posTypes.sanal:true)&&<span style={{padding:'3px 8px',borderRadius:'12px',fontSize:'11px',fontWeight:600,background:'rgba(79,142,247,0.1)',color:'#4f8ef7',marginRight:'4px'}}>Sanal</span>}
                        {(mc.posTypes?mc.posTypes.fiziki:true)&&<span style={{padding:'3px 8px',borderRadius:'12px',fontSize:'11px',fontWeight:600,background:'rgba(245,158,11,0.1)',color:'#f59e0b'}}>Fiziki</span>}
                      </td>
                      <td style={{padding:'10px 14px',textAlign:'right'}}>
                        <div style={{display:'flex',gap:'6px',justifyContent:'flex-end'}}>
                          <button onClick={()=>openEdit(c)} style={{background:'none',border:'1px solid rgba(79,142,247,0.25)',borderRadius:'6px',padding:'5px 10px',cursor:'pointer',color:'#4f8ef7',fontSize:'11px',fontWeight:600}}>Düzenle</button>
                          <button onClick={()=>handleDelete(c.id)} style={{background:'none',border:'1px solid rgba(239,68,68,0.25)',borderRadius:'6px',padding:'5px 10px',cursor:'pointer',color:'#ef4444',fontSize:'11px',fontWeight:600}}>Sil</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </Card>
      )}

      {companies.length===0&&(
        <div style={{textAlign:'center',padding:'60px 20px',color:'#64748b'}}>
          <div style={{fontSize:'40px',marginBottom:'12px'}}>🏢</div>
          <div style={{fontSize:'16px',fontWeight:600,marginBottom:'6px'}}>Henüz şirket eklenmedi</div>
          <div style={{fontSize:'13px'}}>"+ Yeni Şirket Ekle" butonu ile şirket ekleyebilirsiniz</div>
        </div>
      )}
    </div>
  );
}

/* ── GİDERLER PAGE ── */
function ExpensesPage({expenses,onUpdateExpenses,kasa,onUpdateKasa}){
  const today=todayStr();
  const[form,setForm]=useState({date:today,description:'',amount:''});
  const[editId,setEditId]=useState(null);
  const[dateFrom,setDateFrom]=useState('');
  const[dateTo,setDateTo]=useState('');

  const resetForm=()=>{setForm({date:today,description:'',amount:''});setEditId(null);};

  const handleSave=()=>{
    const amt=parseFloat(form.amount)||0;
    if(!amt)return alert('Tutar giriniz.');
    if(!form.description.trim())return alert('Açıklama giriniz.');
    if(editId){
      onUpdateExpenses(prev=>prev.map(e=>e.id===editId?{...e,date:form.date,description:form.description.trim(),amount:amt}:e));
    }else{
      const expId=uid();
      onUpdateExpenses(prev=>[...prev,{id:expId,date:form.date,description:form.description.trim(),amount:amt,createdAt:new Date().toISOString()}]);
      // Kasaya çıkış ekle
      if(onUpdateKasa){
        const kasaEntry={id:uid(),date:form.date,type:'cikis',amount:amt,description:'Gider: '+form.description.trim(),auto:true,expenseId:expId};
        onUpdateKasa(prev=>({...prev,transactions:[...(prev.transactions||[]),kasaEntry]}));
      }
    }
    resetForm();
  };

  const handleDelete=(id)=>{
    if(!window.confirm('Bu gideri silmek istediğinize emin misiniz?'))return;
    onUpdateExpenses(prev=>prev.filter(e=>e.id!==id));
    // İlgili kasa kaydını da sil
    if(onUpdateKasa){
      onUpdateKasa(prev=>({...prev,transactions:(prev.transactions||[]).filter(t=>t.expenseId!==id)}));
    }
    if(editId===id)resetForm();
  };

  const filtered=expenses.filter(e=>{
    if(dateFrom&&e.date<dateFrom)return false;
    if(dateTo&&e.date>dateTo)return false;
    return true;
  }).sort((a,b)=>b.date.localeCompare(a.date));

  const totalExpenses=filtered.reduce((s,e)=>s+e.amount,0);

  const inS={background:'rgba(30,39,64,.8)',border:'1px solid rgba(255,255,255,.1)',borderRadius:'8px',padding:'8px 12px',color:'#e2e8f0',fontSize:'13px',width:'100%',boxSizing:'border-box'};

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'20px'}}>
      <h2 style={{fontWeight:800,fontSize:'20px'}}>Giderler</h2>

      <Card>
        <div style={{fontWeight:700,fontSize:'15px',marginBottom:'16px'}}>{editId?'Gider Düzenle':'Yeni Gider Ekle'}</div>
        <div style={{display:'flex',gap:'12px',flexWrap:'wrap',alignItems:'flex-end'}}>
          <div style={{display:'flex',flexDirection:'column',gap:'4px',minWidth:'140px'}}>
            <label style={{fontSize:'11px',color:'#64748b',fontWeight:600}}>Tarih</label>
            <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={inS}/>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'4px',flex:1,minWidth:'200px'}}>
            <label style={{fontSize:'11px',color:'#64748b',fontWeight:600}}>Açıklama</label>
            <input value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Kira, maaş, fatura..." style={inS}/>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'4px',minWidth:'120px'}}>
            <label style={{fontSize:'11px',color:'#64748b',fontWeight:600}}>Tutar (₺)</label>
            <input type="number" step="0.01" min="0" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} placeholder="0.00" style={inS}/>
          </div>
          <div style={{display:'flex',gap:'8px'}}>
            <button onClick={handleSave} style={{background:'#ef4444',border:'none',borderRadius:'8px',padding:'10px 20px',color:'#fff',cursor:'pointer',fontWeight:700,fontSize:'13px'}}>
              {editId?'Güncelle':'Ekle'}
            </button>
            {editId&&<button onClick={resetForm} style={{padding:'10px 20px',borderRadius:'8px',border:'1px solid rgba(255,255,255,0.1)',background:'transparent',color:'#94a3b8',cursor:'pointer',fontWeight:600,fontSize:'13px'}}>İptal</button>}
          </div>
        </div>
      </Card>

      <div style={{display:'flex',gap:'14px',flexWrap:'wrap'}}>
        <div style={{background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',borderRadius:'12px',padding:'20px 28px',minWidth:'200px'}}>
          <div style={{fontSize:'12px',color:'#94a3b8',marginBottom:'6px'}}>Toplam Gider</div>
          <div style={{fontSize:'24px',fontWeight:800,color:'#ef4444'}}>{fmtTL(totalExpenses)}</div>
        </div>
        <div style={{display:'flex',gap:'10px',alignItems:'flex-end',flexWrap:'wrap'}}>
          <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
            <label style={{fontSize:'11px',color:'#64748b',fontWeight:600}}>Başlangıç</label>
            <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={{...inS,width:'auto'}}/>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
            <label style={{fontSize:'11px',color:'#64748b',fontWeight:600}}>Bitiş</label>
            <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} style={{...inS,width:'auto'}}/>
          </div>
          {(dateFrom||dateTo)&&<button onClick={()=>{setDateFrom('');setDateTo('');}} style={{padding:'8px 14px',borderRadius:'8px',border:'1px solid rgba(239,68,68,.3)',background:'rgba(239,68,68,.1)',color:'#ef4444',cursor:'pointer',fontSize:'12px',fontWeight:600}}>Temizle</button>}
        </div>
      </div>

      {filtered.length>0?(
        <Card style={{padding:0,overflow:'hidden'}}>
          <div style={{padding:'14px 18px',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
            <span style={{fontWeight:700,fontSize:'14px'}}>Gider Kayıtları ({filtered.length})</span>
          </div>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
              <thead>
                <tr>
                  {['Tarih','Açıklama','Tutar','İşlem'].map(h=>
                    <th key={h} style={{padding:'10px 14px',textAlign:h==='Tutar'?'right':'left',color:'#64748b',fontWeight:600,fontSize:'11px',textTransform:'uppercase',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>{h}</th>
                  )}
                </tr>
              </thead>
              <tbody>
                {filtered.map(e=>(
                  <tr key={e.id} style={{borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                    <td className="tabular-nums" style={{padding:'10px 14px',color:'#94a3b8'}}>{fmtDate(e.date)}</td>
                    <td style={{padding:'10px 14px',fontWeight:600}}>{e.description}</td>
                    <td className="tabular-nums" style={{padding:'10px 14px',textAlign:'right',color:'#ef4444',fontWeight:700}}>{fmtTL(e.amount)}</td>
                    <td style={{padding:'10px 14px'}}>
                      <div style={{display:'flex',gap:'6px'}}>
                        <button onClick={()=>{setEditId(e.id);setForm({date:e.date,description:e.description,amount:String(e.amount)});}} style={{background:'none',border:'1px solid rgba(79,142,247,0.25)',borderRadius:'6px',padding:'5px 10px',cursor:'pointer',color:'#4f8ef7',fontSize:'11px',fontWeight:600}}>Düzenle</button>
                        <button onClick={()=>handleDelete(e.id)} style={{background:'none',border:'1px solid rgba(239,68,68,0.25)',borderRadius:'6px',padding:'5px 10px',cursor:'pointer',color:'#ef4444',fontSize:'11px',fontWeight:600}}>Sil</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
              <tfoot>
                <tr style={{background:'rgba(255,255,255,0.03)',borderTop:'2px solid rgba(255,255,255,0.1)'}}>
                  <td colSpan={2} style={{padding:'10px 14px',fontWeight:700,color:'#94a3b8',fontSize:'12px',textTransform:'uppercase'}}>Toplam</td>
                  <td className="tabular-nums" style={{padding:'10px 14px',textAlign:'right',color:'#ef4444',fontWeight:800,fontSize:'15px'}}>{fmtTL(totalExpenses)}</td>
                  <td></td>
                </tr>
              </tfoot>
            </table>
          </div>
        </Card>
      ):(
        <div style={{textAlign:'center',padding:'60px 20px',color:'#64748b'}}>
          <div style={{fontSize:'40px',marginBottom:'12px'}}>💸</div>
          <div style={{fontSize:'16px',fontWeight:600,marginBottom:'6px'}}>Henüz gider kaydı yok</div>
          <div style={{fontSize:'13px'}}>Yukarıdan gider ekleyebilirsiniz</div>
        </div>
      )}
    </div>
  );
}

/* ── ORTAKLAR PAGE ── */
function PartnersPage({partners,onUpdatePartners,customers,partnerPayments,onUpdatePayments,partnerAdjustments,onUpdateAdjustments,kasa,onUpdateKasa}){
  const[form,setForm]=useState({name:'',percent:''});
  const[editId,setEditId]=useState(null);
  const[dateFrom,setDateFrom]=useState('');
  const[dateTo,setDateTo]=useState('');
  const[payModal,setPayModal]=useState(null);
  const[editPayId,setEditPayId]=useState(null);
  const[payForm,setPayForm]=useState({amount:'',date:todayStr(),note:''});
  const[adjModal,setAdjModal]=useState(null);
  const[editAdjId,setEditAdjId]=useState(null);
  const[adjForm,setAdjForm]=useState({amount:'',date:todayStr(),note:'',direction:'ekle'});

  const totalPercent=partners.reduce((s,p)=>s+(p.percent||0),0);

  const resetForm=()=>{setForm({name:'',percent:''});setEditId(null);};
  const openEdit=(p)=>{setEditId(p.id);setForm({name:p.name,percent:String(p.percent||'')});};

  const handleSave=()=>{
    if(!form.name.trim())return alert('Ortak adı giriniz.');
    const pct=parseFloat(form.percent)||0;
    if(pct<=0||pct>100)return alert('Yüzde 0-100 arasında olmalı.');
    if(editId){
      onUpdatePartners(prev=>prev.map(p=>p.id===editId?{...p,name:form.name.trim(),percent:pct}:p));
    }else{
      onUpdatePartners(prev=>[...prev,{id:uid(),name:form.name.trim(),percent:pct,createdAt:new Date().toISOString()}]);
    }
    resetForm();
  };

  const handleDelete=(id)=>{
    if(!window.confirm('Bu ortağı silmek istediğinize emin misiniz?'))return;
    onUpdatePartners(prev=>prev.filter(p=>p.id!==id));
    if(editId===id)resetForm();
  };

  const handlePay=()=>{
    const amt=parseFloat(payForm.amount)||0;
    if(!amt)return alert('Tutar giriniz.');
    const partner=partners.find(p=>p.id===payModal);
    if(!partner)return;
    if(editPayId){
      if(onUpdatePayments){
        onUpdatePayments(prev=>(prev||[]).map(p=>p.id===editPayId?{...p,amount:amt,date:payForm.date,note:payForm.note.trim()}:p));
      }
      if(onUpdateKasa){
        onUpdateKasa(prev=>({...prev,transactions:(prev.transactions||[]).map(t=>t.partnerPaymentId===editPayId
          ?{...t,date:payForm.date,amount:amt,description:'Ortak Ödeme: '+partner.name+(payForm.note?' — '+payForm.note.trim():'')}
          :t)}));
      }
      setPayModal(null);setEditPayId(null);setPayForm({amount:'',date:todayStr(),note:''});
      return;
    }
    const payId=uid();
    const payments=Array.isArray(partnerPayments)?partnerPayments:[];
    if(onUpdatePayments){
      onUpdatePayments(prev=>[...(prev||[]),{id:payId,partnerId:payModal,partnerName:partner.name,amount:amt,date:payForm.date,note:payForm.note.trim(),createdAt:new Date().toISOString()}]);
    }
    if(onUpdateKasa){
      const kasaEntry={id:uid(),date:payForm.date,type:'cikis',amount:amt,description:'Ortak Ödeme: '+partner.name+(payForm.note?' — '+payForm.note.trim():''),auto:true,partnerPaymentId:payId};
      onUpdateKasa(prev=>({...prev,transactions:[...(prev.transactions||[]),kasaEntry]}));
    }
    setPayModal(null);setEditPayId(null);setPayForm({amount:'',date:todayStr(),note:''});
  };

  const openEditPayment=(p)=>{
    setEditPayId(p.id);
    setPayModal(p.partnerId);
    setPayForm({amount:String(p.amount),date:p.date,note:p.note||''});
  };

  const handleDeletePayment=(payId)=>{
    if(!window.confirm('Bu ödemeyi silmek istediğinize emin misiniz?'))return;
    if(onUpdatePayments){
      onUpdatePayments(prev=>(prev||[]).filter(p=>p.id!==payId));
    }
    if(onUpdateKasa){
      onUpdateKasa(prev=>({...prev,transactions:(prev.transactions||[]).filter(t=>t.partnerPaymentId!==payId)}));
    }
  };

  // Hakediş düzeltme işlemleri
  const handleAdjSave=()=>{
    const raw=parseFloat(adjForm.amount)||0;
    if(!raw)return alert('Tutar giriniz.');
    const partner=partners.find(p=>p.id===adjModal);
    if(!partner)return;
    const signed=adjForm.direction==='dus'?-Math.abs(raw):Math.abs(raw);
    if(editAdjId){
      onUpdateAdjustments&&onUpdateAdjustments(prev=>(prev||[]).map(a=>a.id===editAdjId?{...a,amount:signed,date:adjForm.date,note:adjForm.note.trim()}:a));
    }else{
      onUpdateAdjustments&&onUpdateAdjustments(prev=>[...(prev||[]),{id:uid(),partnerId:adjModal,partnerName:partner.name,amount:signed,date:adjForm.date,note:adjForm.note.trim(),createdAt:new Date().toISOString()}]);
    }
    setAdjModal(null);setEditAdjId(null);setAdjForm({amount:'',date:todayStr(),note:'',direction:'ekle'});
  };

  const openEditAdj=(a)=>{
    setEditAdjId(a.id);
    setAdjModal(a.partnerId);
    setAdjForm({amount:String(Math.abs(a.amount)),date:a.date,note:a.note||'',direction:a.amount<0?'dus':'ekle'});
  };

  const handleDeleteAdj=(id)=>{
    if(!window.confirm('Bu hakediş düzeltmesini silmek istediğinize emin misiniz?'))return;
    onUpdateAdjustments&&onUpdateAdjustments(prev=>(prev||[]).filter(a=>a.id!==id));
  };

  // Kar hesaplama
  const allCekim=customers.flatMap(c=>
    (c.cariEntries||[]).filter(e=>e.type==='cekim').map(e=>({...e,customerName:c.name}))
  ).filter(e=>{
    if(dateFrom&&e.date<dateFrom)return false;
    if(dateTo&&e.date>dateTo)return false;
    return true;
  });

  const totalCekim=allCekim.reduce((s,r)=>s+r.amount,0);
  const totalKom=allCekim.reduce((s,r)=>s+(r.customerComm||0),0);
  const totalBankCost=allCekim.reduce((s,r)=>s+(r.bankCost||0),0);
  const totalProfit=allCekim.reduce((s,r)=>s+(r.profit||0),0);

  const payments=Array.isArray(partnerPayments)?partnerPayments:[];
  const getPartnerPayments=(pid)=>payments.filter(p=>p.partnerId===pid);
  const getPartnerTotalPaid=(pid)=>getPartnerPayments(pid).reduce((s,p)=>s+p.amount,0);
  const adjustments=Array.isArray(partnerAdjustments)?partnerAdjustments:[];
  const getPartnerAdjTotal=(pid)=>adjustments.filter(a=>a.partnerId===pid).reduce((s,a)=>s+a.amount,0);
  const totalAdj=adjustments.reduce((s,a)=>s+a.amount,0);

  const inS={background:'rgba(30,39,64,.8)',border:'1px solid rgba(255,255,255,.1)',borderRadius:'8px',padding:'8px 12px',color:'#e2e8f0',fontSize:'13px'};

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'20px'}}>
      <h2 style={{fontWeight:800,fontSize:'20px'}}>Ortaklar</h2>

      {/* Ortak Ekleme */}
      <Card>
        <div style={{fontWeight:700,fontSize:'15px',marginBottom:'16px'}}>{editId?'Ortak Düzenle':'Yeni Ortak Ekle'}</div>
        <div style={{display:'flex',gap:'12px',flexWrap:'wrap',alignItems:'flex-end'}}>
          <div style={{display:'flex',flexDirection:'column',gap:'4px',flex:1,minWidth:'200px'}}>
            <label style={{fontSize:'11px',color:'#64748b',fontWeight:600}}>Ortak Adı</label>
            <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Ad Soyad" style={inS}/>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'4px',minWidth:'120px'}}>
            <label style={{fontSize:'11px',color:'#64748b',fontWeight:600}}>Ortaklık Yüzdesi (%)</label>
            <input type="number" step="0.1" min="0" max="100" value={form.percent} onChange={e=>setForm(f=>({...f,percent:e.target.value}))} placeholder="50" style={inS}/>
          </div>
          <div style={{display:'flex',gap:'8px'}}>
            <button onClick={handleSave}
              style={{background:'#4f8ef7',border:'none',borderRadius:'8px',padding:'10px 20px',color:'#fff',cursor:'pointer',fontWeight:700,fontSize:'13px'}}>
              {editId?'Güncelle':'Ekle'}
            </button>
            {editId&&<button onClick={resetForm}
              style={{padding:'10px 20px',borderRadius:'8px',border:'1px solid rgba(255,255,255,0.1)',background:'transparent',color:'#94a3b8',cursor:'pointer',fontWeight:600,fontSize:'13px'}}>
              İptal
            </button>}
          </div>
        </div>
        {totalPercent>0&&(
          <div style={{marginTop:'12px',padding:'8px 14px',borderRadius:'8px',
            background:totalPercent===100?'rgba(34,197,94,0.1)':'rgba(245,158,11,0.1)',
            border:`1px solid ${totalPercent===100?'rgba(34,197,94,0.3)':'rgba(245,158,11,0.3)'}`,
            color:totalPercent===100?'#22c55e':'#f59e0b',fontSize:'12px',fontWeight:600}}>
            Toplam Ortaklık: %{totalPercent.toFixed(1)} {totalPercent!==100&&'(Toplam %100 olmalıdır)'}
          </div>
        )}
      </Card>

      {/* Karlılık Filtresi */}
      <Card>
        <div style={{fontWeight:700,fontSize:'15px',marginBottom:'14px'}}>Karlılık Analizi</div>
        <div style={{display:'flex',gap:'12px',flexWrap:'wrap',alignItems:'flex-end',marginBottom:'16px'}}>
          <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
            <label style={{fontSize:'11px',color:'#64748b',fontWeight:600}}>Başlangıç Tarihi</label>
            <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={inS}/>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
            <label style={{fontSize:'11px',color:'#64748b',fontWeight:600}}>Bitiş Tarihi</label>
            <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} style={inS}/>
          </div>
          {(dateFrom||dateTo)&&(
            <button onClick={()=>{setDateFrom('');setDateTo('');}}
              style={{padding:'8px 14px',borderRadius:'8px',border:'1px solid rgba(239,68,68,.3)',background:'rgba(239,68,68,.1)',color:'#ef4444',cursor:'pointer',fontSize:'12px',fontWeight:600}}>
              Temizle
            </button>
          )}
        </div>

        {/* Özet Kartları */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:'14px',marginBottom:'20px'}}>
          <MetricCard label="Toplam Çekim" value={fmtTL(totalCekim)} color="#4f8ef7"/>
          <MetricCard label="Müşteri Komisyonu" value={fmtTL(totalKom)} color="#a855f7"/>
          <MetricCard label="POS Maliyeti" value={fmtTL(totalBankCost)} color="#ef4444"/>
          <MetricCard label="Net Kar" value={fmtTL(totalProfit)} color="#22c55e" large/>
        </div>

        {/* Ortak Dağılım Tablosu */}
        {partners.length>0&&(
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
              <thead>
                <tr>
                  {['Ortak','Yüzde','Pay (Kar)','Ödenen','Kalan','İşlem'].map(h=>
                    <th key={h} style={{padding:'10px 14px',textAlign:'left',color:'#64748b',fontWeight:600,fontSize:'11px',textTransform:'uppercase',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>{h}</th>
                  )}
                </tr>
              </thead>
              <tbody>
                {partners.map(p=>{
                  const adj=getPartnerAdjTotal(p.id);
                  const share=totalProfit*(p.percent/100)+adj;
                  const paid=getPartnerTotalPaid(p.id);
                  const remaining=share-paid;
                  return(
                    <tr key={p.id} style={{borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                      <td style={{padding:'10px 14px',fontWeight:700}}>{p.name}</td>
                      <td style={{padding:'10px 14px'}}>
                        <span style={{padding:'3px 10px',borderRadius:'12px',fontSize:'12px',fontWeight:700,background:'rgba(79,142,247,0.15)',color:'#4f8ef7'}}>%{p.percent}</span>
                      </td>
                      <td className="tabular-nums" style={{padding:'10px 14px',color:'#22c55e',fontWeight:700,fontSize:'15px'}}>
                        {fmtTL(share)}
                        {adj!==0&&<div style={{fontSize:'10px',color:adj>0?'#4f8ef7':'#ef4444',fontWeight:600}}>Düzeltme: {adj>0?'+':''}{fmtTL(adj)}</div>}
                      </td>
                      <td className="tabular-nums" style={{padding:'10px 14px',color:'#f59e0b',fontWeight:600}}>{fmtTL(paid)}</td>
                      <td className="tabular-nums" style={{padding:'10px 14px',color:remaining>0?'#ef4444':'#22c55e',fontWeight:700}}>{fmtTL(remaining)}</td>
                      <td style={{padding:'10px 14px'}}>
                        <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
                          <button onClick={()=>{setPayModal(p.id);setEditPayId(null);setPayForm({amount:'',date:todayStr(),note:''});}} style={{background:'rgba(34,197,94,0.1)',border:'1px solid rgba(34,197,94,0.3)',borderRadius:'6px',padding:'5px 10px',cursor:'pointer',color:'#22c55e',fontSize:'11px',fontWeight:600}}>Ödeme Yap</button>
                          <button onClick={()=>{setAdjModal(p.id);setEditAdjId(null);setAdjForm({amount:'',date:todayStr(),note:'',direction:'ekle'});}} style={{background:'rgba(168,85,247,0.1)',border:'1px solid rgba(168,85,247,0.3)',borderRadius:'6px',padding:'5px 10px',cursor:'pointer',color:'#a855f7',fontSize:'11px',fontWeight:600}}>Hakediş Düzelt</button>
                          <button onClick={()=>openEdit(p)} style={{background:'none',border:'1px solid rgba(79,142,247,0.25)',borderRadius:'6px',padding:'5px 10px',cursor:'pointer',color:'#4f8ef7',fontSize:'11px',fontWeight:600}}>Düzenle</button>
                          <button onClick={()=>handleDelete(p.id)} style={{background:'none',border:'1px solid rgba(239,68,68,0.25)',borderRadius:'6px',padding:'5px 10px',cursor:'pointer',color:'#ef4444',fontSize:'11px',fontWeight:600}}>Sil</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr style={{background:'rgba(255,255,255,0.03)',borderTop:'2px solid rgba(255,255,255,0.1)'}}>
                  <td style={{padding:'10px 14px',fontWeight:700,color:'#94a3b8',fontSize:'12px',textTransform:'uppercase'}}>Toplam</td>
                  <td style={{padding:'10px 14px'}}><span style={{padding:'3px 10px',borderRadius:'12px',fontSize:'12px',fontWeight:700,background:totalPercent===100?'rgba(34,197,94,0.15)':'rgba(245,158,11,0.15)',color:totalPercent===100?'#22c55e':'#f59e0b'}}>%{totalPercent.toFixed(1)}</span></td>

/* ── HESABIM PAGE ── */
function HesabimPage({token,username,onUpdated,onExport,onImport,onReset}){
  const[form,setForm]=useState({newUsername:username,currentPassword:'',newPassword:'',confirmPassword:''});
  const[msg,setMsg]=useState('');
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);
  const inpS={width:'100%',padding:'10px 14px',background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'8px',color:'#e2e8f0',fontSize:'14px',outline:'none',boxSizing:'border-box'};
  const submit=async()=>{
    setErr('');setMsg('');
    if(!form.newUsername.trim()){setErr('Kullanıcı adı boş olamaz');return;}
    if(form.newPassword&&form.newPassword.length<6){setErr('Yeni şifre en az 6 karakter olmalı');return;}
    if(form.newPassword&&form.newPassword!==form.confirmPassword){setErr('Yeni şifreler eşleşmiyor');return;}
    if(form.newPassword&&!form.currentPassword){setErr('Şifre değiştirmek için mevcut şifreyi gir');return;}
    setLoading(true);
    try{
      const r=await fetch('/api/users/me',{method:'PUT',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify({newUsername:form.newUsername.trim(),currentPassword:form.currentPassword||undefined,newPassword:form.newPassword||undefined})});
      const text=await r.text();
      let d;try{d=JSON.parse(text);}catch{setErr('Sunucu hatası: '+r.status);return;}
      if(!r.ok){setErr(d.error||'Hata');return;}
      setMsg('Bilgiler güncellendi.');
      if(d.username&&d.username!==username)onUpdated&&onUpdated(d.username);
      setForm(p=>({...p,currentPassword:'',newPassword:'',confirmPassword:'',newUsername:d.username||p.newUsername}));
    }catch(e){setErr(e.message);}
    finally{setLoading(false);}
  };
  return(
    <div style={{maxWidth:'480px'}}>
      <Card style={{display:'flex',flexDirection:'column',gap:'18px'}}>
        <div style={{fontWeight:700,fontSize:'16px',color:'#e2e8f0',paddingBottom:'4px',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>Hesap Bilgileri</div>
        {err&&<div style={{color:'#ef4444',background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:'8px',padding:'10px 14px',fontSize:'13px'}}>{err}</div>}
        {msg&&<div style={{color:'#22c55e',background:'rgba(34,197,94,0.08)',border:'1px solid rgba(34,197,94,0.2)',borderRadius:'8px',padding:'10px 14px',fontSize:'13px'}}>{msg}</div>}
        <div>
          <label style={{display:'block',color:'#94a3b8',fontSize:'12px',marginBottom:'6px',fontWeight:600}}>Kullanıcı Adı</label>
          <input style={inpS} value={form.newUsername} onChange={e=>setForm(p=>({...p,newUsername:e.target.value}))}/>
        </div>
        <div style={{borderTop:'1px solid rgba(255,255,255,0.07)',paddingTop:'16px',display:'flex',flexDirection:'column',gap:'12px'}}>
          <div style={{color:'#64748b',fontSize:'12px',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em'}}>Şifre Değiştir</div>
          <div>
            <label style={{display:'block',color:'#94a3b8',fontSize:'12px',marginBottom:'6px',fontWeight:600}}>Mevcut Şifre</label>
            <input style={inpS} type="password" value={form.currentPassword} onChange={e=>setForm(p=>({...p,currentPassword:e.target.value}))} placeholder="Değiştirmek istiyorsanız girin"/>
          </div>
          <div>
            <label style={{display:'block',color:'#94a3b8',fontSize:'12px',marginBottom:'6px',fontWeight:600}}>Yeni Şifre</label>
            <input style={inpS} type="password" value={form.newPassword} onChange={e=>setForm(p=>({...p,newPassword:e.target.value}))} placeholder="Min 6 karakter"/>
          </div>
          <div>
            <label style={{display:'block',color:'#94a3b8',fontSize:'12px',marginBottom:'6px',fontWeight:600}}>Yeni Şifre (Tekrar)</label>
            <input style={inpS} type="password" value={form.confirmPassword} onChange={e=>setForm(p=>({...p,confirmPassword:e.target.value}))} placeholder="Yeni şifreyi tekrar girin"/>
          </div>
        </div>
        <button onClick={submit} disabled={loading} style={{padding:'12px',borderRadius:'10px',border:'none',background:'linear-gradient(135deg,#4f8ef7,#3b6fd4)',color:'#fff',fontWeight:700,fontSize:'14px',cursor:'pointer',opacity:loading?0.7:1}}>
          {loading?'Kaydediliyor…':'Kaydet'}
        </button>
      </Card>
      <Card style={{display:'flex',flexDirection:'column',gap:'12px',marginTop:'16px'}}>
        <div style={{fontWeight:700,fontSize:'16px',color:'#e2e8f0',paddingBottom:'4px',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>Veri Yönetimi</div>
        <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
          <button onClick={onExport} style={{display:'flex',alignItems:'center',gap:'10px',padding:'12px 16px',borderRadius:'10px',border:'1px solid rgba(34,197,94,0.25)',background:'rgba(34,197,94,0.06)',color:'#22c55e',cursor:'pointer',fontWeight:600,fontSize:'13px',textAlign:'left'}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Yedek Al
            <span style={{color:'#64748b',fontWeight:400,fontSize:'12px',marginLeft:'auto'}}>Tüm verileri JSON olarak indir</span>
          </button>
          <label style={{display:'flex',alignItems:'center',gap:'10px',padding:'12px 16px',borderRadius:'10px',border:'1px solid rgba(245,158,11,0.25)',background:'rgba(245,158,11,0.06)',color:'#f59e0b',cursor:'pointer',fontWeight:600,fontSize:'13px'}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Geri Yükle
            <span style={{color:'#64748b',fontWeight:400,fontSize:'12px',marginLeft:'auto'}}>JSON yedekten geri yükle</span>
            <input type="file" accept=".json" style={{display:'none'}} onChange={e=>{onImport&&onImport(e.target.files[0]);e.target.value='';}}/>
          </label>
          <button onClick={onReset} style={{display:'flex',alignItems:'center',gap:'10px',padding:'12px 16px',borderRadius:'10px',border:'1px solid rgba(239,68,68,0.2)',background:'rgba(239,68,68,0.05)',color:'#ef4444',cursor:'pointer',fontWeight:600,fontSize:'13px',textAlign:'left'}}>
            <IcoRefresh size={16}/>
            Verileri Sıfırla
            <span style={{color:'#64748b',fontWeight:400,fontSize:'12px',marginLeft:'auto'}}>Tüm müşteri ve kayıtları sil</span>
          </button>
        </div>
      </Card>
    </div>
  );
}

/* ── BANKA AYARLARI ── */
function BankSettingsPage({banks,onUpdateBanks}){
  const[open,setOpen]=useState(null);
  const[compareInst,setCompareInst]=useState(1);
  const[draftBanks,setDraftBanks]=useState(()=>normalizeBanks(banks));
  const[notice,setNotice]=useState('');
  useEffect(()=>{setDraftBanks(normalizeBanks(banks));},[JSON.stringify(banks)]);
  const updateRate=(bankId,idx,val)=>{
    setDraftBanks(draftBanks.map(b=>{
      if(b.id!==bankId)return b;
      const rates=[...b.rates];
      rates[idx]=val;
      return{...b,rates};
    }));
  };
  const updateFee=(bankId,val)=>{
    setDraftBanks(draftBanks.map(b=>b.id===bankId?{...b,fee:val}:b));
  };
  const saveBanks=()=>{
    onUpdateBanks(normalizeBanks(draftBanks));
    setNotice('Banka oranları kaydedildi.');
    setTimeout(()=>setNotice(''),3000);
  };
  const loadLatestRates=()=>{
    setDraftBanks(normalizeBanks(draftBanks,true));
    setNotice('Güncel iyzico oranları yüklendi. Kalıcı olması için Kaydet’e basın.');
    setTimeout(()=>setNotice(''),4000);
  };
  return(
    <div>
      <Card style={{marginBottom:'16px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:'12px',flexWrap:'wrap'}}>
        <div>
          <div style={{fontWeight:800,fontSize:'15px'}}>Banka oranları manuel düzenleme</div>
          <div style={{color:'#94a3b8',fontSize:'12px',marginTop:'4px'}}>Oranları değiştirip Kaydet’e basınca POS, cari ve kar hesapları yeni değerleri kullanır.</div>
          {notice&&<div style={{color:'#22c55e',fontSize:'12px',marginTop:'6px'}}>{notice}</div>}
        </div>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
          <button onClick={loadLatestRates} style={{background:'#1e293b',border:'1px solid rgba(255,255,255,.12)',color:'#e2e8f0',borderRadius:'10px',padding:'9px 14px',cursor:'pointer',fontWeight:700}}>Güncel Oranları Yükle</button>
          <button onClick={saveBanks} style={{background:'#22c55e',border:'none',color:'#052e16',borderRadius:'10px',padding:'9px 16px',cursor:'pointer',fontWeight:800}}>Kaydet</button>
        </div>
      </Card>
      <div style={{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'24px'}}>
        {draftBanks.map(b=>(
          <Card key={b.id} style={{padding:0,overflow:'hidden'}}>
            <button onClick={()=>setOpen(open===b.id?null:b.id)} style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'16px 20px',background:'none',border:'none',cursor:'pointer',color:'#e2e8f0'}}>
              <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
                <div style={{width:'12px',height:'12px',borderRadius:'50%',background:b.color,flexShrink:0}}/>
                <span style={{fontWeight:700,fontSize:'15px'}}>{b.name}</span>
                <Badge color="#64748b">İşlem Bedeli: ₺{b.fee}</Badge>
              </div>
              <div style={{color:'#64748b',transform:open===b.id?'rotate(180deg)':'none',transition:'transform 0.2s'}}><IcoChevronDown size={18}/></div>
            </button>
            {open===b.id&&(
              <div style={{padding:'0 20px 20px',borderTop:'1px solid rgba(255,255,255,0.06)'}}>
                <div style={{marginBottom:'16px',display:'flex',alignItems:'center',gap:'12px',paddingTop:'16px'}}>
                  <span style={{color:'#94a3b8',fontSize:'13px'}}>İşlem Bedeli (₺):</span>
                  <input type="text" inputMode="decimal" value={b.fee} onChange={e=>updateFee(b.id,e.target.value)}
                    style={{...inputStyle,width:'100px',padding:'6px 10px',fontSize:'13px'}}/>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:'8px'}}>
                  {b.rates.map((r,i)=>(
                    <div key={i} style={{background:'#131929',borderRadius:'8px',padding:'10px',border:'1px solid rgba(255,255,255,0.06)'}}>
                      <div style={{color:'#64748b',fontSize:'10px',fontWeight:700,marginBottom:'6px',textTransform:'uppercase'}}>{i+1}. Taksit</div>
                      <input type="text" inputMode="decimal" value={r} onChange={e=>updateRate(b.id,i,e.target.value)}
                        style={{...inputStyle,padding:'5px 8px',fontSize:'13px',fontWeight:700,color:b.color,marginBottom:'4px'}}/>
                      <div className="tabular-nums" style={{color:'#64748b',fontSize:'10px'}}>10K net: ₺{fmt(10000-(10000*rateNum(r)/100+rateNum(b.fee)))}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </Card>
        ))}
      </div>
      {/* Comparison Table */}
      <Card style={{padding:0,overflow:'hidden'}}>
        <div style={{padding:'16px 20px',borderBottom:'1px solid rgba(255,255,255,0.07)',display:'flex',alignItems:'center',gap:'16px'}}>
          <span style={{fontWeight:700}}>Banka Karşılaştırma</span>
          <Select value={compareInst} onChange={e=>setCompareInst(parseInt(e.target.value))} style={{width:'140px',padding:'6px 10px',fontSize:'13px'}}>
            {Array.from({length:12},(_,i)=><option key={i+1} value={i+1}>{i+1} Taksit</option>)}
          </Select>
        </div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
            <thead>
              <tr style={{borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
                {['Banka','Oran (%)','İşlem Bedeli','10.000₺ Maliyet','10.000₺ Net'].map(h=>(
                  <th key={h} style={{padding:'10px 14px',textAlign:'left',color:'#64748b',fontWeight:600,fontSize:'11px',textTransform:'uppercase'}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {[...draftBanks].sort((a,b)=>rateNum(a.rates[compareInst-1])-rateNum(b.rates[compareInst-1])).map(b=>{
                const rate=rateNum(b.rates[compareInst-1]);
                const cost=+(10000*rate/100+rateNum(b.fee)).toFixed(2);
                const net=+(10000-cost).toFixed(2);
                return(
                  <tr key={b.id} style={{borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                    <td style={{padding:'10px 14px'}}>
                      <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                        <div style={{width:'10px',height:'10px',borderRadius:'50%',background:b.color,flexShrink:0}}/>
                        <span style={{fontWeight:700}}>{b.name}</span>
                      </div>
                    </td>
                    <td className="tabular-nums" style={{padding:'10px 14px',color:b.color,fontWeight:700}}>%{rate}</td>
                    <td className="tabular-nums" style={{padding:'10px 14px',color:'#94a3b8'}}>{fmtTL(b.fee)}</td>
                    <td className="tabular-nums" style={{padding:'10px 14px',color:'#ef4444',fontWeight:600}}>{fmtTL(cost)}</td>
                    <td className="tabular-nums" style={{padding:'10px 14px',color:'#22c55e',fontWeight:700}}>{fmtTL(net)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

function Sidebar({page,setPage,collapsed,setCollapsed,onReset,saveStatus,onExport,onImport,onLogout,role,username,mobileOpen,onMobileClose,waqCount}){
  const isMobile=useIsMobile();
  const[expanded,setExpanded]=useState({reports:false,hesabim:false});

  const GROUPS={
    reports:{label:'Raporlamalar',icon:<IcoPDF/>,page:'reports',children:[
      {id:'pos',label:'POS Hesap',icon:<IcoChart/>},
      {id:'profit',label:'Kar Analizi',icon:<IcoChart/>},
    ]},
    hesabim:{label:'Hesabım',icon:<IcoCog/>,page:'hesabim',children:[
      ...(role==='admin'?[{id:'admin',label:'Kullanıcı Yönetimi',icon:<IcoUsers/>}]:[]),
    ]},

  const TOP_NAV=[
    {id:'dashboard',label:'Dashboard',icon:<IcoHome/>},
    {id:'customers',label:'Müşteriler',icon:<IcoUsers/>},
    {id:'kasa',label:'Kasa',icon:<IcoCash/>},
    {group:'reports'},
    {id:'companies',label:'Şirketler',icon:<IcoCog/>},
    {id:'expenses',label:'Giderler',icon:<IcoCash/>},
    ...(role==='admin'?[{id:'waq',label:'WhatsApp',icon:<IcoUpload/>,badge:waqCount}]:[]),
    {id:'partners',label:'Ortaklar',icon:<IcoChart/>},
    {group:'hesabim'},
  ];

  const w=isMobile?236:(collapsed?64:236);
  const statusLabel=saveStatus==='saving'?'Kaydediliyor…':saveStatus==='saved'?'✓ Sunucuya Kaydedildi':saveStatus==='error'?'Kayıt Hatası':'Hazır';
  const statusColor=saveStatus==='saved'?'#22c55e':saveStatus==='saving'?'#f59e0b':saveStatus==='error'?'#ef4444':'#64748b';

    sidebarStyle.position='fixed';
    sidebarStyle.top=0;
    sidebarStyle.left=0;
    sidebarStyle.zIndex=200;
    sidebarStyle.transform=mobileOpen?'translateX(0)':'translateX(-100%)';
    sidebarStyle.transition='transform 0.25s ease';
  }else{
    sidebarStyle.position='sticky';
    sidebarStyle.top=0;
  }

  const renderNavItem=(n)=>{
    const active=page===n.id;
    if(n.isImport){
      return(
        <label key={n.id} title={collapsed?n.label:''}

          <span style={{flexShrink:0}}>{n.icon}</span>
          {!collapsed&&<span style={{flex:1}}>{n.label}</span>}
          <input type="file" accept=".json" style={{display:'none'}} onChange={e=>{onImport(e.target.files[0]);e.target.value='';}}/>
        </label>
      );
    }
    if(n.action){
      return(
        <button key={n.id} onClick={n.action} title={collapsed?n.label:''}
          style={{width:'100%',display:'flex',alignItems:'center',gap:'10px',padding:collapsed?'7px 0':'6px 14px 6px 28px',justifyContent:collapsed?'center':'flex-start',borderRadius:'10px',border:'none',background:'transparent',color:n.color||'#94a3b8',cursor:'pointer',fontWeight:500,fontSize:'12px',transition:'all 0.15s',marginBottom:'1px',boxSizing:'border-box'}}>
          <span style={{flexShrink:0}}>{n.icon}</span>
          {!collapsed&&<span style={{flex:1}}>{n.label}</span>}
        </button>
      );
    }
    return(
      <button key={n.id} onClick={()=>navClick(n.id)} title={collapsed?n.label:''}
        style={{width:'100%',display:'flex',alignItems:'center',gap:'10px',padding:collapsed?'7px 0':'6px 14px 6px 28px',justifyContent:collapsed?'center':'flex-start',borderRadius:'10px',border:'none',background:active?'rgba(79,142,247,0.15)':'transparent',color:active?'#4f8ef7':'#94a3b8',cursor:'pointer',fontWeight:active?700:500,fontSize:'12px',transition:'all 0.15s',marginBottom:'1px',boxSizing:'border-box'}}>
        <span style={{flexShrink:0}}>{n.icon}</span>
        {!collapsed&&<span style={{flex:1}}>{n.label}</span>}
        {!collapsed&&n.badge>0&&<span style={{background:'#ef4444',color:'#fff',borderRadius:'10px',padding:'1px 7px',fontSize:'11px',fontWeight:700,flexShrink:0}}>{n.badge}</span>}
      </button>

    <div style={sidebarStyle}>

        {!collapsed&&<span style={{fontWeight:800,fontSize:'18px',letterSpacing:'-0.5px',color:'#e2e8f0'}}>ZYRE<span style={{color:'#4f8ef7'}}>OS</span></span>}
        {collapsed&&<div style={{width:'32px',height:'32px',borderRadius:'8px',background:'#4f8ef7',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:'14px',color:'#fff'}}>Z</div>}
      </div>
      {!collapsed&&username&&(
        <div style={{padding:'10px 16px',borderBottom:'1px solid rgba(255,255,255,0.05)',display:'flex',alignItems:'center',gap:'8px'}}>
          <div style={{width:'24px',height:'24px',borderRadius:'6px',background:role==='admin'?'rgba(168,85,247,0.2)':'rgba(79,142,247,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:'10px',color:role==='admin'?'#a855f7':'#4f8ef7',flexShrink:0}}>{username[0].toUpperCase()}</div>

            <div style={{fontSize:'12px',fontWeight:600,color:'#e2e8f0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>@{username}</div>
            <div style={{fontSize:'10px',color:role==='admin'?'#a855f7':'#64748b',fontWeight:600}}>{role==='admin'?'Admin':'Kullanıcı'}</div>
          </div>
        </div>
      )}
      <nav style={{flex:1,padding:'12px 8px',overflowY:'auto'}}>
        {TOP_NAV.map((item,i)=>{
          if(item.group){
            const key=item.group;
            const grp=GROUPS[key];
            const open=expanded[key]||isGroupActive(key);
            const groupActive=isGroupActive(key);
            return(
              <div key={key}>
                <div style={{display:'flex',alignItems:'center',borderRadius:'10px',background:groupActive?'rgba(79,142,247,0.08)':'transparent',marginBottom:'2px',overflow:'hidden'}}>

                    style={{flex:1,display:'flex',alignItems:'center',gap:'12px',padding:collapsed?'10px 0':'10px 14px',justifyContent:collapsed?'center':'flex-start',border:'none',background:'transparent',color:groupActive?'#4f8ef7':'#64748b',cursor:'pointer',fontWeight:groupActive?700:500,fontSize:'13px',transition:'all 0.15s',boxSizing:'border-box'}}>
                    <span style={{flexShrink:0}}>{grp.icon}</span>

                    <button onClick={()=>toggleGroup(key)}

              <span style={{flexShrink:0}}>{item.icon}</span>
              {!collapsed&&<span style={{flex:1}}>{item.label}</span>}
