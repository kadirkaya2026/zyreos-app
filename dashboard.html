/* ── WHATSAPP QUEUE PAGE ── */
function WhatsAppQueuePage({token,allUsers,customers}){
  const[queue,setQueue]=React.useState([]);
  const[loading,setLoading]=React.useState(true);
  const[error,setError]=React.useState('');
  const[assignState,setAssignState]=React.useState({});
  const[selectedUser,setSelectedUser]=React.useState('');
  const[selectedCustomer,setSelectedCustomer]=React.useState({});
  const[userCustomers,setUserCustomers]=React.useState({});

  const loadQueue=async()=>{
    setLoading(true);setError('');
    try{setQueue(await apiWAQueue(token));}
    catch(e){setError(e.message);}
    finally{setLoading(false);}
  };

  React.useEffect(()=>{loadQueue();},[]);

  const handleAssign=async(item)=>{
    const custId=selectedCustomer[item.id];
    const uname=assignState[item.id]?.username||selectedUser;
    if(!custId||!uname)return;
    try{
      await apiWAAssign(token,item.id,custId,uname);
      loadQueue();
    }catch(e){setError(e.message);}
  };

  const handleDelete=async(id)=>{
    if(!confirm('Bu kaydı kuyruktan silmek istediğinize emin misiniz?'))return;
    try{await apiWADelete(token,id);loadQueue();}
    catch(e){setError(e.message);}
  };

  const loadUserCustomers=async(username)=>{
    if(userCustomers[username])return;
    try{
      const r=await fetch(`/api/admin/user-data/${username}`,{headers:{Authorization:'Bearer '+token}});
      if(r.ok){const d=await r.json();setUserCustomers(p=>({...p,[username]:d.customers||[]}));}
    }catch(e){}
  };

  const card={background:'#131929',borderRadius:'12px',padding:'20px',marginBottom:'16px',border:'1px solid rgba(255,255,255,0.07)'};
  const label={fontSize:'11px',color:'#64748b',fontWeight:600,marginBottom:'4px'};
  const val={fontSize:'14px',color:'#e2e8f0',fontWeight:600};

  return(
    <div style={{padding:'24px',maxWidth:'900px',margin:'0 auto'}}>
      <h2 style={{fontWeight:700,fontSize:'20px',color:'#e2e8f0',marginBottom:'20px'}}>WhatsApp Kuyruk</h2>
      {error&&<div style={{background:'rgba(239,68,68,0.1)',border:'1px solid #ef4444',borderRadius:'8px',padding:'12px',color:'#ef4444',marginBottom:'16px',fontSize:'13px'}}>{error}</div>}
      {loading&&<div style={{color:'#64748b',textAlign:'center',padding:'40px'}}>Yükleniyor...</div>}
      {!loading&&queue.length===0&&<div style={{color:'#64748b',textAlign:'center',padding:'40px',background:'#131929',borderRadius:'12px'}}>Bekleyen dekont yok</div>}
      {queue.map(item=>(
        <div key={item.id} style={card}>
          <div style={{display:'flex',gap:'16px',flexWrap:'wrap',marginBottom:'16px'}}>
            <div><div style={label}>Gönderen</div><div style={val}>{item.from}</div></div>
            <div><div style={label}>Tarih</div><div style={val}>{item.receivedAt?new Date(item.receivedAt).toLocaleString('tr-TR'):'-'}</div></div>
            <div><div style={label}>Tutar</div><div style={{...val,color:'#4f8ef7'}}>₺{item.ocr?.tutar?Number(item.ocr.tutar).toLocaleString('tr-TR'):'-'}</div></div>
            <div><div style={label}>Taksit</div><div style={val}>{item.ocr?.taksit&&item.ocr.taksit>1?item.ocr.taksit+' Taksit':'Peşin'}</div></div>
            <div><div style={label}>Banka</div><div style={val}>{item.ocr?.banka||'-'}</div></div>
          </div>
          {item.imageUrl&&<div style={{marginBottom:'12px'}}><a href={item.imageUrl} target="_blank" rel="noreferrer" style={{fontSize:'12px',color:'#4f8ef7',textDecoration:'none'}}>Dekontu Görüntüle →</a></div>}
          <div style={{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'flex-end'}}>
            <div>
              <div style={label}>Kullanıcı</div>
              <select value={assignState[item.id]?.username||''} onChange={e=>{const u=e.target.value;setAssignState(p=>({...p,[item.id]:{...p[item.id],username:u}}));if(u)loadUserCustomers(u);}}
                style={{background:'#1e2d45',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'8px',color:'#e2e8f0',padding:'8px 10px',fontSize:'13px',minWidth:'140px'}}>
                <option value=''>Kullanıcı seç</option>
                {allUsers.map(u=><option key={u.username} value={u.username}>{u.username}</option>)}
              </select>
            </div>
            <div>
              <div style={label}>Müşteri</div>
              <select value={selectedCustomer[item.id]||''} onChange={e=>setSelectedCustomer(p=>({...p,[item.id]:e.target.value}))}
                style={{background:'#1e2d45',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'8px',color:'#e2e8f0',padding:'8px 10px',fontSize:'13px',minWidth:'180px'}}>
                <option value=''>Müşteri seç</option>
                {(userCustomers[assignState[item.id]?.username||'']||[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>
            <button onClick={()=>handleAssign(item)} disabled={!assignState[item.id]?.username||!selectedCustomer[item.id]}
              style={{padding:'8px 16px',background:'#22c55e',color:'#fff',border:'none',borderRadius:'8px',cursor:'pointer',fontWeight:600,fontSize:'13px',opacity:(!assignState[item.id]?.username||!selectedCustomer[item.id])?0.4:1}}>
              Müşteriye Ata
            </button>
            <button onClick={()=>handleDelete(item.id)}
              style={{padding:'8px 14px',background:'rgba(239,68,68,0.15)',color:'#ef4444',border:'1px solid rgba(239,68,68,0.3)',borderRadius:'8px',cursor:'pointer',fontWeight:600,fontSize:'13px'}}>
              Sil
            </button>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── TOPBAR ── */
const PAGE_TITLES={dashboard:'Dashboard',customers:'Müşteriler',profit:'Kar Analizi',dekont:'Dekont Yükle',banks:'Banka Ayarları',admin:'Kullanıcı Yönetimi',waq:'WhatsApp Kuyruk'};
function Topbar({page,saved,onMenuToggle}){
  const isMobile=useIsMobile();
  return(
    <div style={{height:'56px',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 16px',borderBottom:'1px solid rgba(255,255,255,0.07)',background:'#0c1021',position:'sticky',top:0,zIndex:100,flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
        {isMobile&&(
          <button onClick={onMenuToggle} style={{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',padding:'6px',display:'flex',alignItems:'center',borderRadius:'8px'}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
        )}
        <h1 style={{fontWeight:700,fontSize:isMobile?'14px':'16px',color:'#e2e8f0'}}>{PAGE_TITLES[page]||page}</h1>
      </div>
      {saved&&(
        <div style={{display:'flex',alignItems:'center',gap:'6px',color:'#22c55e',fontSize:'12px',fontWeight:600}}>
          <div style={{width:'6px',height:'6px',borderRadius:'50%',background:'#22c55e'}}/>
          {!isMobile&&'Kaydedildi '}{saved}
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════
   HASH ROUTER
════════════════════════════════════ */
function useHashRouter(){
  const parse=()=>{
    const h=(window.location.hash||'#dashboard').replace('#','');
    const parts=h.split('/');
    return{page:parts[0]||'dashboard',param:parts[1]||null};
  };
  const[route,setRoute]=useState(parse);
  useEffect(()=>{
    const handler=()=>setRoute(parse());
    window.addEventListener('hashchange',handler);
    return()=>window.removeEventListener('hashchange',handler);
  },[]);
  const navigate=(page,param=null)=>{
    window.location.hash=param?`${page}/${param}`:page;
  };
  return[route,navigate];
}

/* ════════════════════════════════════
   APP
════════════════════════════════════ */
function App(){
  const[auth,setAuth]=useState(()=>getAuth());
  const[authScreen,setAuthScreen]=useState('login');
  const[customers,setCustomers]=useState(INIT_CUSTOMERS);
  const[banks,setBanks]=useState(INIT_BANKS);
  const[collapsed,setCollapsed]=usePersist('sidebarCollapsed',false);
  const[mobileSidebarOpen,setMobileSidebarOpen]=useState(false);
  const isMobile=useIsMobile();
  const[initialized,setInitialized]=useState(false);
  const[saveStatus,setSaveStatus]=useState('idle');
  const[savedTime,setSavedTime]=useState('');
  const[route,navigate]=useHashRouter();
  const{page:activePage,param:detailCustomerId}=route;
  const saveTimerRef=useRef(null);
  const initRef=useRef(false);
  const[waqCount,setWaqCount]=useState(0);
  const[allAdminUsers,setAllAdminUsers]=useState([]);

  const logout=()=>{clearAuth();setAuth(null);setAuthScreen('login');setInitialized(false);initRef.current=false;};

  useEffect(()=>{
    if(!auth){setInitialized(true);return;}
    apiFetchData(auth.token)
      .then(data=>{
        if(data.customers&&data.customers.length>0)setCustomers(data.customers);
        if(data.banks&&data.banks.length>0)setBanks(data.banks);
        setInitialized(true);
      })
      .catch(e=>{
        if(e.message==='AUTH_EXPIRED'){clearAuth();setAuth(null);}
        else{console.error(e);setInitialized(true);}
      });
  },[auth?.token]);

  useEffect(()=>{
    if(!initialized||!auth)return;
    if(!initRef.current){initRef.current=true;return;}
    clearTimeout(saveTimerRef.current);
    setSaveStatus('saving');
    saveTimerRef.current=setTimeout(()=>{
      apiSaveData(auth.token,{customers,banks})
        .then(()=>{
          setSaveStatus('saved');setSavedTime(timeStr());
          setTimeout(()=>{setSaveStatus('idle');setSavedTime('');},5000);
        })
        .catch(e=>{
          if(e.message==='AUTH_EXPIRED'){clearAuth();setAuth(null);}
          else setSaveStatus('error');
        });
    },800);
    return()=>clearTimeout(saveTimerRef.current);
  },[customers,banks,initialized]);

  useEffect(()=>{
    if(!auth||auth.role!=='admin')return;
    const fetchWAQ=()=>apiWAQueue(auth.token).then(q=>setWaqCount(q.filter(i=>i.status==='pending').length)).catch(()=>{});
    fetchWAQ();
    const interval=setInterval(fetchWAQ,30000);
    return()=>clearInterval(interval);
  },[auth?.token,auth?.role]);

  useEffect(()=>{
    if(!auth||auth.role!=='admin')return;
    apiAdminUsers(auth.token).then(setAllAdminUsers).catch(()=>{});
  },[auth?.token,auth?.role]);

  const exportBackup=()=>{
    const blob=new Blob([JSON.stringify({customers,banks,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`zyreos_yedek_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1000);
  };

  const importBackup=(file)=>{
    if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(!data.customers||!data.banks)return alert('Geçersiz yedek dosyası.');
        if(!window.confirm(`${data.customers.length} müşteri yüklenecek. Mevcut veriler değiştirilecek. Devam?`))return;
        setCustomers(data.customers);setBanks(data.banks);
      }catch{alert('Dosya okunamadı.');}
    };
    reader.readAsText(file);
  };

  const handleReset=()=>{if(window.confirm('Tüm veriler sıfırlanacak. Emin misiniz?')){setCustomers(INIT_CUSTOMERS);setBanks(INIT_BANKS);}};

  if(!auth){
    if(authScreen==='register')return<RegisterPage onGoLogin={()=>setAuthScreen('login')}/>;
    return<LoginPage onLogin={a=>{setAuth(a);setInitialized(false);initRef.current=false;}} onGoRegister={()=>setAuthScreen('register')}/>;
  }

  if(!initialized)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#0a0d14',flexDirection:'column',gap:'16px'}}>
      <div style={{width:'36px',height:'36px',borderRadius:'50%',border:'3px solid #4f8ef7',borderTopColor:'transparent',animation:'spin 0.8s linear infinite'}}/>
      <div style={{color:'#64748b',fontSize:'14px'}}>Veriler yükleniyor…</div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  return(
    <div style={{display:'flex',minHeight:'100vh',background:'#0a0d14'}}>
      {isMobile&&mobileSidebarOpen&&<div onClick={()=>setMobileSidebarOpen(false)} style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.6)',zIndex:199}}/>}
      <Sidebar page={activePage} setPage={p=>navigate(p)} collapsed={collapsed} setCollapsed={setCollapsed}
        onReset={handleReset} saveStatus={saveStatus}
        onExport={exportBackup} onImport={importBackup} onLogout={logout}
        role={auth.role} username={auth.username}
        mobileOpen={mobileSidebarOpen} onMobileClose={()=>setMobileSidebarOpen(false)}
        waqCount={waqCount}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,overflow:'hidden'}}>
        <Topbar page={activePage} saved={savedTime} onMenuToggle={()=>setMobileSidebarOpen(o=>!o)}/>
        <main style={{flex:1,overflowY:'auto',padding:isMobile?'12px':'24px'}}>
          {activePage==='dashboard'&&<DashboardPage customers={customers} onNavigateCustomer={id=>navigate('customers',id)}/>}
          {activePage==='customers'&&(
            <CustomersPageWithDetail
              customers={customers} banks={banks} onUpdateCustomers={setCustomers}
              initDetailId={detailCustomerId} onClearDetail={()=>navigate('customers')}
            />
          )}
          {activePage==='pos'&&<POSPage customers={customers} banks={banks}/>}
          {activePage==='profit'&&<ProfitPage customers={customers}/>}
          {activePage==='reports'&&<ReportsPage customers={customers}/>}
          {activePage==='dekont'&&<DekontPage customers={customers} banks={banks} onUpdateCustomers={setCustomers}/>}
          {activePage==='banks'&&<BankSettingsPage banks={banks} onUpdateBanks={setBanks}/>}
          {activePage==='admin'&&auth.role==='admin'&&<AdminUsersPage token={auth.token}/>}
          {activePage==='admin'&&auth.role!=='admin'&&(
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'80px',color:'#64748b'}}>Erişim yetkiniz yok.</div>
          )}
          {activePage==='waq'&&auth.role==='admin'&&<WhatsAppQueuePage token={auth.token} allUsers={allAdminUsers} customers={customers}/>}
          {activePage==='waq'&&auth.role!=='admin'&&(
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'80px',color:'#64748b'}}>Erişim yetkiniz yok.</div>
          )}
        </main>
      </div>
    </div>
  );
}

/* Wrapper to handle detail navigation via URL hash */
function CustomersPageWithDetail({customers,banks,onUpdateCustomers,initDetailId,onClearDetail}){
  // ── TÜM HOOK'LAR KOŞULSUZ ÜSTTE ──
  const[addOpen,setAddOpen]=useState(false);
  const[deleteId,setDeleteId]=useState(null);

  const detailId=initDetailId||null;
  const detail=customers.find(c=>c.id===detailId);

  const handleAdd=form=>onUpdateCustomers([...customers,{id:uid(),cariEntries:[],...form}]);
  const handleDelete=id=>onUpdateCustomers(customers.filter(c=>c.id!==id));

  // ── MÜŞTERİ DETAY GÖRÜNÜMÜ ──
  if(detailId&&detail){
    return(
      <CustomerDetail
        customer={detail}
        banks={banks}
        onBack={()=>onClearDetail()}
        onUpdateCustomer={updated=>onUpdateCustomers(customers.map(c=>c.id===updated.id?updated:c))}
      />
    );
  }

  // ── MÜŞTERİ LİSTESİ ──
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}}>
        <h2 style={{fontWeight:700,fontSize:'16px',color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.05em'}}>Müşteriler ({customers.length})</h2>
        <button onClick={()=>setAddOpen(true)} style={{display:'flex',alignItems:'center',gap:'6px',background:'#4f8ef7',border:'none',borderRadius:'8px',padding:'10px 18px',color:'#fff',cursor:'pointer',fontWeight:700,fontSize:'13px'}}><IcoPlus size={15}/>Yeni Müşteri</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:'16px'}}>
        {customers.map(c=>{
          const bak=calcBalance(c.cariEntries||[]);
          const cekim=(c.cariEntries||[]).filter(e=>e.type==='cekim').length;
          const isBorc=bak>0;
          return(
            <Card key={c.id}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'12px'}}>
                <div onClick={()=>onClearDetail&&window.location.assign('#customers/'+c.id)} style={{flex:1,cursor:'pointer'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'}}>
                    <span style={{fontWeight:700,fontSize:'15px'}}>{c.name}</span>
                    <Badge color="#4f8ef7">{c.code}</Badge>
                  </div>
                  <div style={{color:'#64748b',fontSize:'12px'}}>{c.phone}</div>
                </div>
                <button onClick={()=>setDeleteId(c.id)} style={{background:'none',border:'1px solid rgba(239,68,68,0.25)',borderRadius:'6px',padding:'5px',cursor:'pointer',color:'#ef4444',display:'flex',alignItems:'center',flexShrink:0}}><IcoTrash size={13}/></button>
              </div>
              <div onClick={()=>window.location.assign('#customers/'+c.id)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}}>
                <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
                  <Badge color="#f59e0b">%{c.commissionRate} Kom.</Badge>
                  <Badge color="#64748b">{cekim} çekim</Badge>
                </div>
                <div style={{textAlign:'right'}}>
                  <div className="tabular-nums" style={{color:isBorc?'#ef4444':'#22c55e',fontWeight:700,fontSize:'14px'}}>{fmtTL(Math.abs(bak))}</div>
                  <div style={{fontSize:'10px',color:isBorc?'#ef4444':'#22c55e',fontWeight:600}}>{isBorc?'Borçlu':'Alacaklı'}</div>
                </div>
              </div>
            </Card>
          );
        })}
        {customers.length===0&&(
          <div style={{gridColumn:'1/-1',textAlign:'center',padding:'60px',color:'#64748b'}}>
            <div style={{fontSize:'40px',marginBottom:'12px'}}>👥</div>
            <div style={{fontSize:'16px',fontWeight:600,marginBottom:'6px'}}>Henüz müşteri yok</div>
            <div style={{fontSize:'13px'}}>Yeni müşteri eklemek için butona tıklayın</div>
          </div>
        )}
      </div>
      <CustomerFormModal open={addOpen} onClose={()=>setAddOpen(false)} onSave={handleAdd}/>
      <ConfirmModal open={!!deleteId} onClose={()=>setDeleteId(null)} onConfirm={()=>{handleDelete(deleteId);setDeleteId(null);}} title="Müşteriyi Sil" message="Bu müşteriyi ve tüm cari kayıtlarını silmek istediğinizden emin misiniz? Bu işlem geri alınamaz."/>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
