      </nav>
      <div style={{padding:'8px',borderTop:'1px solid rgba(255,255,255,0.07)',flexShrink:0,display:'flex',flexDirection:'column',gap:'2px'}}>
        {!collapsed&&(
          <div style={{padding:'8px 14px',borderRadius:'8px',background:'rgba(15,23,42,0.8)',marginBottom:'4px',display:'flex',alignItems:'center',gap:'6px'}}>
            <div style={{width:'7px',height:'7px',borderRadius:'50%',background:statusColor,flexShrink:0}}/>
            <span style={{fontSize:'10px',color:statusColor,fontWeight:600,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{statusLabel}</span>
          </div>
        )}
        <button onClick={onLogout} title={collapsed?'Çıkış':''}
          style={{width:'100%',display:'flex',alignItems:'center',gap:'10px',padding:collapsed?'10px 0':'9px 14px',justifyContent:collapsed?'center':'flex-start',borderRadius:'10px',border:'1px solid rgba(100,116,139,0.2)',background:'transparent',color:'#94a3b8',cursor:'pointer',fontWeight:600,fontSize:'12px',boxSizing:'border-box'}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          {!collapsed&&'Çıkış Yap'}
        </button>
        <button onClick={()=>setCollapsed(c=>!c)}
          style={{width:'100%',display:'flex',alignItems:'center',gap:'10px',padding:collapsed?'10px 0':'9px 14px',justifyContent:collapsed?'center':'flex-start',borderRadius:'10px',border:'none',background:'transparent',color:'#64748b',cursor:'pointer',fontWeight:600,fontSize:'12px',boxSizing:'border-box'}}>
          {collapsed?<IcoChevronRight size={14}/>:<IcoChevronLeft size={14}/>}
          {!collapsed&&'Daralt'}
        </button>
      </div>
    </div>
  );
}

function AdminUsersPage({token,onUsernameChanged,currentUsername}){
  const[users,setUsers]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState('');
  const[actionLoading,setActionLoading]=useState('');
  const[showPwd,setShowPwd]=useState({});
  const[editModal,setEditModal]=useState(null);
  const[addModal,setAddModal]=useState(false);
  const[form,setForm]=useState({});
  const[formErr,setFormErr]=useState('');

  const load=async()=>{
    setLoading(true);setError('');
    try{const u=await apiAdminUsers(token);setUsers(u);}
    catch(e){setError(e.message);}
    finally{setLoading(false);}
  };
  useEffect(()=>{load();},[]);

  const action=async(fn,key)=>{
    setActionLoading(key);
    try{await fn();await load();}
    catch(e){alert(e.message);}
    finally{setActionLoading('');}
  };

  const openEdit=(u)=>{setForm({username:u.username,password:''});setFormErr('');setEditModal(u.username);};
  const openAdd=()=>{setForm({username:'',password:'',role:'user'});setFormErr('');setAddModal(true);};

  const submitEdit=async()=>{
    setFormErr('');
    if(!form.username.trim()){setFormErr('Kullanıcı adı boş olamaz');return;}
    if(form.password&&form.password.length<6){setFormErr('Şifre en az 6 karakter olmalı');return;}
    try{
      const r=await fetch(`/api/admin/users/${editModal}`,{method:'PUT',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify({newUsername:form.username.trim(),newPassword:form.password||undefined})});
      const d=await r.json();
      if(!r.ok){setFormErr(d.error||'Hata');return;}
      const newUn=form.username.trim();
      setEditModal(null);await load();
      if(onUsernameChanged&&editModal===currentUsername)onUsernameChanged(newUn);
    }catch(e){setFormErr(e.message);}
  };

  const submitAdd=async()=>{
    setFormErr('');
    if(!form.username.trim()||!form.password){setFormErr('Kullanıcı adı ve şifre gerekli');return;}
    if(form.password.length<6){setFormErr('Şifre en az 6 karakter olmalı');return;}
    try{
      const r=await fetch('/api/admin/users',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify({username:form.username.trim(),password:form.password,role:form.role||'user'})});
      const d=await r.json();
      if(!r.ok){setFormErr(d.error||'Hata');return;}
      setAddModal(false);await load();
    }catch(e){setFormErr(e.message);}
  };

  const statusBadge=(s)=>{
    const cfg={pending:{color:'#f59e0b',bg:'rgba(245,158,11,0.1)',label:'Bekliyor'},approved:{color:'#22c55e',bg:'rgba(34,197,94,0.1)',label:'Onaylı'},rejected:{color:'#ef4444',bg:'rgba(239,68,68,0.1)',label:'Reddedildi'}};
    const c=cfg[s]||{color:'#64748b',bg:'rgba(100,116,139,0.1)',label:s};
    return<span style={{padding:'3px 10px',borderRadius:'20px',fontSize:'11px',fontWeight:700,background:c.bg,color:c.color,border:`1px solid ${c.color}44`}}>{c.label}</span>;
  };

  const inpS=_adminInpS;
  const thS={padding:'10px 14px',textAlign:'left',color:'#64748b',fontWeight:600,fontSize:'11px',textTransform:'uppercase',borderBottom:'1px solid rgba(255,255,255,0.07)'};
  const td={padding:'10px 14px',fontSize:'13px'};

  const pending=users.filter(u=>u.status==='pending');

  if(loading)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'80px',flexDirection:'column',gap:'12px'}}>
      <div style={{width:'28px',height:'28px',borderRadius:'50%',border:'3px solid #4f8ef7',borderTopColor:'transparent',animation:'spin 0.8s linear infinite'}}/>
      <div style={{color:'#64748b',fontSize:'13px'}}>Yükleniyor…</div>
    </div>
  );

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'20px'}}>
      {error&&<div style={{color:'#ef4444',background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:'10px',padding:'12px 16px'}}>{error}</div>}

      {/* Onay Bekleyenler */}
      {pending.length>0&&(
        <Card style={{padding:0,overflow:'hidden',border:'1px solid rgba(245,158,11,0.25)'}}>
          <div style={{padding:'14px 18px',borderBottom:'1px solid rgba(255,255,255,0.07)',display:'flex',alignItems:'center',gap:'10px'}}>
            <div style={{width:'8px',height:'8px',borderRadius:'50%',background:'#f59e0b',animation:'pulse 1.5s infinite'}}/>
            <span style={{fontWeight:700,fontSize:'14px',color:'#f59e0b'}}>Onay Bekleyen ({pending.length})</span>
          </div>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead><tr>{['Kullanıcı Adı','Şifre','Kayıt Tarihi','İşlemler'].map(h=><th key={h} style={thS}>{h}</th>)}</tr></thead>
              <tbody>
                {pending.map(u=>(
                  <tr key={u.username} style={{borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                    <td style={{...td,fontWeight:700,color:'#e2e8f0'}}>{u.username}</td>
                    <td style={td}>
                      <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                        <code style={{background:'rgba(255,255,255,0.05)',padding:'3px 8px',borderRadius:'4px',fontSize:'12px',color:'#e2e8f0'}}>{showPwd[u.username]?u.passwordPlain:'••••••••'}</code>
                        <button onClick={()=>setShowPwd(p=>({...p,[u.username]:!p[u.username]}))} style={{background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:'12px'}}>
                          {showPwd[u.username]?'Gizle':'Göster'}
                        </button>
                      </div>
                    </td>
                    <td style={{...td,color:'#64748b'}}>{u.createdAt?new Date(u.createdAt).toLocaleString('tr-TR'):'—'}</td>
                    <td style={td}>
                      <div style={{display:'flex',gap:'6px'}}>
                        <button disabled={actionLoading===u.username+'_approve'} onClick={()=>action(()=>apiApproveUser(token,u.username),u.username+'_approve')} style={{padding:'6px 14px',borderRadius:'6px',border:'none',background:'linear-gradient(135deg,#22c55e,#16a34a)',color:'#fff',cursor:'pointer',fontWeight:700,fontSize:'12px'}}>✓ Onayla</button>
                        <button disabled={actionLoading===u.username+'_reject'} onClick={()=>action(()=>apiRejectUser(token,u.username),u.username+'_reject')} style={{padding:'6px 14px',borderRadius:'6px',border:'1px solid rgba(239,68,68,0.3)',background:'rgba(239,68,68,0.1)',color:'#ef4444',cursor:'pointer',fontWeight:700,fontSize:'12px'}}>✗ Reddet</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Card>
      )}

      {/* Tüm Kullanıcılar */}
      <Card style={{padding:0,overflow:'hidden'}}>
        <div style={{padding:'14px 18px',borderBottom:'1px solid rgba(255,255,255,0.07)',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'10px'}}>
          <span style={{fontWeight:700,fontSize:'14px'}}>Tüm Kullanıcılar ({users.length})</span>
          <div style={{display:'flex',gap:'8px'}}>
            <button onClick={load} style={{display:'flex',alignItems:'center',gap:'6px',background:'rgba(79,142,247,0.1)',border:'1px solid rgba(79,142,247,0.2)',borderRadius:'8px',padding:'6px 12px',color:'#4f8ef7',cursor:'pointer',fontSize:'12px',fontWeight:600}}>
              <IcoRefresh size={12}/> Yenile
            </button>
            <button onClick={openAdd} style={{display:'flex',alignItems:'center',gap:'6px',background:'linear-gradient(135deg,#22c55e,#16a34a)',border:'none',borderRadius:'8px',padding:'6px 14px',color:'#fff',cursor:'pointer',fontSize:'12px',fontWeight:700}}>
              + Yeni Kullanıcı
            </button>
          </div>
        </div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr>{['Kullanıcı Adı','Şifre','Rol','Durum','Kayıt Tarihi','İşlemler'].map(h=><th key={h} style={thS}>{h}</th>)}</tr></thead>
            <tbody>
              {users.map(u=>(
                <tr key={u.username} style={{borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                  <td style={{...td,fontWeight:700,color:'#e2e8f0'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                      <div style={{width:'28px',height:'28px',borderRadius:'8px',background:u.role==='admin'?'rgba(168,85,247,0.15)':'rgba(79,142,247,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:'12px',color:u.role==='admin'?'#a855f7':'#4f8ef7',flexShrink:0}}>{u.username[0].toUpperCase()}</div>
                      {u.username}
                    </div>
                  </td>
                  <td style={td}>
                    <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                      <code style={{background:'rgba(255,255,255,0.05)',padding:'3px 8px',borderRadius:'4px',fontSize:'12px',color:'#e2e8f0'}}>{showPwd[u.username]?u.passwordPlain:'••••••••'}</code>
                      <button onClick={()=>setShowPwd(p=>({...p,[u.username]:!p[u.username]}))} style={{background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:'12px'}}>
                        {showPwd[u.username]?'Gizle':'Göster'}
                      </button>
                    </div>
                  </td>
                  <td style={td}>
                    <span style={{padding:'3px 10px',borderRadius:'20px',fontSize:'11px',fontWeight:700,background:u.role==='admin'?'rgba(168,85,247,0.1)':'rgba(79,142,247,0.1)',color:u.role==='admin'?'#a855f7':'#4f8ef7',border:`1px solid ${u.role==='admin'?'#a855f744':'#4f8ef744'}`}}>
                      {u.role==='admin'?'Admin':'Kullanıcı'}
                    </span>
                  </td>
                  <td style={td}>{statusBadge(u.status)}</td>
                  <td style={{...td,color:'#64748b'}}>{u.createdAt?new Date(u.createdAt).toLocaleString('tr-TR'):'—'}</td>
                  <td style={td}>
                    <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
                      {u.status==='pending'&&<button disabled={actionLoading===u.username+'_approve'} onClick={()=>action(()=>apiApproveUser(token,u.username),u.username+'_approve')} style={{padding:'5px 10px',borderRadius:'6px',border:'none',background:'rgba(34,197,94,0.15)',color:'#22c55e',cursor:'pointer',fontWeight:700,fontSize:'11px',border:'1px solid rgba(34,197,94,0.3)'}}>Onayla</button>}
                      {u.status==='pending'&&<button disabled={actionLoading===u.username+'_reject'} onClick={()=>action(()=>apiRejectUser(token,u.username),u.username+'_reject')} style={{padding:'5px 10px',borderRadius:'6px',border:'1px solid rgba(239,68,68,0.3)',background:'rgba(239,68,68,0.1)',color:'#ef4444',cursor:'pointer',fontWeight:700,fontSize:'11px'}}>Reddet</button>}
                      {u.status==='rejected'&&<button disabled={actionLoading===u.username+'_approve'} onClick={()=>action(()=>apiApproveUser(token,u.username),u.username+'_approve')} style={{padding:'5px 10px',borderRadius:'6px',border:'none',background:'rgba(34,197,94,0.1)',color:'#22c55e',cursor:'pointer',fontWeight:700,fontSize:'11px',border:'1px solid rgba(34,197,94,0.3)'}}>Onayla</button>}
                      <button onClick={()=>openEdit(u)} style={{padding:'5px 10px',borderRadius:'6px',border:'1px solid rgba(79,142,247,0.3)',background:'rgba(79,142,247,0.08)',color:'#4f8ef7',cursor:'pointer',fontWeight:700,fontSize:'11px'}}>Düzenle</button>
                      {u.username!=='admin'&&<button disabled={actionLoading===u.username+'_del'} onClick={()=>{if(window.confirm(`"${u.username}" silinsin mi?`))action(()=>apiDeleteUser(token,u.username),u.username+'_del');}} style={{padding:'5px 10px',borderRadius:'6px',border:'1px solid rgba(239,68,68,0.3)',background:'rgba(239,68,68,0.08)',color:'#ef4444',cursor:'pointer',fontWeight:700,fontSize:'11px'}}>Sil</button>}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>

      {editModal&&<AdminUserModal title={`Düzenle — ${editModal}`} onClose={()=>setEditModal(null)} onSubmit={submitEdit} submitLabel="Kaydet" form={form} setForm={setForm} formErr={formErr} editModal={editModal} addModal={false}/>}
      {addModal&&<AdminUserModal title="Yeni Kullanıcı Ekle" onClose={()=>setAddModal(false)} onSubmit={submitAdd} submitLabel="Ekle" form={form} setForm={setForm} formErr={formErr} editModal={null} addModal={true}/>}
      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}`}</style>
    </div>
  );
}

/* ── WHATSAPP QUEUE PAGE ── */
function WhatsAppQueuePage({token,allUsers,onReload}){
  const today=new Date().toISOString().slice(0,10);
  const[queue,setQueue]=React.useState([]);
  const[loading,setLoading]=React.useState(true);
  const[error,setError]=React.useState('');
  const[edits,setEdits]=React.useState({});
  const[selectedCustomer,setSelectedCustomer]=React.useState({});
  const[allCustomers,setAllCustomers]=React.useState([]);
  const[bulkLoading,setBulkLoading]=React.useState(false);
  const[dupWarning,setDupWarning]=React.useState({});
  const[startDate,setStartDate]=React.useState(today);
  const[endDate,setEndDate]=React.useState(today);
  const[statusFilter,setStatusFilter]=React.useState('all');

  const loadQueue=async(s,e)=>{
    setLoading(true);setError('');
    try{
      const sd=s!==undefined?s:startDate;
      const ed=e!==undefined?e:endDate;
      const r=await fetch(`/api/whatsapp/queue?startDate=${sd}&endDate=${ed}`,{headers:{Authorization:'Bearer '+token}});
      if(!r.ok)throw new Error('Kuyruk yüklenemedi');
      setQueue(await r.json());
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  };

  React.useEffect(()=>{loadQueue();},[]);

  React.useEffect(()=>{
    if(!allUsers||allUsers.length===0)return;
    const loadAll=async()=>{
      const list=[];
      for(const u of allUsers.filter(u=>u.status==='approved')){
        try{
          const r=await fetch(`/api/admin/user-data/${u.username}`,{headers:{Authorization:'Bearer '+token}});
          if(r.ok){const d=await r.json();(d.customers||[]).forEach(c=>list.push({...c,_username:u.username}));}
        }catch(e){}
      }
      setAllCustomers(list);
    };
    loadAll();
  },[JSON.stringify(allUsers)]);

  const getEdit=(id,field,fallback)=>edits[id]&&edits[id][field]!==undefined?edits[id][field]:fallback;
  const setEdit=(id,field,val)=>setEdits(p=>({...p,[id]:{...p[id],[field]:val}}));

  const handleAssign=async(item,force)=>{
    const custId=selectedCustomer[item.id];
    if(!custId){setError('Müşteri seçiniz');return;}
    const cust=allCustomers.find(c=>c.id===custId);
    if(!cust||!cust._username){setError('Müşteri bulunamadı, sayfayı yenileyip tekrar deneyin');return;}
    const ocr={
      tutar:Number(getEdit(item.id,'tutar',item.ocr?.tutar))||0,
      taksit:parseInt(getEdit(item.id,'taksit',item.ocr?.taksit))||1,
      banka:getEdit(item.id,'banka',item.ocr?.banka)||'',
      tarih:getEdit(item.id,'tarih',item.receivedAt?item.receivedAt.slice(0,10):new Date().toISOString().slice(0,10))
    };
    try{
      await apiWAAssign(token,item.id,custId,cust._username,ocr,force);
      setDupWarning(p=>({...p,[item.id]:null}));
      setError('');
      loadQueue();
      if(onReload)onReload();
    }catch(e){
      if(e.code==='mükerrer'){
        setDupWarning(p=>({...p,[item.id]:{message:e.message}}));
      }else{
        setError(e.message);
      }
    }
  };

  const handleUpdate=async(item)=>{
    const username=item.assignedTo?.username;
    if(!username){setError('Kullanıcı bilgisi bulunamadı');return;}
    const ocr={
      tutar:Number(getEdit(item.id,'tutar',item.ocr?.tutar))||0,
      taksit:parseInt(getEdit(item.id,'taksit',item.ocr?.taksit))||1,
      banka:getEdit(item.id,'banka',item.ocr?.banka)||'',
      tarih:getEdit(item.id,'tarih',item.receivedAt?item.receivedAt.slice(0,10):new Date().toISOString().slice(0,10))
    };
    try{
      await apiWAUpdate(token,item.id,username,ocr);
      setError('');
      loadQueue();
      if(onReload)onReload();
    }catch(e){setError(e.message);}
  };

  const handleBulkAssign=async()=>{
    const assignable=queue.filter(item=>item.status!=='assigned'&&selectedCustomer[item.id]);
    if(!assignable.length){setError('Önce işlenmemiş dekontlar için müşteri seçin');return;}
    setBulkLoading(true);setError('');
    let ok=0,fail=0;
    for(const item of assignable){
      const custId=selectedCustomer[item.id];
      const cust=allCustomers.find(c=>c.id===custId);
      if(!cust){fail++;continue;}
      const ocr={tutar:getEdit(item.id,'tutar',item.ocr?.tutar),taksit:getEdit(item.id,'taksit',item.ocr?.taksit),banka:getEdit(item.id,'banka',item.ocr?.banka)};
      try{await apiWAAssign(token,item.id,custId,cust._username,ocr);ok++;}
      catch(e){fail++;}
    }
    setBulkLoading(false);
    loadQueue();
    if(onReload)onReload();
    if(fail)setError(`${ok} kayıt işlendi, ${fail} kayıt başarısız.`);
  };

  const handleDelete=async(id)=>{
    if(!confirm('Bu kaydı kuyruktan silmek istediğinize emin misiniz?'))return;
    try{await apiWADelete(token,id);loadQueue();}
    catch(e){setError(e.message);}
  };

  const filtered=queue.filter(item=>{
    if(statusFilter==='pending')return item.status!=='assigned';
    if(statusFilter==='assigned')return item.status==='assigned';
    return true;
  }).sort((a,b)=>new Date(b.receivedAt||0)-new Date(a.receivedAt||0));

  const pendingCount=queue.filter(i=>i.status!=='assigned').length;
  const assignedCount=queue.filter(i=>i.status==='assigned').length;

  const inp={background:'#1e2d45',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'6px',color:'#e2e8f0',padding:'6px 8px',fontSize:'13px',width:'100%'};
  const dateInp={background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'8px',color:'#e2e8f0',padding:'8px 12px',fontSize:'13px',outline:'none'};
  const fBtn=(val,lbl,cnt,col)=>(
    <button onClick={()=>setStatusFilter(val)} style={{padding:'7px 14px',borderRadius:'8px',border:statusFilter===val?`1px solid ${col}44`:'1px solid transparent',cursor:'pointer',fontWeight:600,fontSize:'12px',background:statusFilter===val?col+'22':'rgba(255,255,255,0.04)',color:statusFilter===val?col:'#64748b',transition:'all .15s'}}>
      {lbl}{cnt!=null?` (${cnt})`:''}
    </button>
  );

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
      <Card style={{padding:'16px 20px'}}>
        <div style={{display:'flex',gap:'12px',flexWrap:'wrap',alignItems:'flex-end'}}>
          <div>
            <div style={{fontSize:'11px',color:'#64748b',fontWeight:600,marginBottom:'5px'}}>BAŞLANGIÇ</div>
            <input type="date" style={dateInp} value={startDate} onChange={e=>setStartDate(e.target.value)}/>
          </div>
          <div>
            <div style={{fontSize:'11px',color:'#64748b',fontWeight:600,marginBottom:'5px'}}>BİTİŞ</div>
            <input type="date" style={dateInp} value={endDate} onChange={e=>setEndDate(e.target.value)}/>
          </div>
          <button onClick={()=>loadQueue(startDate,endDate)} style={{padding:'8px 18px',borderRadius:'8px',border:'none',background:'linear-gradient(135deg,#4f8ef7,#3b6fd4)',color:'#fff',fontWeight:700,fontSize:'13px',cursor:'pointer'}}>
            Filtrele
          </button>
          <button onClick={()=>{setStartDate(today);setEndDate(today);loadQueue(today,today);}} style={{padding:'8px 14px',borderRadius:'8px',border:'1px solid rgba(255,255,255,0.1)',background:'transparent',color:'#94a3b8',fontWeight:600,fontSize:'12px',cursor:'pointer'}}>
            Bugün
          </button>
          <div style={{marginLeft:'auto',display:'flex',gap:'6px',flexWrap:'wrap'}}>
            {fBtn('all','Tümü',queue.length,'#94a3b8')}
            {fBtn('pending','Bekliyor',pendingCount,'#f59e0b')}
            {fBtn('assigned','İşlendi',assignedCount,'#22c55e')}
          </div>
        </div>
      </Card>

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'10px'}}>
        <div style={{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}}>
          <span style={{fontWeight:700,fontSize:'16px',color:'#e2e8f0'}}>WhatsApp Kuyruk</span>
          {pendingCount>0&&<span style={{padding:'3px 10px',borderRadius:'20px',fontSize:'11px',fontWeight:700,background:'rgba(245,158,11,0.1)',color:'#f59e0b',border:'1px solid rgba(245,158,11,0.3)'}}>{pendingCount} bekliyor</span>}
          {assignedCount>0&&<span style={{padding:'3px 10px',borderRadius:'20px',fontSize:'11px',fontWeight:700,background:'rgba(34,197,94,0.1)',color:'#22c55e',border:'1px solid rgba(34,197,94,0.3)'}}>{assignedCount} işlendi</span>}
        </div>
        {pendingCount>0&&(
          <button onClick={handleBulkAssign} disabled={bulkLoading} style={{padding:'9px 18px',background:'#4f8ef7',color:'#fff',border:'none',borderRadius:'8px',cursor:'pointer',fontWeight:700,fontSize:'13px',opacity:bulkLoading?0.6:1}}>
            {bulkLoading?'İşleniyor...':'Tümünü Carilere İşle'}
          </button>
        )}
      </div>

      {error&&<div style={{background:'rgba(239,68,68,0.1)',border:'1px solid #ef4444',borderRadius:'8px',padding:'12px',color:'#ef4444',fontSize:'13px'}}>{error}</div>}
      {loading&&<div style={{color:'#64748b',textAlign:'center',padding:'40px'}}>Yükleniyor...</div>}
      {!loading&&filtered.length===0&&<Card><div style={{color:'#64748b',textAlign:'center',padding:'30px',fontSize:'14px'}}>Bu tarih aralığında kayıt bulunamadı</div></Card>}

      {filtered.map(item=>{
        const isAssigned=item.status==='assigned';
        return(
          <div key={item.id} style={{background:'#131929',borderRadius:'12px',padding:'18px 20px',border:isAssigned?'1px solid rgba(34,197,94,0.2)':'1px solid rgba(255,255,255,0.07)'}}>
            <div style={{display:'flex',gap:'12px',flexWrap:'wrap',marginBottom:'12px',alignItems:'center'}}>
              <span style={{fontSize:'12px',color:'#64748b'}}>📱 {item.from}</span>
              <span style={{fontSize:'12px',color:'#64748b'}}>🕐 {item.receivedAt?new Date(item.receivedAt).toLocaleString('tr-TR'):'-'}</span>
              {isAssigned
                ?<span style={{marginLeft:'auto',padding:'4px 12px',borderRadius:'20px',fontSize:'11px',fontWeight:700,background:'rgba(34,197,94,0.12)',color:'#22c55e',border:'1px solid rgba(34,197,94,0.3)'}}>✓ İşlendi — {item.assignedAt?new Date(item.assignedAt).toLocaleString('tr-TR'):''}</span>
                :<span style={{marginLeft:'auto',padding:'4px 12px',borderRadius:'20px',fontSize:'11px',fontWeight:700,background:'rgba(245,158,11,0.1)',color:'#f59e0b',border:'1px solid rgba(245,158,11,0.3)'}}>⏳ Bekliyor</span>
              }
            </div>

            {isAssigned&&item.assignedTo&&(
              <div style={{background:'rgba(34,197,94,0.06)',border:'1px solid rgba(34,197,94,0.15)',borderRadius:'8px',padding:'10px 14px',marginBottom:'12px',fontSize:'13px',display:'flex',gap:'16px',flexWrap:'wrap'}}>
                <span style={{color:'#94a3b8'}}>Müşteri: <b style={{color:'#e2e8f0'}}>{item.assignedTo.customerName||item.assignedTo.customerId}</b></span>
                <span style={{color:'#94a3b8'}}>Tutar: <b style={{color:'#e2e8f0'}}>₺{Number(item.assignedTo.amount||0).toLocaleString('tr-TR')}</b></span>
                <span style={{color:'#94a3b8'}}>Banka: <b style={{color:'#e2e8f0'}}>{item.assignedTo.bank||'—'}</b></span>
                <span style={{color:'#94a3b8'}}>Taksit: <b style={{color:'#e2e8f0'}}>{item.assignedTo.taksit||1}</b></span>
              </div>
            )}

            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:'10px',marginBottom:'12px'}}>
              {[['tutar','Tutar (₺)','number'],['taksit','Taksit','number']].map(([field,lbl,type])=>(
                <div key={field}>
                  <div style={{fontSize:'11px',color:'#64748b',fontWeight:600,marginBottom:'4px'}}>{lbl}</div>
                  <input style={inp} type={type} value={getEdit(item.id,field,item.ocr?.[field]||'')} onChange={e=>setEdit(item.id,field,e.target.value)}/>
                </div>
              ))}
              <div>
                <div style={{fontSize:'11px',color:'#64748b',fontWeight:600,marginBottom:'4px'}}>Banka</div>
                <select style={inp} value={getEdit(item.id,'banka',item.ocr?.banka||'')} onChange={e=>setEdit(item.id,'banka',e.target.value)}>
                  <option value=''>Seç</option>
                  {['Akbank','QNB','Garanti','Diğer Banka','Kuveyt','Ziraat','Halk','İş Bankası','Vakıf','YKB'].map(b=><option key={b} value={b}>{b}</option>)}
                </select>
              </div>
              <div>
                <div style={{fontSize:'11px',color:'#64748b',fontWeight:600,marginBottom:'4px'}}>Kayıt Tarihi</div>
                <input style={inp} type="date" value={getEdit(item.id,'tarih',item.receivedAt?item.receivedAt.slice(0,10):new Date().toISOString().slice(0,10))} onChange={e=>setEdit(item.id,'tarih',e.target.value)}/>
              </div>
              {!isAssigned&&(
                <div style={{gridColumn:'span 2'}}>
                  <div style={{fontSize:'11px',color:'#64748b',fontWeight:600,marginBottom:'4px'}}>Müşteri</div>
                  <select style={inp} value={selectedCustomer[item.id]||''} onChange={e=>setSelectedCustomer(p=>({...p,[item.id]:e.target.value}))}>
                    <option value=''>Müşteri seç</option>
                    {allCustomers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </div>
              )}
            </div>

            <div style={{display:'flex',gap:'8px',flexDirection:'column'}}>
              <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
                {!isAssigned&&(
                  <button onClick={()=>handleAssign(item)} disabled={!selectedCustomer[item.id]}
                    style={{padding:'8px 16px',background:'#22c55e',color:'#fff',border:'none',borderRadius:'8px',cursor:'pointer',fontWeight:600,fontSize:'13px',opacity:!selectedCustomer[item.id]?0.4:1}}>
                    Cariye İşle
                  </button>
                )}
                {isAssigned&&(
                  <button onClick={()=>handleUpdate(item)}
                    style={{padding:'8px 16px',background:'#4f8ef7',color:'#fff',border:'none',borderRadius:'8px',cursor:'pointer',fontWeight:600,fontSize:'13px'}}>
                    Güncelle
                  </button>
                )}
                <button onClick={()=>handleDelete(item.id)}
                  style={{padding:'8px 14px',background:'rgba(239,68,68,0.1)',color:'#ef4444',border:'1px solid rgba(239,68,68,0.25)',borderRadius:'8px',cursor:'pointer',fontWeight:600,fontSize:'13px'}}>
                  Sil
                </button>
              </div>
              {dupWarning[item.id]&&(
                <div style={{background:'rgba(234,179,8,0.15)',border:'1px solid rgba(234,179,8,0.4)',borderRadius:'8px',padding:'10px 14px',fontSize:'13px',color:'#fbbf24',display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}}>
                  <span>⚠️ {dupWarning[item.id].message} Yine de eklemek istiyorsanız:</span>
                  <button onClick={()=>handleAssign(item,true)} style={{padding:'6px 14px',background:'rgba(234,179,8,0.3)',color:'#fbbf24',border:'1px solid rgba(234,179,8,0.5)',borderRadius:'6px',cursor:'pointer',fontWeight:700,fontSize:'12px',whiteSpace:'nowrap'}}>Zorla Ekle</button>
                  <button onClick={()=>setDupWarning(p=>({...p,[item.id]:null}))} style={{padding:'6px 10px',background:'transparent',color:'#94a3b8',border:'none',cursor:'pointer',fontSize:'12px'}}>İptal</button>
                </div>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );

function useHashRouter(){
  const parse=()=>{
    const h=(window.location.hash||'#dashboard').replace('#','');
    const parts=h.split('/');
    return{page:parts[0]||'dashboard',param:parts[1]||null};
  };
  const[route,setRoute]=useState(parse);
  useEffect(()=>{
    const handler=()=>setRoute(parse());
    window.addEventListener('hashchange',handler);
    return()=>window.removeEventListener('hashchange',handler);
  },[]);
  const navigate=(page,param=null)=>{
    window.location.hash=param?`${page}/${param}`:page;
  };
  return[route,navigate];
}

/* ── KASA PAGE ── */
function KasaPage({kasa,onUpdateKasa,customers,companies}){
  const transactions=(kasa&&kasa.transactions)||[];
  const today=new Date().toISOString().slice(0,10);
  const firstDay=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().slice(0,10);
  const[dateFrom,setDateFrom]=useState(firstDay);
  const[dateTo,setDateTo]=useState(today);
  const[typeFilter,setTypeFilter]=useState('all');
  const[addOpen,setAddOpen]=useState(false);
  const[addForm,setAddForm]=useState({date:today,type:'giris',amount:'',description:''});
  const[kapatOpen,setKapatOpen]=useState(false);
  const[kapatDate,setKapatDate]=useState(today);
  const[kapatErr,setKapatErr]=useState('');

  const fmt=n=>(n||0).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});
  const fmtDate=d=>d?d.split('-').reverse().join('.'):'';
  const inS={background:'rgba(30,39,64,.8)',border:'1px solid rgba(255,255,255,.1)',borderRadius:'8px',padding:'8px 12px',color:'#e2e8f0',fontSize:'13px'};

  // Eski per-transaction auto giris kayıtlarını filtrele (refId var = eski impl)
  const storedTx=transactions.filter(t=>!(t.auto&&t.type==='giris'&&t.refId)&&t.type!=='skipped');

  // Tüm cekimleri settlementDate'e göre grupla
  const settledIds=new Set(kasa.settledEntryIds||[]);
  const dailyCekimMap={};
  (customers||[]).forEach(c=>{
    (c.cariEntries||[]).filter(e=>e.type==='cekim').forEach(e=>{
      if(settledIds.has(e.id))return;
      const net=e.amount-(e.bankCost||0);
      const amount=+(net).toFixed(2);
      let tDate=e.settlementDate;
      if(!tDate){
        // Eski kayıtlar için fallback
        if(e.posType==='fiziki'){tDate=addCalendarDays(e.date,1);}
        else{
          const comp=(companies||[]).find(co=>co.id===e.companyId);
          const valor=comp?comp.valorDays:1;
          tDate=addBusinessDays(e.date,valor);
        }
      }
      if(!dailyCekimMap[tDate])dailyCekimMap[tDate]={amount:0,entries:[]};
      dailyCekimMap[tDate].amount=+(dailyCekimMap[tDate].amount+amount).toFixed(2);
      dailyCekimMap[tDate].entries.push({id:e.id,amount,companyName:e.companyName||'',bank:e.bank||''});
    });
  });

  // Hangi günler zaten stored veya atlandı?
  const storedDates=new Set(storedTx.filter(t=>t.auto&&t.type==='giris').map(t=>t.date));
  const skippedDates=new Set(transactions.filter(t=>t.type==='skipped').map(t=>t.date));

  // Virtual (bekleyen) entry'ler — stored veya atlanmış olmayanlar
  const virtualEntries=Object.entries(dailyCekimMap)
    .filter(([date])=>!storedDates.has(date)&&!skippedDates.has(date))
    .map(([date,info])=>{
      const d=new Date(date+'T00:00:00');
      const dow=d.getDay();
      const label=date+' Aktarım ('+info.entries.length+' işlem)';
      return{id:'virtual_'+date,date,type:'giris',amount:info.amount,description:label,auto:true,virtual:true};
    });

  const allTransactions=[...storedTx,...virtualEntries].sort((a,b)=>a.date<b.date?-1:1);

  const filtered=allTransactions.filter(t=>{
    if(dateFrom&&t.date<dateFrom)return false;
    if(dateTo&&t.date>dateTo)return false;
    if(typeFilter!=='all'&&t.type!==typeFilter)return false;
    return true;
  });

  const totalGiris=filtered.filter(t=>t.type==='giris').reduce((s,t)=>s+t.amount,0);
  const totalCikis=filtered.filter(t=>t.type==='cikis').reduce((s,t)=>s+t.amount,0);
  const genelBakiye=allTransactions.reduce((s,t)=>t.type==='giris'?s+t.amount:s-t.amount,0);

  let running=0;
  const runningMap={};
  allTransactions.forEach(t=>{running=+(running+(t.type==='giris'?t.amount:-t.amount)).toFixed(2);runningMap[t.id]=running;});

  const handleAdd=()=>{
    const amt=parseFloat(addForm.amount);
    if(!amt||!addForm.description.trim())return;
    const entry={id:uid(),date:addForm.date,type:addForm.type,amount:amt,description:addForm.description.trim(),auto:false};
    onUpdateKasa(prev=>({...prev,transactions:[...(prev.transactions||[]),entry]}));
    setAddOpen(false);
    setAddForm({date:today,type:'giris',amount:'',description:''});
  };
  const handleDelete=id=>{
    if(id.startsWith('virtual_')){
      const date=id.replace('virtual_','');
      const marker={id:'skip_'+date,date,type:'skipped',auto:true};
      onUpdateKasa(prev=>({...prev,transactions:[...(prev.transactions||[]),marker]}));
    }else{
      onUpdateKasa(prev=>({...prev,transactions:(prev.transactions||[]).filter(t=>t.id!==id)}));
    }
  };
  const handleGunuKapat=()=>{
    if(!kapatDate){setKapatErr('Tarih seçiniz.');return;}
    const info=dailyCekimMap[kapatDate];
    if(!info||!info.amount){setKapatErr('Bu tarihte yatacak çekim bulunamadı.');return;}
    if(storedDates.has(kapatDate)){setKapatErr('Bu gün zaten kasaya aktarıldı.');return;}
    const entry={id:uid(),date:kapatDate,type:'giris',description:kapatDate+' Gün Sonu — '+info.entries.length+' işlem',amount:info.amount,auto:true,virtual:false};
    const entryIds=info.entries.map(e=>e.id);
    onUpdateKasa(prev=>({
      ...prev,
      transactions:[...(prev.transactions||[]),entry],
      settledEntryIds:[...(prev.settledEntryIds||[]),...entryIds]
    }));
    setKapatOpen(false);setKapatErr('');
  };

  const rowStyle=(t)=>{
    if(t.virtual)return{borderBottom:'1px solid rgba(255,255,255,.05)',borderLeft:'3px solid #f59e0b',color:'#fcd34d'};
    if(t.auto&&t.type==='giris')return{borderBottom:'1px solid rgba(255,255,255,.05)',borderLeft:'3px solid #22c55e',color:'#e2e8f0'};
    if(t.type==='cikis')return{borderBottom:'1px solid rgba(255,255,255,.05)',color:'#e2e8f0'};
    return{borderBottom:'1px solid rgba(255,255,255,.05)',fontStyle:'italic',color:'#c4b5fd'};
  };

  return(
    <div>
      <h2 style={{fontWeight:800,fontSize:'20px',marginBottom:'20px'}}>Kasa</h2>
      <div style={{display:'flex',gap:'16px',marginBottom:'24px',flexWrap:'wrap'}}>
        <div style={{background:'rgba(30,39,64,.8)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'12px',padding:'20px 28px',minWidth:'180px'}}>
          <div style={{fontSize:'12px',color:'#94a3b8',marginBottom:'6px'}}>Güncel Bakiye</div>
          <div style={{fontSize:'26px',fontWeight:800,color:genelBakiye>=0?'#22c55e':'#ef4444'}}>{fmt(genelBakiye)} ₺</div>
        </div>
        <div style={{background:'rgba(30,39,64,.8)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'12px',padding:'20px 28px',minWidth:'160px'}}>
          <div style={{fontSize:'12px',color:'#94a3b8',marginBottom:'6px'}}>Toplam Giriş</div>
          <div style={{fontSize:'20px',fontWeight:700,color:'#22c55e'}}>{fmt(totalGiris)} ₺</div>
        </div>
        <div style={{background:'rgba(30,39,64,.8)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'12px',padding:'20px 28px',minWidth:'160px'}}>
          <div style={{fontSize:'12px',color:'#94a3b8',marginBottom:'6px'}}>Toplam Çıkış</div>
          <div style={{fontSize:'20px',fontWeight:700,color:'#ef4444'}}>{fmt(totalCikis)} ₺</div>
        </div>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}}>
          <button onClick={()=>{setKapatDate(today);setKapatErr('');setKapatOpen(true);}} style={{display:'flex',alignItems:'center',gap:'6px',background:'#f59e0b',border:'none',borderRadius:'8px',padding:'10px 18px',color:'#000',cursor:'pointer',fontWeight:700,fontSize:'13px'}}>Günü Kapat / Kasaya Aktar</button>
          <button onClick={()=>setAddOpen(true)} style={{display:'flex',alignItems:'center',gap:'6px',background:'#4f8ef7',border:'none',borderRadius:'8px',padding:'10px 18px',color:'#fff',cursor:'pointer',fontWeight:700,fontSize:'13px'}}><IcoPlus size={15}/>Manuel Hareket Ekle</button>
        </div>
      </div>
      <div style={{display:'flex',gap:'10px',marginBottom:'16px',flexWrap:'wrap',alignItems:'center'}}>
        <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={inS}/>
        <span style={{color:'#64748b'}}>—</span>
        <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} style={inS}/>
        <select value={typeFilter} onChange={e=>setTypeFilter(e.target.value)} style={inS}>
          <option value="all">Tümü</option>
          <option value="giris">Sadece Giriş</option>
          <option value="cikis">Sadece Çıkış</option>
        </select>
      </div>
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
          <thead>
            <tr style={{background:'rgba(30,39,64,.8)',color:'#94a3b8'}}>
              {['Tarih','Açıklama','Durum','Giriş','Çıkış','Bakiye',''].map(h=>(
                <th key={h} style={{padding:'10px 12px',textAlign:h==='Giriş'||h==='Çıkış'||h==='Bakiye'?'right':'left',fontWeight:600,borderBottom:'1px solid rgba(255,255,255,.08)'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map(t=>(
              <tr key={t.id} style={rowStyle(t)}>
                <td style={{padding:'9px 12px'}}>{renderDateCell(t)}</td>
                <td style={{padding:'9px 12px'}}>{t.description}</td>
                <td style={{padding:'9px 12px'}}>
                  {t.virtual&&<span style={{background:'rgba(245,158,11,.2)',color:'#fcd34d',borderRadius:'4px',padding:'1px 7px',fontSize:'11px',fontWeight:700}}>Bekliyor</span>}
                  {!t.virtual&&t.auto&&t.type==='giris'&&<span style={{background:'rgba(34,197,94,.15)',color:'#22c55e',borderRadius:'4px',padding:'1px 7px',fontSize:'11px',fontWeight:700}}>Aktarıldı</span>}
                  {!t.auto&&<span style={{background:'rgba(139,92,246,.2)',color:'#c4b5fd',borderRadius:'4px',padding:'1px 6px',fontSize:'11px'}}>Manuel</span>}
                  {t.auto&&t.type==='cikis'&&<span style={{background:'rgba(239,68,68,.15)',color:'#ef4444',borderRadius:'4px',padding:'1px 6px',fontSize:'11px'}}>Ödeme</span>}
                </td>
                <td style={{padding:'9px 12px',textAlign:'right',color:'#22c55e'}}>{t.type==='giris'?fmt(t.amount)+' ₺':''}</td>
                <td style={{padding:'9px 12px',textAlign:'right',color:'#ef4444'}}>{t.type==='cikis'?fmt(t.amount)+' ₺':''}</td>
                <td style={{padding:'9px 12px',textAlign:'right',color:(runningMap[t.id]||0)>=0?'#22c55e':'#ef4444',fontWeight:600}}>{fmt(runningMap[t.id]||0)} ₺</td>
                <td style={{padding:'9px 12px',textAlign:'right'}}>
                  {<button onClick={()=>handleDelete(t.id)} style={{background:'none',border:'none',color:'#ef4444',cursor:'pointer',padding:'2px 6px'}}><IcoTrash size={13}/></button>}

        </table>
      </div>
      {kapatOpen&&(
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:500}}>
          <div style={{background:'#131929',border:'1px solid rgba(255,255,255,.1)',borderRadius:'14px',padding:'28px',width:'360px',maxWidth:'95vw'}}>

              <div><label style={{fontSize:'12px',color:'#94a3b8',display:'block',marginBottom:'4px'}}>Tarih</label>

            </div>
            <div style={{display:'flex',gap:'10px',justifyContent:'flex-end',marginTop:'20px'}}>

            </div>

  const[waqCount,setWaqCount]=useState(0);
  const[allAdminUsers,setAllAdminUsers]=useState([]);

  const applyServerData=useCallback((data)=>{
    hydratingRef.current=true;
    const nextCustomers=Array.isArray(data.customers)?data.customers:[];
    const nextBanks=data.banks&&data.banks.length>0?normalizeBanks(data.banks,data.bankRatesVersion!==BANK_RATES_VERSION):INIT_BANKS;
    const nextKasa=data.kasa?{...data.kasa,transactions:Array.isArray(data.kasa.transactions)?data.kasa.transactions:[]}:{transactions:[]};
    const nextCompanies=Array.isArray(data.companies)?data.companies:[];
    const nextPartners=Array.isArray(data.partners)?data.partners:[];
    const nextExpenses=Array.isArray(data.expenses)?data.expenses:[];
    const nextPartnerPayments=Array.isArray(data.partnerPayments)?data.partnerPayments:[];
    const nextPartnerAdjustments=Array.isArray(data.partnerAdjustments)?data.partnerAdjustments:[];
    setCustomers(nextCustomers);
    setBanks(nextBanks);
    setKasa(nextKasa);
    setCompanies(nextCompanies);
    setPartners(nextPartners);
    setExpenses(nextExpenses);
    setPartnerPayments(nextPartnerPayments);
    setPartnerAdjustments(nextPartnerAdjustments);
    savedAtRef.current=data.savedAt||'';
    lastServerSnapshotRef.current=stableSerialize({customers:nextCustomers,banks:nextBanks,kasa:nextKasa,companies:nextCompanies,partners:nextPartners,expenses:nextExpenses,partnerPayments:nextPartnerPayments,partnerAdjustments:nextPartnerAdjustments});
    isDirtyRef.current=false;
    setSaveStatus('idle');
    setSavedTime('');
    setTimeout(()=>{hydratingRef.current=false;},0);
  },[]);

  const dirtyVersionRef=useRef(0);
  const markDirty=useCallback((updater)=>{
    isDirtyRef.current=true;
    dirtyVersionRef.current++;
    updater();
  },[]);

  const logout=()=>{clearAuth();setAuth(null);setAuthScreen('login');setInitialized(false);initRef.current=false;};

  useEffect(()=>{
    if(!auth){setInitialized(true);return;}
    apiFetchData(auth.token)
      .then(data=>{
        applyServerData(data);
        setInitialized(true);
      })
      .catch(e=>{
        if(e.message==='AUTH_EXPIRED'){clearAuth();setAuth(null);}
        else{console.error(e);setInitialized(true);}
      });
  },[auth?.token]);

  useEffect(()=>{
    if(!initialized||!auth)return;
    if(!initRef.current){initRef.current=true;return;}
    if(hydratingRef.current)return;
    const currentSnapshot=stableSerialize({customers,banks,kasa,companies,partners,expenses,partnerPayments,partnerAdjustments});
    if(currentSnapshot===lastServerSnapshotRef.current){
      isDirtyRef.current=false;
      if(saveStatus==='saving')setSaveStatus('idle');
      return;
    }
    if(!isDirtyRef.current)return;
    clearTimeout(saveTimerRef.current);
    setSaveStatus('saving');
    saveTimerRef.current=setTimeout(()=>{
      const versionAtSave=dirtyVersionRef.current;
      apiSaveData(auth.token,{customers,banks,kasa,companies,partners,expenses,partnerPayments,partnerAdjustments,bankRatesVersion:BANK_RATES_VERSION,savedAt:savedAtRef.current})
        .then(()=>{
          setSaveStatus('saved');setSavedTime(timeStr());
          // Kayıt sonrası güncel veriyi çek — ancak bu sırada yeni değişiklik yapıldıysa üzerine YAZMA
          apiFetchData(auth.token).then(data=>{
            if(dirtyVersionRef.current!==versionAtSave)return; // yeni lokal değişiklik var, ezme
            applyServerData(data);
          });
          setTimeout(()=>{setSaveStatus('idle');setSavedTime('');},5000);
        })
        .catch(e=>{
          if(e.message==='AUTH_EXPIRED'){clearAuth();setAuth(null);}
          else setSaveStatus('error');
        });
    },800);
    return()=>clearTimeout(saveTimerRef.current);
  },[customers,banks,kasa,companies,partners,expenses,partnerPayments,partnerAdjustments,initialized]);

  useEffect(()=>{
    if(!auth||auth.role!=='admin')return;
    const fetchWAQ=()=>apiWAQueue(auth.token).then(q=>setWaqCount(q.filter(i=>i.status==='pending').length)).catch(()=>{});
    fetchWAQ();
    const interval=setInterval(fetchWAQ,30000);
    return()=>clearInterval(interval);
  },[auth?.token,auth?.role]);

  useEffect(()=>{
    if(!auth||auth.role!=='admin')return;
    apiAdminUsers(auth.token).then(setAllAdminUsers).catch(()=>{});
  },[auth?.token,auth?.role]);

  const exportBackup=()=>{
    const blob=new Blob([JSON.stringify({customers,banks,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`zyreos_yedek_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1000);
  };

  const importBackup=(file)=>{
    if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(!data.customers||!data.banks)return alert('Geçersiz yedek dosyası.');
        if(!window.confirm(`${data.customers.length} müşteri yüklenecek. Mevcut veriler değiştirilecek. Devam?`))return;
        markDirty(()=>{
          setCustomers(data.customers);
          setBanks(normalizeBanks(data.banks));
        });
      }catch{alert('Dosya okunamadı.');}
    };
    reader.readAsText(file);
  };

  const handleReset=()=>{if(window.confirm('Tüm veriler sıfırlanacak. Emin misiniz?')){markDirty(()=>{setCustomers(INIT_CUSTOMERS);setBanks(INIT_BANKS);});}};

  if(!auth){
    if(authScreen==='register')return<RegisterPage onGoLogin={()=>setAuthScreen('login')}/>;
    return<LoginPage onLogin={a=>{setAuth(a);setInitialized(false);initRef.current=false;}} onGoRegister={()=>setAuthScreen('register')}/>;
  }

  if(!initialized)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#0a0d14',flexDirection:'column',gap:'16px'}}>
      <div style={{width:'36px',height:'36px',borderRadius:'50%',border:'3px solid #4f8ef7',borderTopColor:'transparent',animation:'spin 0.8s linear infinite'}}/>
      <div style={{color:'#64748b',fontSize:'14px'}}>Veriler yükleniyor…</div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  return(
    <div style={{display:'flex',minHeight:'100vh',background:'#0a0d14'}}>
      {isMobile&&mobileSidebarOpen&&<div onClick={()=>setMobileSidebarOpen(false)} style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.6)',zIndex:199}}/>}
      <Sidebar page={activePage} setPage={p=>{
        if(saveTimerRef.current&&isDirtyRef.current){
          clearTimeout(saveTimerRef.current);
          saveTimerRef.current=null;
          apiSaveData(auth.token,{customers,banks,kasa,companies,partners,bankRatesVersion:BANK_RATES_VERSION,savedAt:savedAtRef.current}).finally(()=>{
            navigate(p);
            apiFetchData(auth.token).then(applyServerData);
          });
        }else{
          navigate(p);
          apiFetchData(auth.token).then(applyServerData);
        }
      }} collapsed={collapsed} setCollapsed={setCollapsed}
        onReset={handleReset} saveStatus={saveStatus}
        onExport={exportBackup} onImport={importBackup} onLogout={logout}
        role={auth.role} username={auth.username}
        mobileOpen={mobileSidebarOpen} onMobileClose={()=>setMobileSidebarOpen(false)}
        waqCount={waqCount}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0,overflow:'hidden'}}>
        <Topbar page={activePage} saved={savedTime} onMenuToggle={()=>setMobileSidebarOpen(o=>!o)}/>
        <main style={{flex:1,overflowY:'auto',padding:isMobile?'12px':'24px'}}>
          {activePage==='dashboard'&&<DashboardPage customers={customers} onNavigateCustomer={id=>navigate('customers',id)}/>}
          {activePage==='customers'&&(
            <CustomersPageWithDetail
              customers={customers} banks={banks} companies={companies} onUpdateCustomers={(updater)=>markDirty(()=>setCustomers(updater))}
              initDetailId={detailCustomerId} onClearDetail={()=>navigate('customers')}
              kasa={kasa} onUpdateKasa={(updater)=>markDirty(()=>setKasa(updater))}
            />
          )}
          {activePage==='kasa'&&<KasaPage kasa={kasa} onUpdateKasa={(updater)=>markDirty(()=>setKasa(updater))} customers={customers} companies={companies}/>}
          {activePage==='pos'&&<POSPage customers={customers} banks={banks}/>}
          {activePage==='profit'&&<ProfitPage customers={customers} companies={companies}/>}
          {activePage==='reports'&&<ReportsPage customers={customers}/>}
          {activePage==='companies'&&<CompaniesPage companies={companies} onUpdateCompanies={(updater)=>markDirty(()=>setCompanies(updater))}/>}
          {activePage==='expenses'&&<ExpensesPage expenses={expenses} onUpdateExpenses={(updater)=>markDirty(()=>setExpenses(updater))} kasa={kasa} onUpdateKasa={(updater)=>markDirty(()=>setKasa(updater))}/>}
          {activePage==='partners'&&<PartnersPage partners={partners} onUpdatePartners={(updater)=>markDirty(()=>setPartners(updater))} customers={customers} partnerPayments={partnerPayments} onUpdatePayments={(updater)=>markDirty(()=>setPartnerPayments(updater))} partnerAdjustments={partnerAdjustments} onUpdateAdjustments={(updater)=>markDirty(()=>setPartnerAdjustments(updater))} kasa={kasa} onUpdateKasa={(updater)=>markDirty(()=>setKasa(updater))}/>}
          {activePage==='admin'&&auth.role==='admin'&&<AdminUsersPage token={auth.token} currentUsername={auth.username} onUsernameChanged={(newUn)=>setAuth(p=>({...p,username:newUn}))}/>}
          {activePage==='admin'&&auth.role!=='admin'&&(
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'80px',color:'#64748b'}}>Erişim yetkiniz yok.</div>
          )}
          {activePage==='hesabim'&&<HesabimPage token={auth.token} username={auth.username} onUpdated={(newUsername)=>setAuth(p=>({...p,username:newUsername}))} onExport={exportBackup} onImport={importBackup} onReset={handleReset}/>}
          {activePage==='waq'&&auth.role==='admin'&&<WhatsAppQueuePage token={auth.token} allUsers={allAdminUsers} onReload={()=>apiFetchData(auth.token).then(applyServerData)}/>}
          {activePage==='waq'&&auth.role!=='admin'&&(
            <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'80px',color:'#64748b'}}>Erişim yetkiniz yok.</div>
          )}
        </main>
      </div>
    </div>
  );
}

/* Wrapper to handle detail navigation via URL hash */
function CustomersPageWithDetail({customers,banks,companies,onUpdateCustomers,initDetailId,onClearDetail,kasa,onUpdateKasa}){
  // ── TÜM HOOK'LAR KOŞULSUZ ÜSTTE ──
  const[addOpen,setAddOpen]=useState(false);
  const[deleteId,setDeleteId]=useState(null);

  const detailId=initDetailId||null;
  const detail=customers.find(c=>c.id===detailId);

  const handleAdd=form=>onUpdateCustomers([...customers,{id:uid(),cariEntries:[],...form}]);
  const handleDelete=id=>onUpdateCustomers(customers.filter(c=>c.id!==id));
  const handleCopy=c=>{
    const baseName=c.name.replace(/\s*\d+$/,'').trim();
    let suffix=2;
    while(customers.some(x=>x.name===`${baseName} ${suffix}`))suffix++;
    const copy={...c,id:uid(),name:`${baseName} ${suffix}`,cariEntries:[],createdAt:new Date().toISOString()};
    onUpdateCustomers([...customers,copy]);
  };

  const handleUpdateCustomer=(updated,kasaEntries,action,refId,kasaUpdates)=>{
    onUpdateCustomers(prev=>prev.map(c=>c.id===updated.id?updated:c));
    if(!onUpdateKasa)return;
    if(kasaEntries&&kasaEntries.length>0){
      onUpdateKasa(prev=>({...prev,transactions:[...(prev.transactions||[]),...kasaEntries]}));
    }
    if(action==='delete'&&refId){
      onUpdateKasa(prev=>({...prev,transactions:(prev.transactions||[]).filter(t=>t.refId!==refId)}));
    }
    if(action==='update'&&kasaUpdates&&kasaUpdates.length>0){
      onUpdateKasa(prev=>({...prev,transactions:(prev.transactions||[]).map(t=>{
        const u=kasaUpdates.find(k=>k.refId===t.refId);
        if(!u)return t;
        return{...t,date:u.date,type:u.type,amount:u.amount,description:u.description};
      })}));
    }
  };

  // ── MÜŞTERİ DETAY GÖRÜNÜMÜ ──
  if(detailId&&detail){
    return(
      <CustomerDetail
        customer={detail}
        banks={banks}
        companies={companies}
        onBack={()=>onClearDetail()}
        onUpdateCustomer={handleUpdateCustomer}
        onUpdateKasa={onUpdateKasa}
      />
    );
  }

  // ── MÜŞTERİ LİSTESİ ──
  return(
    <div>
      {(()=>{const toplamBakiye=customers.reduce((s,c)=>s+calcBalance(c.cariEntries||[],c.openingBalance||0),0);return(
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px',flexWrap:'wrap',gap:'10px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'16px'}}>
          <h2 style={{fontWeight:700,fontSize:'16px',color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.05em'}}>Müşteriler ({customers.length})</h2>
          <span style={{fontSize:'13px',color:'#64748b'}}>Toplam Bakiye: <span style={{fontWeight:700,color:toplamBakiye>=0?'#22c55e':'#ef4444'}}>{toplamBakiye.toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})} ₺</span></span>
        </div>
        <button onClick={()=>setAddOpen(true)} style={{display:'flex',alignItems:'center',gap:'6px',background:'#4f8ef7',border:'none',borderRadius:'8px',padding:'10px 18px',color:'#fff',cursor:'pointer',fontWeight:700,fontSize:'13px'}}><IcoPlus size={15}/>Yeni Müşteri</button>
      </div>
      );})()}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:'16px'}}>
        {customers.map(c=>{
          const bak=calcBalance(c.cariEntries||[],c.openingBalance||0);
          const cekim=(c.cariEntries||[]).filter(e=>e.type==='cekim').length;
          const isBorc=bak>0;
          return(
            <Card key={c.id}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'12px'}}>
                <div onClick={()=>onClearDetail&&window.location.assign('#customers/'+c.id)} style={{flex:1,cursor:'pointer'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'}}>
                    <span style={{fontWeight:700,fontSize:'15px'}}>{c.name}</span>
                    <Badge color="#4f8ef7">{c.code}</Badge>
                  </div>
                  <div style={{color:'#64748b',fontSize:'12px'}}>{c.phone}</div>
                </div>
                <div style={{display:'flex',gap:'6px',flexShrink:0}}>
                  <button onClick={()=>handleCopy(c)} title="Kopyala" style={{background:'none',border:'1px solid rgba(79,142,247,0.25)',borderRadius:'6px',padding:'5px',cursor:'pointer',color:'#4f8ef7',display:'flex',alignItems:'center'}}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                  </button>
                  <button onClick={()=>setDeleteId(c.id)} style={{background:'none',border:'1px solid rgba(239,68,68,0.25)',borderRadius:'6px',padding:'5px',cursor:'pointer',color:'#ef4444',display:'flex',alignItems:'center'}}><IcoTrash size={13}/></button>
                </div>
              </div>
              <div onClick={()=>window.location.assign('#customers/'+c.id)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}}>
                <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
                  <Badge color="#f59e0b">%{c.commissionRate} Kom.</Badge>
                  <Badge color="#64748b">{cekim} çekim</Badge>
                </div>
                <div style={{textAlign:'right'}}>
                  <div className="tabular-nums" style={{color:isBorc?'#ef4444':'#22c55e',fontWeight:700,fontSize:'14px'}}>{fmtTL(Math.abs(bak))}</div>
                  <div style={{fontSize:'10px',color:isBorc?'#ef4444':'#22c55e',fontWeight:600}}>{isBorc?'Borçlu':'Alacaklı'}</div>
                </div>
              </div>
            </Card>
          );
        })}
        {customers.length===0&&(
          <div style={{gridColumn:'1/-1',textAlign:'center',padding:'60px',color:'#64748b'}}>
            <div style={{fontSize:'40px',marginBottom:'12px'}}>👥</div>
            <div style={{fontSize:'16px',fontWeight:600,marginBottom:'6px'}}>Henüz müşteri yok</div>
            <div style={{fontSize:'13px'}}>Yeni müşteri eklemek için butona tıklayın</div>
          </div>
        )}
      </div>
      <CustomerFormModal open={addOpen} onClose={()=>setAddOpen(false)} onSave={handleAdd}/>
      <ConfirmModal open={!!deleteId} onClose={()=>setDeleteId(null)} onConfirm={()=>{handleDelete(deleteId);setDeleteId(null);}} title="Müşteriyi Sil" message="Bu müşteriyi ve tüm cari kayıtlarını silmek istediğinizden emin misiniz? Bu işlem geri alınamaz."/>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
document.getElementById('root').setAttribute('data-app','1');
</script>
</body>
</html>
