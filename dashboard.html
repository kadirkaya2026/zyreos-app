const {useState,useEffect,useCallback,useMemo,useRef} = React;

function useIsMobile(){
  const[m,setM]=useState(()=>window.innerWidth<=768);
  useEffect(()=>{const fn=()=>setM(window.innerWidth<=768);window.addEventListener('resize',fn);return()=>window.removeEventListener('resize',fn);},[]);
  return m;
}

/* ── STORAGE ── */
const STORAGE_PREFIX='fintrack_v1__';
function isStorageAvailable(){try{const t='__ft_test__';localStorage.setItem(t,'1');localStorage.removeItem(t);return true;}catch{return false;}}
function readKey(key){try{const r=localStorage.getItem(STORAGE_PREFIX+key);return r!==null?JSON.parse(r):undefined;}catch{return undefined;}}
function writeKey(key,value){try{localStorage.setItem(STORAGE_PREFIX+key,JSON.stringify(value));return true;}catch{return false;}}
function usePersist(key,init){
  const[val,setVal]=useState(()=>{const s=readKey(key);return s!==undefined?s:init;});
  useEffect(()=>{writeKey(key,val);},[val]);
  return[val,setVal];
}

/* ── INDEXEDDB (dir handle kalıcılığı) ── */
function idbOpen(){return new Promise((res,rej)=>{const r=indexedDB.open('fintrack_fs',1);r.onupgradeneeded=e=>e.target.result.createObjectStore('kv');r.onsuccess=e=>res(e.target.result);r.onerror=()=>rej(r.error);});}
async function idbGet(key){try{const db=await idbOpen();return new Promise(res=>{const r=db.transaction('kv','readonly').objectStore('kv').get(key);r.onsuccess=()=>res(r.result);r.onerror=()=>res(undefined);});}catch{return undefined;}}
async function idbSet(key,val){try{const db=await idbOpen();return new Promise(res=>{const tx=db.transaction('kv','readwrite');tx.objectStore('kv').put(val,key);tx.oncomplete=()=>res(true);tx.onerror=()=>res(false);});}catch{return false;}}

/* ── API ── */
const AUTH_KEY='zyreos_auth';
function getAuth(){try{const a=localStorage.getItem(AUTH_KEY)||sessionStorage.getItem(AUTH_KEY);return a?JSON.parse(a):null;}catch{return null;}}
function setAuth(a){const s=JSON.stringify(a);sessionStorage.setItem(AUTH_KEY,s);localStorage.setItem(AUTH_KEY,s);}
function clearAuth(){sessionStorage.removeItem(AUTH_KEY);localStorage.removeItem(AUTH_KEY);}
function getToken(){const a=getAuth();return a?.token||null;}

async function apiLogin(username,password){
  const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
  const data=await r.json();
  if(!r.ok)throw Object.assign(new Error(data.error||'Giriş başarısız'),{code:data.code});
  return data;
}
async function apiRegister(username,password){
  const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
  const data=await r.json();
  if(!r.ok)throw new Error(data.error||'Kayıt başarısız');
  return data;
}
async function apiFetchData(token){
  const r=await fetch('/api/data',{headers:{Authorization:'Bearer '+token}});
  if(r.status===401)throw new Error('AUTH_EXPIRED');
  if(!r.ok)throw new Error('Veri alınamadı');
  return r.json();
}
async function apiSaveData(token,payload){
  const r=await fetch('/api/data',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify(payload)});
  if(r.status===401)throw new Error('AUTH_EXPIRED');
  if(!r.ok)throw new Error('Kayıt başarısız');
  return r.json();
}
async function apiAdminUsers(token){
  const r=await fetch('/api/admin/users',{headers:{Authorization:'Bearer '+token}});
  if(!r.ok)throw new Error('Kullanıcılar alınamadı');
  return r.json();
}
async function apiApproveUser(token,username){
  const r=await fetch(`/api/admin/users/${username}/approve`,{method:'POST',headers:{Authorization:'Bearer '+token}});
  if(!r.ok){const d=await r.json();throw new Error(d.error||'İşlem başarısız');}
}
async function apiRejectUser(token,username){
  const r=await fetch(`/api/admin/users/${username}/reject`,{method:'POST',headers:{Authorization:'Bearer '+token}});
  if(!r.ok){const d=await r.json();throw new Error(d.error||'İşlem başarısız');}
}
async function apiDeleteUser(token,username){
  const r=await fetch(`/api/admin/users/${username}`,{method:'DELETE',headers:{Authorization:'Bearer '+token}});
  if(!r.ok){const d=await r.json();throw new Error(d.error||'İşlem başarısız');}
}
async function apiWAQueue(token){
  const r=await fetch('/api/whatsapp/queue',{headers:{Authorization:'Bearer '+token}});
  if(!r.ok)throw new Error('Kuyruk alınamadı');
  return r.json();
}
async function apiWAAssign(token,id,customerId,username){
  const r=await fetch(`/api/whatsapp/queue/${id}/assign`,{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify({customerId,username})});
  if(!r.ok){const d=await r.json();throw new Error(d.error||'Atama başarısız');}
}
async function apiWADelete(token,id){
  const r=await fetch(`/api/whatsapp/queue/${id}`,{method:'DELETE',headers:{Authorization:'Bearer '+token}});
  if(!r.ok){const d=await r.json();throw new Error(d.error||'Silme başarısız');}
}

/* ── FILE SYSTEM HELPERS ── */
const FS_SUPPORTED=typeof window!=='undefined'&&'showDirectoryPicker' in window;
async function getVerifiedHandle(){
  const h=await idbGet('dirHandle');
  if(!h)return null;
  try{const p=await h.requestPermission({mode:'readwrite'});return p==='granted'?h:null;}catch{return null;}
}
async function writeDataFile(dirHandle,data){
  try{
    const fh=await dirHandle.getFileHandle('data.json',{create:true});
    const w=await fh.createWritable();
    await w.write(JSON.stringify(data,null,2));
    await w.close();
    return true;
  }catch(e){console.warn('Dosyaya yazılamadı:',e);return false;}
}
async function readDataFile(dirHandle){
  try{
    const fh=await dirHandle.getFileHandle('data.json');
    const f=await fh.getFile();
    return JSON.parse(await f.text());
  }catch{return null;}
}

/* ── UTILS ── */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function fmt(n){return new Intl.NumberFormat('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n??0);}
function fmtTL(n){return '₺'+fmt(n);}
function calcBalance(entries){
  return(entries||[]).reduce((s,e)=>e.type==='cekim'?s+e.netToCustomer:s-e.amount,0);
}
function calcCekim(amount,installment,customerRate,bank){
  const bankRate=bank.rates[installment-1];
  const customerComm=+(amount*customerRate/100).toFixed(2);
  const netToCustomer=+(amount-customerComm).toFixed(2);
  const bankCost=+(amount*bankRate/100).toFixed(2);
  const profit=+(amount*(customerRate-bankRate)/100).toFixed(2);
  return{customerComm,netToCustomer,bankRate,bankCost,profit};
}
function todayStr(){return new Date().toISOString().slice(0,10);}

/* ── AUTH SCREENS ── */
function LoginPage({onLogin,onGoRegister}){
  const[username,setUsername]=useState('');
  const[password,setPassword]=useState('');
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState('');
  const submit=async e=>{
    e.preventDefault();setError('');setLoading(true);
    try{
      const data=await apiLogin(username,password);
      setAuth({token:data.token,username:data.username,role:data.role});
      onLogin({token:data.token,username:data.username,role:data.role});
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  };
  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'#0a0d14'}}>
      <div style={{background:'#0f1320',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'20px',padding:'48px 40px',width:'100%',maxWidth:'400px',margin:'16px'}}>
        <div style={{textAlign:'center',marginBottom:'32px'}}>
          <div style={{fontSize:'32px',fontWeight:800,color:'#e2e8f0',letterSpacing:'-1px'}}>ZY<span style={{color:'#4f8ef7'}}>REOS</span></div>
          <div style={{color:'#64748b',fontSize:'13px',marginTop:'6px'}}>Finansal Takip Sistemi</div>
        </div>
        <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:'16px'}}>
          <div>
            <label style={{display:'block',color:'#94a3b8',fontSize:'12px',fontWeight:600,marginBottom:'6px',textTransform:'uppercase'}}>Kullanıcı Adı</label>
            <input value={username} onChange={e=>setUsername(e.target.value)} autoFocus required placeholder="admin"
              style={{width:'100%',background:'#1a2035',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'8px',padding:'11px 14px',color:'#e2e8f0',fontSize:'14px',outline:'none'}}/>
          </div>
          <div>
            <label style={{display:'block',color:'#94a3b8',fontSize:'12px',fontWeight:600,marginBottom:'6px',textTransform:'uppercase'}}>Şifre</label>
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)} required
              style={{width:'100%',background:'#1a2035',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'8px',padding:'11px 14px',color:'#e2e8f0',fontSize:'14px',outline:'none'}}/>
          </div>
          {error&&<div style={{color:'#ef4444',fontSize:'13px',background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:'8px',padding:'10px 14px'}}>{error}</div>}
          <button type="submit" disabled={loading}
            style={{background:'linear-gradient(135deg,#4f8ef7,#6ba3f9)',border:'none',borderRadius:'10px',padding:'13px',color:'#fff',fontSize:'15px',fontWeight:700,cursor:loading?'default':'pointer',opacity:loading?0.7:1,marginTop:'4px'}}>
            {loading?'Giriş yapılıyor…':'Giriş Yap'}
          </button>
          <div style={{textAlign:'center',marginTop:'4px'}}>
            <span style={{color:'#64748b',fontSize:'13px'}}>Hesabınız yok mu? </span>
            <button type="button" onClick={onGoRegister}
              style={{background:'none',border:'none',color:'#4f8ef7',fontSize:'13px',fontWeight:600,cursor:'pointer',padding:0,textDecoration:'underline'}}>
              Üye Ol
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

              <input type="password" value={password} onChange={e=>setPassword(e.target.value)} required placeholder="En az 6 karakter"
                style={{width:'100%',background:'#1a2035',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'8px',padding:'11px 14px',color:'#e2e8f0',fontSize:'14px',outline:'none'}}/>
            </div>
            <div>
              <label style={{display:'block',color:'#94a3b8',fontSize:'12px',fontWeight:600,marginBottom:'6px',textTransform:'uppercase'}}>Şifre Tekrar</label>
              <input type="password" value={password2} onChange={e=>setPassword2(e.target.value)} required placeholder="Şifreyi tekrar girin"
                style={{width:'100%',background:'#1a2035',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'8px',padding:'11px 14px',color:'#e2e8f0',fontSize:'14px',outline:'none'}}/>
            </div>
            {error&&<div style={{color:'#ef4444',fontSize:'13px',background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:'8px',padding:'10px 14px'}}>{error}</div>}
            <button type="submit" disabled={loading}
              style={{background:'linear-gradient(135deg,#22c55e,#16a34a)',border:'none',borderRadius:'10px',padding:'13px',color:'#fff',fontSize:'15px',fontWeight:700,cursor:loading?'default':'pointer',opacity:loading?0.7:1,marginTop:'4px'}}>
              {loading?'Kaydediliyor…':'Üye Ol'}
            </button>
            <div style={{textAlign:'center',marginTop:'4px'}}>
              <button type="button" onClick={onGoLogin}
                style={{background:'none',border:'none',color:'#64748b',fontSize:'13px',cursor:'pointer',textDecoration:'underline'}}>
                Giriş sayfasına dön
              </button>
            </div>
          </form>
        )}
      </div>
    </div>
  );
}

/* ── EXPORT PDF ── */
function exportPDF(customer,opts){
  const allEntries=customer.cariEntries||[];
  const dateFrom=opts?.dateFrom||'';
  const dateTo=opts?.dateTo||'';
  const entries=allEntries.filter(e=>{
    if(dateFrom&&e.date<dateFrom)return false;
    if(dateTo&&e.date>dateTo)return false;
    return true;
  });
  const totalCekim=entries.filter(e=>e.type==='cekim').reduce((s,e)=>s+e.amount,0);
  const totalKomisyon=entries.filter(e=>e.type==='cekim').reduce((s,e)=>s+(e.customerComm||0),0);
  const totalOdenen=entries.filter(e=>e.type==='nakit_odeme').reduce((s,e)=>s+e.amount,0);
  const bakiye=calcBalance(entries);
  const periodLabel=dateFrom||dateTo?`${dateFrom||'Başlangıç'} — ${dateTo||'Bugün'}`:'Tüm İşlemler';
  let running=0;
  const rows=entries.map(e=>{
    if(e.type==='cekim'){running+=e.netToCustomer;}else{running-=e.amount;}
    const rColor=running>=0?'#c53030':'#276749';
    if(e.type==='cekim'){
      return`<tr>
        <td>${e.date}</td><td>${e.description}<br/><small style="color:#666">${e.bank} • ${e.installment===1?'Peşin':`${e.installment} Taksit`}</small></td>
        <td class="num">₺${fmt(e.amount)}</td><td class="num">₺${fmt(e.customerComm||0)} (%${e.customerRate})</td>
        <td class="num">₺${fmt(e.netToCustomer)}</td><td class="num">—</td>
        <td class="num" style="color:${rColor}">₺${fmt(running)}</td></tr>`;
    }else{
      return`<tr>
        <td>${e.date}</td><td>${e.description}</td>
        <td class="num">—</td><td class="num">—</td><td class="num">—</td>
        <td class="num" style="color:#276749">₺${fmt(e.amount)}</td>
        <td class="num" style="color:${rColor}">₺${fmt(running)}</td></tr>`;
    }
  }).join('');
  const bLabel=bakiye>=0?'BORÇLUYUM':'ALACAKLIYIM';
  const bColor=bakiye>=0?'#c53030':'#276749';
  const html=`<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"/>
  <title>Ekstre — ${customer.name}</title>
  <style>
    @page{size:A4;margin:16mm 14mm;}
    body{font-family:Arial,sans-serif;font-size:12px;color:#1a202c;margin:0;padding:0;}
    .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid #2d3748;}
    .logo{font-size:22px;font-weight:800;color:#1a202c;letter-spacing:-0.5px;}
    .logo span{color:#4f8ef7;}
    .title{font-size:11px;color:#4a5568;margin-top:2px;}
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 24px;margin-bottom:14px;padding:12px;background:#f7fafc;border-radius:8px;border:1px solid #e2e8f0;}
    .info-row{display:flex;gap:8px;font-size:11px;}
    .info-label{color:#718096;font-weight:600;min-width:100px;}
    .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0;}
    .sum-card{padding:10px;background:#ebf8ff;border-radius:8px;text-align:center;border:1px solid #bee3f8;}
    .sum-card .val{font-size:14px;font-weight:700;color:#2b6cb0;}
    .sum-card .lbl{font-size:9px;color:#4a5568;text-transform:uppercase;letter-spacing:0.05em;margin-top:2px;}
    table{width:100%;border-collapse:collapse;margin-top:10px;}
    th{background:#2d3748;color:#fff;padding:7px 9px;text-align:left;font-size:10px;font-weight:700;}
    td{padding:6px 9px;border-bottom:1px solid #e2e8f0;font-size:11px;vertical-align:top;}
    tr:nth-child(even)td{background:#f7fafc;}
    .num{text-align:right;font-variant-numeric:tabular-nums;}
    .balance-box{margin-top:16px;padding:16px;border-radius:10px;background:${bakiye>=0?'#fff5f5':'#f0fff4'};border:2px solid ${bColor};text-align:center;}
    .balance-box .amount{font-size:26px;font-weight:800;color:${bColor};}
    .balance-box .label{font-size:14px;font-weight:700;color:${bColor};margin-top:4px;}
    .footer{margin-top:16px;text-align:center;color:#a0aec0;font-size:9px;border-top:1px solid #e2e8f0;padding-top:10px;}
    @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
  </style></head><body>
  <div class="header">
    <div><div class="logo">ZY<span>REOS</span></div><div class="title">Finansal Takip Sistemi</div></div>
    <div style="text-align:right"><div style="font-size:15px;font-weight:700">Cari Hesap Ekstresi</div><div style="color:#718096;font-size:10px;margin-top:3px">Dönem: ${periodLabel}</div><div style="color:#718096;font-size:10px">Oluşturma: ${new Date().toLocaleDateString('tr-TR')}</div></div>
  </div>
  <div class="info-grid">
    <div class="info-row"><span class="info-label">Müşteri Adı:</span><span>${customer.name}</span></div>
    <div class="info-row"><span class="info-label">Müşteri Kodu:</span><span>${customer.code}</span></div>
    <div class="info-row"><span class="info-label">Telefon:</span><span>${customer.phone||'—'}</span></div>
    <div class="info-row"><span class="info-label">E-posta:</span><span>${customer.email||'—'}</span></div>
    <div class="info-row"><span class="info-label">Adres:</span><span>${customer.address||'—'}</span></div>
    <div class="info-row"><span class="info-label">Vergi No:</span><span>${customer.taxNo||'—'}</span></div>
  </div>
  <div class="summary">
    <div class="sum-card"><div class="val">₺${fmt(totalCekim)}</div><div class="lbl">Toplam Çekim</div></div>
    <div class="sum-card"><div class="val">₺${fmt(totalKomisyon)}</div><div class="lbl">Toplam Komisyon</div></div>
    <div class="sum-card"><div class="val">₺${fmt(totalOdenen)}</div><div class="lbl">Ödenen Nakit</div></div>
    <div class="sum-card" style="background:${bakiye>=0?'#fff5f5':'#f0fff4'};border-color:${bColor}"><div class="val" style="color:${bColor}">₺${fmt(Math.abs(bakiye))}</div><div class="lbl">Kalan Bakiye</div></div>
  </div>
  <table>
    <thead><tr><th>Tarih</th><th>Açıklama</th><th class="num">Çekim Tutarı</th><th class="num">Müşteri Kom.</th><th class="num">Müşteriye Nakit</th><th class="num">Ödenen Nakit</th><th class="num">Bakiye</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div class="balance-box">
    <div class="amount">₺${fmt(Math.abs(bakiye))}</div>
    <div class="label">${bLabel}</div>
  </div>
  <div class="footer">ZYREOS Finansal Takip Sistemi — Bu ekstre bilgisayar ortamında oluşturulmuştur. Toplam ${entries.length} işlem.</div>
  </body></html>`;
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`ekstre_${customer.code}_${dateFrom||'tum'}_${dateTo||'donem'}.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

/* ── DASHBOARD PAGE ── */
function DashboardPage({customers,onNavigateCustomer}){
  const allEntries=useMemo(()=>customers.flatMap(c=>(c.cariEntries||[]).map(e=>({...e,customerName:c.name,customerCode:c.code,customerId:c.id}))),[customers]);
  const allCekim=allEntries.filter(e=>e.type==='cekim');

  const today=todayStr();
  const d=new Date(today);
  // Haftanın başı (Pazartesi)
  const dow=d.getDay()===0?6:d.getDay()-1;
  const weekStart=new Date(d);weekStart.setDate(d.getDate()-dow);
  const weekStartStr=weekStart.toISOString().slice(0,10);
  // Ayın başı
  const monthStartStr=today.slice(0,7)+'-01';

  const sum=(arr,field)=>arr.reduce((s,e)=>s+(e[field]||0),0);
  const filter=(from,to)=>allCekim.filter(e=>e.date>=from&&e.date<=to);

  const todayCekim=filter(today,today);
  const weekCekim=filter(weekStartStr,today);
  const monthCekim=filter(monthStartStr,today);

  const recentCekim=[...allCekim].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8);

  const PeriodCard=({label,sub,entries})=>{
    const total=sum(entries,'amount');
    const profit=sum(entries,'profit');
    return(
      <div style={{background:'linear-gradient(135deg,rgba(15,23,42,0.9),rgba(20,30,60,0.9))',borderRadius:'14px',border:'1px solid rgba(255,255,255,0.08)',padding:'20px 22px',display:'flex',flexDirection:'column',gap:'10px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <div style={{fontSize:'12px',fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'0.06em'}}>{label}</div>
            <div style={{fontSize:'10px',color:'#475569',marginTop:'2px'}}>{sub}</div>
          </div>
          <Badge color="#4f8ef7">{entries.length} işlem</Badge>
        </div>
        <div>
          <div style={{fontSize:'11px',color:'#64748b',marginBottom:'2px'}}>Toplam Çekim</div>
          <div className="tabular-nums" style={{fontSize:'22px',fontWeight:800,color:'#4f8ef7',letterSpacing:'-0.5px'}}>{fmtTL(total)}</div>
        </div>
        <div style={{borderTop:'1px solid rgba(255,255,255,0.06)',paddingTop:'10px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:'11px',color:'#64748b'}}>Net Kar</div>
          <div className="tabular-nums" style={{fontSize:'16px',fontWeight:800,color:profit>=0?'#22c55e':'#ef4444'}}>{fmtTL(profit)}</div>
        </div>
      </div>
    );
  };

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'20px'}}>

      {/* Dönem Kartları */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'16px'}}>
        <PeriodCard label="Bugün" sub={today} entries={todayCekim}/>
        <PeriodCard label="Bu Hafta" sub={`${weekStartStr} — ${today}`} entries={weekCekim}/>
        <PeriodCard label="Bu Ay" sub={today.slice(0,7)} entries={monthCekim}/>
      </div>

      {/* Müşteri Bakiye + Son Çekimler */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'}}>
        <Card>
          <div style={{fontWeight:700,marginBottom:'16px',fontSize:'14px',color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.05em'}}>Müşteri Bakiye Özeti</div>
          <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
            {customers.map(c=>{
              const bak=calcBalance(c.cariEntries||[]);
              const isBorc=bak>0;
              return(
                <div key={c.id} onClick={()=>onNavigateCustomer(c.id)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',borderRadius:'10px',background:'#131929',cursor:'pointer',border:'1px solid transparent',transition:'border-color 0.15s'}} className="hover:border-blue-500/30">
                  <div>
                    <span style={{fontWeight:600,marginRight:'8px'}}>{c.name}</span>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div className="tabular-nums" style={{color:isBorc?'#ef4444':'#22c55e',fontWeight:700,fontSize:'14px'}}>{fmtTL(Math.abs(bak))}</div>
                    <div style={{fontSize:'10px',color:isBorc?'#ef4444':'#22c55e'}}>{isBorc?'Borçlu':'Alacaklı'}</div>
                  </div>
                </div>
              );
            })}
            {customers.length===0&&<div style={{textAlign:'center',padding:'24px',color:'#64748b',fontSize:'13px'}}>Henüz müşteri yok</div>}
          </div>
        </Card>
        <Card>
          <div style={{fontWeight:700,marginBottom:'16px',fontSize:'14px',color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.05em'}}>Son Çekimler</div>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
              <thead>
                <tr style={{borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
                  {['Tarih','Müşteri','Tutar','Kar'].map(h=><th key={h} style={{textAlign:'left',padding:'6px 8px',color:'#64748b',fontWeight:600,fontSize:'11px',textTransform:'uppercase'}}>{h}</th>)}
                </tr>
              </thead>
              <tbody>
                {recentCekim.map(e=>(
                  <tr key={e.id} style={{borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                    <td style={{padding:'8px',color:'#94a3b8',whiteSpace:'nowrap'}}>{e.date}</td>
                    <td style={{padding:'8px'}}><span style={{fontWeight:600}}>{e.customerName}</span></td>
                    <td className="tabular-nums" style={{padding:'8px',color:'#4f8ef7',fontWeight:600}}>{fmtTL(e.amount)}</td>
                    <td className="tabular-nums" style={{padding:'8px',color:e.profit>=0?'#22c55e':'#ef4444',fontWeight:700}}>{fmtTL(e.profit)}</td>
                  </tr>
                ))}
                {recentCekim.length===0&&<tr><td colSpan={4} style={{padding:'20px',textAlign:'center',color:'#64748b'}}>Henüz çekim yok</td></tr>}
              </tbody>
            </table>
          </div>
        </Card>
      </div>
    </div>
  );
}

/* ── CUSTOMER FORM MODAL ── */
function CustomerFormModal({open,onClose,onSave,initial}){
  const blank={name:'',phone:'',installmentRates:Array(12).fill(3.5),notes:''};
  const toForm=c=>({name:c.name||'',phone:c.phone||'',installmentRates:c.installmentRates||Array(12).fill(3.5),notes:c.notes||''});
  const[form,setForm]=useState(initial?toForm(initial):blank);
  useEffect(()=>{if(open)setForm(initial?toForm(initial):blank);},[open]);
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const setInstRate=(i,v)=>setForm(p=>{const r=[...(p.installmentRates||Array(12).fill(3.5))];r[i]=v;return{...p,installmentRates:r};});
  const fillAll=(v)=>setForm(p=>({...p,installmentRates:Array(12).fill(parseFloat(v)||0)}));
  return(
    <Modal open={open} onClose={onClose} title={initial?'Müşteriyi Düzenle':'Yeni Müşteri'} width={560}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 16px'}}>
        <Field label="Ad Soyad" required style={{gridColumn:'1/-1'}}><Input value={form.name} onChange={e=>set('name',e.target.value)} placeholder="Ad Soyad"/></Field>
        <Field label="Telefon"><Input value={form.phone} onChange={e=>set('phone',e.target.value)} placeholder="0532 xxx xx xx"/></Field>
      </div>
      <div style={{marginTop:'16px',background:'rgba(15,23,42,0.6)',borderRadius:'10px',border:'1px solid rgba(255,255,255,0.08)',padding:'14px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}}>
          <span style={{fontSize:'12px',fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.06em'}}>Taksit Bazlı Komisyon Oranları (%)</span>
          <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
            <input type="number" step="0.1" min="0" max="100" placeholder="0.0"
              style={{width:'72px',background:'rgba(30,39,64,.8)',border:'1px solid rgba(245,158,11,0.4)',borderRadius:'6px',padding:'4px 8px',color:'#f59e0b',fontWeight:700,fontSize:'12px',textAlign:'center'}}
              id="fillAllInput"/>
            <button onClick={()=>{const v=document.getElementById('fillAllInput').value;fillAll(v);}}
              style={{fontSize:'11px',padding:'4px 10px',borderRadius:'6px',border:'1px solid rgba(245,158,11,0.4)',background:'rgba(245,158,11,0.1)',color:'#f59e0b',cursor:'pointer',fontWeight:600}}>
              Tümüne Uygula
            </button>
          </div>
        </div>

/* ── ADD ENTRY MODAL ── */
function AddEntryModal({open,onClose,onSave,customer,banks}){
  const[type,setType]=useState('cekim');
  const today=todayStr();
  const[form,setForm]=useState({date:today,description:'Kart Çekimi',amount:'',bank:'',installment:1,customerRate:customer?.installmentRates?.[0]??customer?.commissionRate??3.5});
  const[nakit,setNakit]=useState({date:today,description:'Nakit Ödeme',amount:''});
  useEffect(()=>{
    if(open){
      setType('cekim');
      const defRate=customer?.installmentRates?.[0]??customer?.commissionRate??3.5;
      setForm({date:today,description:'Kart Çekimi',amount:'',bank:banks[0]?.name||'',installment:1,customerRate:defRate});
      setNakit({date:today,description:'Nakit Ödeme',amount:''});
    }
  },[open,customer]);
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const handleInstallmentChange=(val)=>{
    const inst=parseInt(val);
    const autoRate=customer?.installmentRates?.[inst-1]??customer?.commissionRate??3.5;
    setForm(p=>({...p,installment:inst,customerRate:autoRate}));
  };
  const selBank=banks.find(b=>b.name===form.bank)||banks[0];
  const calc=useMemo(()=>{
    if(!form.amount||!selBank)return null;
    const amt=parseFloat(form.amount)||0;
    if(!amt)return null;
    return calcCekim(amt,form.installment,form.customerRate,selBank);
  },[form.amount,form.installment,form.customerRate,selBank]);
  const handleSave=()=>{
    if(type==='cekim'){
      const amt=parseFloat(form.amount)||0;
      if(!amt)return alert('Tutar giriniz.');
      if(!selBank)return alert('Banka seçiniz.');
      const c=calcCekim(amt,form.installment,form.customerRate,selBank);
      onSave({id:uid(),date:form.date,type:'cekim',description:form.description||'Kart Çekimi',amount:amt,bank:selBank.name,installment:parseInt(form.installment),customerRate:form.customerRate,...c});
    }else{
      const amt=parseFloat(nakit.amount)||0;
      if(!amt)return alert('Tutar giriniz.');
      onSave({id:uid(),date:nakit.date,type:'nakit_odeme',description:nakit.description||'Nakit Ödeme',amount:amt});
    }
    onClose();
  };
  const previewRow=(lbl,val,color='#e2e8f0')=>(
    <div style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
      <span style={{color:'#94a3b8',fontSize:'13px'}}>{lbl}</span>
      <span className="tabular-nums" style={{color,fontWeight:700,fontSize:'13px'}}>{val}</span>
    </div>
  );
  return(
    <Modal open={open} onClose={onClose} title="Yeni Kayıt Ekle" width={520}>
      <div style={{display:'flex',gap:'8px',marginBottom:'20px'}}>
        {[['cekim','Kart Çekimi','#4f8ef7'],['nakit_odeme','Nakit Ödeme','#22c55e']].map(([v,l,c])=>(
          <button key={v} onClick={()=>setType(v)}
            style={{flex:1,padding:'10px',borderRadius:'8px',border:`2px solid ${type===v?c:'rgba(255,255,255,0.1)'}`,background:type===v?c+'22':'transparent',color:type===v?c:'#94a3b8',cursor:'pointer',fontWeight:700,fontSize:'13px',transition:'all 0.15s'}}>{l}</button>
        ))}
      </div>
      {type==='cekim'?(
        <div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 16px'}}>
            <Field label="Tarih" required><Input type="date" value={form.date} onChange={e=>set('date',e.target.value)}/></Field>
            <Field label="Açıklama"><Input value={form.description} onChange={e=>set('description',e.target.value)}/></Field>
            <Field label="Çekim Tutarı (₺)" required><Input type="number" step="0.01" min="0" value={form.amount} onChange={e=>set('amount',e.target.value)} placeholder="10000"/></Field>
            <Field label="Banka" required>
              <Select value={form.bank} onChange={e=>set('bank',e.target.value)}>
                {banks.map(b=><option key={b.id} value={b.name}>{b.name}</option>)}
              </Select>
            </Field>
            <Field label="Taksit" required>
              <Select value={form.installment} onChange={e=>handleInstallmentChange(e.target.value)}>
                {Array.from({length:12},(_,i)=><option key={i+1} value={i+1}>{i===0?'Peşin':`${i+1} Taksit`}</option>)}
              </Select>
            </Field>
            <Field label="Müşteri Oranı (%)">
              <Input type="number" step="0.1" min="0" max="100" value={form.customerRate}
                onChange={e=>set('customerRate',parseFloat(e.target.value)||0)}
                style={{...inputStyle,background:'#2d1f04',borderColor:'#f59e0b88',color:'#f59e0b',fontWeight:700}}/>
            </Field>
          </div>
          {calc&&(
            <div style={{background:'#131929',borderRadius:'10px',padding:'14px',marginTop:'4px',border:'1px solid rgba(255,255,255,0.07)'}}>
              <div style={{color:'#94a3b8',fontSize:'11px',fontWeight:700,letterSpacing:'0.05em',marginBottom:'8px',textTransform:'uppercase'}}>Hesaplama Önizlemesi</div>
              {previewRow('Müşteri Komisyonu',`${fmtTL(calc.customerComm)} (%${form.customerRate})`,'#a855f7')}
              {previewRow('Müşteriye Nakit',fmtTL(calc.netToCustomer),'#4f8ef7')}
              {previewRow(`Banka Maliyeti (%${calc.bankRate})`,fmtTL(calc.bankCost),'#ef4444')}
              {previewRow('NET KAR',fmtTL(calc.profit),calc.profit>=0?'#22c55e':'#ef4444')}
            </div>
          )}
        </div>
      ):(
        <div>
          <Field label="Tarih" required><Input type="date" value={nakit.date} onChange={e=>setNakit(p=>({...p,date:e.target.value}))}/></Field>
          <Field label="Açıklama"><Input value={nakit.description} onChange={e=>setNakit(p=>({...p,description:e.target.value}))}/></Field>
          <Field label="Ödeme Tutarı (₺)" required><Input type="number" step="0.01" min="0" value={nakit.amount} onChange={e=>setNakit(p=>({...p,amount:e.target.value}))} placeholder="5000"/></Field>
        </div>
      )}
      <div style={{display:'flex',gap:'12px',justifyContent:'flex-end',marginTop:'16px'}}>
        <button onClick={onClose} style={{padding:'10px 20px',borderRadius:'8px',border:'1px solid rgba(255,255,255,0.1)',background:'transparent',color:'#94a3b8',cursor:'pointer',fontWeight:600}}>İptal</button>
        <button onClick={handleSave}
          style={{padding:'10px 20px',borderRadius:'8px',border:'none',background:'#4f8ef7',color:'#fff',cursor:'pointer',fontWeight:700}}>Kaydet</button>
      </div>
    </Modal>
  );
}

          const isBorc=bak>0;
          return(
            <Card key={c.id} style={{cursor:'pointer',transition:'border-color 0.15s',borderColor:'rgba(255,255,255,0.07)'}} className="hover:border-blue-500/30">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'12px'}}>
                <div onClick={()=>setDetailId(c.id)} style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'}}>
                    <span style={{fontWeight:700,fontSize:'15px'}}>{c.name}</span>
                  </div>
                  <div style={{color:'#64748b',fontSize:'12px'}}>{c.phone}</div>
                </div>
                <button onClick={()=>setDeleteId(c.id)} style={{background:'none',border:'1px solid rgba(239,68,68,0.25)',borderRadius:'6px',padding:'5px',cursor:'pointer',color:'#ef4444',display:'flex',alignItems:'center',flexShrink:0}}><IcoTrash size={13}/></button>
              </div>
              <div onClick={()=>setDetailId(c.id)} style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
                  <Badge color="#f59e0b">%{c.commissionRate} Kom.</Badge>
                  <Badge color="#64748b">{cekim} çekim</Badge>
                </div>
                <div style={{textAlign:'right'}}>
                  <div className="tabular-nums" style={{color:isBorc?'#ef4444':'#22c55e',fontWeight:700,fontSize:'14px'}}>{fmtTL(Math.abs(bak))}</div>
                  <div style={{fontSize:'10px',color:isBorc?'#ef4444':'#22c55e',fontWeight:600}}>{isBorc?'Borçlu':'Alacaklı'}</div>
                </div>
              </div>
            </Card>
          );
        })}
        {customers.length===0&&(
          <div style={{gridColumn:'1/-1',textAlign:'center',padding:'60px',color:'#64748b'}}>
            <div style={{fontSize:'40px',marginBottom:'12px'}}>👥</div>
            <div style={{fontSize:'16px',fontWeight:600,marginBottom:'6px'}}>Henüz müşteri yok</div>
            <div style={{fontSize:'13px'}}>Yeni müşteri eklemek için butona tıklayın</div>
          </div>
        )}
      </div>
      <CustomerFormModal open={addOpen} onClose={()=>setAddOpen(false)} onSave={handleAdd}/>
      <ConfirmModal open={!!deleteId} onClose={()=>setDeleteId(null)} onConfirm={()=>handleDelete(deleteId)} title="Müşteriyi Sil" message="Bu müşteriyi ve tüm cari kayıtlarını silmek istediğinizden emin misiniz? Bu işlem geri alınamaz."/>
    </div>
  );
}

/* ── POS HESAP SAYFASI ── */
function POSPage({customers,banks}){
  const[selDate,setSelDate]=useState(todayStr());

  const nextWorkday=(dateStr)=>{
    const d=new Date(dateStr+'T12:00:00');
    d.setDate(d.getDate()+1);
    if(d.getDay()===6)d.setDate(d.getDate()+2);
    if(d.getDay()===0)d.setDate(d.getDate()+1);
    return d.toLocaleDateString('tr-TR',{day:'2-digit',month:'long',year:'numeric',weekday:'long'});
  };

  // Seçilen tarihteki tüm çekim kayıtları
  const dayEntries=customers.flatMap(c=>
    (c.cariEntries||[]).filter(e=>e.type==='cekim'&&e.date===selDate)
      .map(e=>({...e,customerName:c.name,customerCode:c.code}))
  );

  // Banka bazında grupla
  const bankMap={};
  dayEntries.forEach(e=>{
    const bankObj=banks.find(b=>b.name===e.bank);
    const bankRate=bankObj?bankObj.rates[e.installment-1]:e.bankRate||0;
    const bankCut=+(e.amount*bankRate/100).toFixed(2);
    const netDeposit=+(e.amount-bankCut).toFixed(2);
    if(!bankMap[e.bank])bankMap[e.bank]={bank:e.bank,entries:[],totalAmount:0,totalBankCut:0,totalNet:0};
    bankMap[e.bank].entries.push({...e,bankRate,bankCut,netDeposit});
    bankMap[e.bank].totalAmount+=e.amount;
    bankMap[e.bank].totalBankCut+=bankCut;
    bankMap[e.bank].totalNet+=netDeposit;
  });
  const bankRows=Object.values(bankMap).sort((a,b)=>b.totalNet-a.totalNet);

  const grandTotal=bankRows.reduce((s,r)=>s+r.totalAmount,0);
  const grandCut=bankRows.reduce((s,r)=>s+r.totalBankCut,0);
  const grandNet=bankRows.reduce((s,r)=>s+r.totalNet,0);

  const thS={padding:'10px 14px',textAlign:'left',color:'#64748b',fontWeight:600,fontSize:'11px',textTransform:'uppercase',borderBottom:'1px solid rgba(255,255,255,0.07)'};
  const td={padding:'10px 14px'};
  const inS={background:'rgba(30,39,64,.8)',border:'1px solid rgba(255,255,255,.1)',borderRadius:'8px',padding:'8px 12px',color:'#e2e8f0',fontSize:'14px'};

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'20px'}}>

      {/* Tarih Seçici */}
      <Card>
        <div style={{fontWeight:700,fontSize:'15px',marginBottom:'14px'}}>POS Hesap — Günlük Tahsilat</div>
        <div style={{display:'flex',gap:'14px',alignItems:'flex-end',flexWrap:'wrap'}}>
          <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
            <label style={{fontSize:'11px',color:'#64748b',fontWeight:600}}>İşlem Tarihi</label>
            <input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} style={inS}/>
          </div>
          <div style={{padding:'8px 16px',borderRadius:'8px',background:'rgba(79,142,247,0.1)',border:'1px solid rgba(79,142,247,0.25)',color:'#4f8ef7',fontSize:'13px',fontWeight:600}}>
            Ertesi İş Günü: {nextWorkday(selDate)}
          </div>
        </div>
      </Card>

      {/* Özet Metrikler */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:'14px'}}>
        <MetricCard label="Toplam POS Çekim" value={fmtTL(grandTotal)} color="#4f8ef7"/>
        <MetricCard label="Toplam Banka Kesintisi" value={fmtTL(grandCut)} color="#ef4444"/>
        <MetricCard label={`Yarın Yatacak (${bankRows.length} banka)`} value={fmtTL(grandNet)} color="#22c55e" large/>
      </div>

      {dayEntries.length===0?(
        <Card style={{textAlign:'center',padding:'60px 20px',color:'#64748b'}}>
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{marginBottom:'12px',opacity:.4}}><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
          <div style={{fontSize:'15px',fontWeight:600,marginBottom:'4px'}}>Bu tarihte işlem yok</div>
          <div style={{fontSize:'13px'}}>Seçilen tarihte kayıtlı kart çekimi bulunamadı</div>
        </Card>
      ):(
        <>
          {/* Banka Bazlı Özet */}
          <Card style={{padding:0,overflow:'hidden'}}>
            <div style={{padding:'14px 18px',borderBottom:'1px solid rgba(255,255,255,0.07)',fontWeight:700,fontSize:'14px'}}>
              Banka Bazlı Tahsilat Özeti
            </div>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
                <thead>
                  <tr>{['Banka','İşlem Adedi','Toplam Çekim','Banka Kesintisi','Yarın Yatacak Tutar'].map(h=><th key={h} style={thS}>{h}</th>)}</tr>
                </thead>
                <tbody>
                  {bankRows.map(r=>(
                    <tr key={r.bank} style={{borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                      <td style={{...td,fontWeight:700,fontSize:'14px'}}>{r.bank}</td>
                      <td className="tabular-nums" style={{...td,color:'#94a3b8'}}>{r.entries.length}</td>
                      <td className="tabular-nums" style={{...td,color:'#4f8ef7',fontWeight:600}}>{fmtTL(r.totalAmount)}</td>
                      <td className="tabular-nums" style={{...td,color:'#ef4444'}}>
                        <div>{fmtTL(r.totalBankCut)}</div>
                        <div style={{fontSize:'11px',color:'#64748b'}}>%{r.totalAmount>0?+(r.totalBankCut/r.totalAmount*100).toFixed(2):0} ort.</div>
                      </td>
                      <td className="tabular-nums" style={{...td,fontWeight:800,fontSize:'16px',color:'#22c55e'}}>{fmtTL(r.totalNet)}</td>
                    </tr>
                  ))}
                </tbody>
                <tfoot>
                  <tr style={{background:'rgba(255,255,255,0.03)',borderTop:'2px solid rgba(255,255,255,0.1)'}}>
                    <td colSpan={2} style={{...td,color:'#94a3b8',fontWeight:700,fontSize:'12px',textTransform:'uppercase'}}>Toplam ({dayEntries.length} işlem)</td>
                    <td className="tabular-nums" style={{...td,color:'#4f8ef7',fontWeight:800}}>{fmtTL(grandTotal)}</td>
                    <td className="tabular-nums" style={{...td,color:'#ef4444',fontWeight:800}}>{fmtTL(grandCut)}</td>
                    <td className="tabular-nums" style={{...td,color:'#22c55e',fontWeight:800,fontSize:'16px'}}>{fmtTL(grandNet)}</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </Card>

          {/* İşlem Detayları — banka bazlı */}
          {bankRows.map(r=>(
            <Card key={r.bank} style={{padding:0,overflow:'hidden'}}>
              <div style={{padding:'12px 18px',borderBottom:'1px solid rgba(255,255,255,0.07)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontWeight:700,fontSize:'13px'}}>{r.bank} — İşlem Detayları</span>
                <div style={{display:'flex',gap:'10px',alignItems:'center'}}>
                  <span style={{color:'#64748b',fontSize:'12px'}}>{r.entries.length} işlem</span>
                  <Badge color="#22c55e">Yatacak: {fmtTL(r.totalNet)}</Badge>
                </div>
              </div>
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px'}}>
                  <thead>
                    <tr>{['Müşteri','Taksit','Banka Oranı','Çekim Tutarı','Banka Kesintisi','Net Yatacak'].map(h=><th key={h} style={{...thS,fontSize:'10px'}}>{h}</th>)}</tr>
                  </thead>
                  <tbody>
                    {r.entries.map(e=>(
                      <tr key={e.id} style={{borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                        <td style={td}>
                          <div style={{fontWeight:600}}>{e.customerName}</div>
                          <div style={{color:'#64748b',fontSize:'11px'}}>{e.customerCode}</div>
                        </td>
                        <td style={{...td,textAlign:'center'}}><Badge color="#4f8ef7">{e.installment===1?'Peşin':`${e.installment} T`}</Badge></td>
                        <td className="tabular-nums" style={{...td,color:'#f59e0b',fontWeight:700}}>%{e.bankRate}</td>
                        <td className="tabular-nums" style={{...td,color:'#4f8ef7',fontWeight:600}}>{fmtTL(e.amount)}</td>
                        <td className="tabular-nums" style={{...td,color:'#ef4444'}}>-{fmtTL(e.bankCut)}</td>
                        <td className="tabular-nums" style={{...td,color:'#22c55e',fontWeight:700}}>{fmtTL(e.netDeposit)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </Card>
          ))}
        </>
      )}
    </div>
  );
}

/* ── DEKONT YUKLE PAGE ── */
function DekontPage({customers,banks,onUpdateCustomers}){
  const[selCustomerId,setSelCustomerId]=useState('');
  const[queue,setQueue]=useState([]);
  const[dragging,setDragging]=useState(false);

  const BANK_NAMES=banks.map(b=>b.name);
  const selCustomer=customers.find(c=>c.id===selCustomerId)||null;

  /* ── Tesseract OCR ── */
  const parseReceiptText=(text)=>{
    const t=text.toUpperCase().replace(/İ/g,'I').replace(/Ş/g,'S').replace(/Ğ/g,'G').replace(/Ü/g,'U').replace(/Ö/g,'O').replace(/Ç/g,'C').replace(/\s+/g,' ');
    // Tutar
    let amount=0;
    const amtPatterns=[
      /(?:ISLEM TUTARI|TUTAR|CEKIM|AMOUNT|TOPLAM)[^0-9]*([0-9]{1,3}(?:[.,][0-9]{3})*[.,][0-9]{2})/i,
      /([0-9]{1,3}(?:\.[0-9]{3})+,[0-9]{2})/,
      /([0-9]+,[0-9]{2})\s*(?:TL|TRY)/i,
    ];
    for(const p of amtPatterns){const m=t.match(p);if(m){const s=m[1].replace(/\./g,'').replace(',','.');amount=parseFloat(s)||0;if(amount>0)break;}}
    // Taksit — genişletilmiş
    let installment=1;
    // Peşin kontrolü
    if(/PESIN|PESIN|TEK CEKIM|TEK CEKIS|PERAKENDE/.test(t)){installment=1;}
    else{
      const instPatterns=[
        /TAKSIT\s*SAYISI\s*[:\-]?\s*([0-9]+)/,   // TAKSİT SAYISI: 6
        /TAKSIT\s*ADEDI\s*[:\-]?\s*([0-9]+)/,    // TAKSİT ADEDİ: 6
        /TAKSIT\s*NO\s*[:\-]?\s*[0-9]+\s*\/\s*([0-9]+)/,  // TAKSİT NO: 1/6 → toplam
        /([0-9]+)\s*\/\s*[0-9]+\s*TAKSIT/,       // 1/6 TAKSİT
        /TAKSIT\s*[:\-]?\s*([0-9]+)/,            // TAKSİT: 6
        /([0-9]+)\s*TAKSIT/,                      // 6 TAKSİT
        /INST(?:ALLMENT)?\s*[:\-]?\s*([0-9]+)/,  // INST: 6
        /([0-9]+)\s*INST(?:ALLMENT)?/,
        /TAKSIT[^0-9]*([0-9]+)/,
        /([0-9]+)[^0-9]*TAKSIT/,
      ];
      for(const p of instPatterns){
        const m=t.match(p);
        if(m){const v=parseInt(m[1]);if(v>=1&&v<=12){installment=v;break;}}
      }
    }
    // Banka
    let bank=banks[0]?.name||'';
    const bankAliases=[
      ['AKBANK','Akbank'],['QNB','QNB'],['GARANTI','Garanti'],['KUVEYT','Kuveyt'],
      ['ZIRAAT','Ziraat'],['HALK','Halk'],['IS BANKASI','İş Bankası'],['ISBANKASI','İş Bankası'],
      ['VAKIF','Vakıf'],['YAPI KREDI','YKB'],['YAPIKREDI','YKB'],['YKB','YKB'],
    ];
    for(const[k,v] of bankAliases){if(t.includes(k)){bank=v;break;}}
    return{amount,installment,bank};
  };

  const runOCR=async(id)=>{
    setQueue(q=>q.map(item=>item.id===id?{...item,status:'processing',progress:0}:item));
    try{
      const item=queue.find(x=>x.id===id)||(await new Promise(r=>{setQueue(q=>{const found=q.find(x=>x.id===id);r(found);return q;})}));
      const result=await Tesseract.recognize(item.file,'tur+eng',{
        logger:m=>{if(m.status==='recognizing text')setQueue(q=>q.map(x=>x.id===id?{...x,progress:Math.round(m.progress*100)}:x));}
      });
      const parsed=parseReceiptText(result.data.text);
      const custRate=selCustomer?.installmentRates?.[parsed.installment-1]??selCustomer?.commissionRate??0;
      setQueue(q=>q.map(x=>x.id===id?{...x,status:'done',progress:100,rawText:result.data.text,
        form:{date:todayStr(),amount:parsed.amount||'',bank:parsed.bank,installment:parsed.installment,customerRate:custRate,description:'Kart Çekimi'}
      }:x));
    }catch(e){
      setQueue(q=>q.map(x=>x.id===id?{...x,status:'error',errorMsg:String(e)}:x));
    }
  };

  const addFiles=(files)=>{
    if(!selCustomerId){alert('Önce müşteri seçiniz.');return;}
    const items=Array.from(files).filter(f=>f.type.startsWith('image/')||f.type==='application/pdf').map(f=>{
      const custRate=selCustomer?.commissionRate??0;
      return{id:uid(),file:f,previewUrl:f.type.startsWith('image/')?URL.createObjectURL(f):null,status:'waiting',progress:0,rawText:'',
        form:{date:todayStr(),amount:'',bank:banks[0]?.name||'',installment:1,customerRate:custRate,description:'Kart Çekimi'}};
    });
    if(!items.length){alert('Sadece resim (PNG/JPG) ve PDF dosyaları kabul edilir.');return;}
    setQueue(q=>[...q,  ...items]);
  };

  const setForm=(id,k,v)=>setQueue(q=>q.map(x=>x.id===id?{...x,form:{...x.form,[k]:v}}:x));

  const confirmItem=(id)=>{
    if(!selCustomer)return alert('Müşteri seçili değil.');
    const item=queue.find(x=>x.id===id);
    if(!item)return;
    const f=item.form;
    const amt=parseFloat(f.amount)||0;
    if(!amt)return alert('Tutar boş olamaz.');
    const selBank=banks.find(b=>b.name===f.bank)||banks[0];
    if(!selBank)return alert('Banka bulunamadı.');
    const c=calcCekim(amt,parseInt(f.installment),parseFloat(f.customerRate)||0,selBank);
    const entry={id:uid(),date:f.date,type:'cekim',description:f.description||'Kart Çekimi',
      amount:amt,bank:selBank.name,installment:parseInt(f.installment),customerRate:parseFloat(f.customerRate)||0,...c};
    onUpdateCustomers(customers.map(cu=>cu.id===selCustomer.id?{...cu,cariEntries:[...(cu.cariEntries||[]),entry]}:cu));
    setQueue(q=>q.map(x=>x.id===id?{...x,status:'confirmed'}:x));
  };

  const confirmAll=()=>{
    const ready=queue.filter(x=>(x.status==='done'||x.status==='waiting')&&parseFloat(x.form.amount)>0);
    if(!ready.length)return alert('Cariye eklenecek hazır dekont yok. Tutar girilmemiş olabilir.');
    ready.forEach(x=>confirmItem(x.id));
  };


  const inS={background:'rgba(30,39,64,.8)',border:'1px solid rgba(255,255,255,.1)',borderRadius:'8px',padding:'8px 12px',color:'#e2e8f0',fontSize:'13px'};
  const waiting=queue.filter(x=>x.status==='waiting');
  const confirmed=queue.filter(x=>x.status==='confirmed').length;

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'20px'}}>
      {/* Müşteri Seçimi */}
      <Card>
        <div style={{fontWeight:700,fontSize:'15px',marginBottom:'14px'}}>Dekont Yükle & İşleme Al</div>
        <div style={{display:'flex',gap:'12px',alignItems:'flex-end',flexWrap:'wrap'}}>
          <div style={{display:'flex',flexDirection:'column',gap:'4px',flex:1,minWidth:'220px'}}>
            <label style={{fontSize:'11px',color:'#64748b',fontWeight:600}}>Müşteri Seç <span style={{color:'#ef4444'}}>*</span></label>
            <select value={selCustomerId} onChange={e=>setSelCustomerId(e.target.value)} style={{...inS}}>
              <option value="">— Müşteri Seçiniz —</option>
              {customers.map(c=><option key={c.id} value={c.id}>{c.code} — {c.name}</option>)}
            </select>
          </div>
          {selCustomerId&&<div style={{padding:'8px 14px',background:'rgba(34,197,94,0.1)',border:'1px solid rgba(34,197,94,0.3)',borderRadius:'8px',color:'#22c55e',fontSize:'13px',fontWeight:600}}>
            ✓ {selCustomer?.name}
          </div>}
        </div>
      </Card>

      {/* Yükleme Alanı */}
      <Card style={{textAlign:'center',padding:'36px 32px',borderStyle:dragging?'solid':'dashed',borderWidth:'2px',
        borderColor:dragging?'#4f8ef7':'rgba(255,255,255,0.12)',background:dragging?'rgba(79,142,247,0.05)':'#0f1320',transition:'all 0.15s',
        opacity:selCustomerId?1:0.5,pointerEvents:selCustomerId?'all':'none'}}
        onDragOver={e=>{e.preventDefault();setDragging(true);}}
        onDragLeave={()=>setDragging(false)}
        onDrop={e=>{e.preventDefault();setDragging(false);addFiles(e.dataTransfer.files);}}>
        <div style={{marginBottom:'12px',color:'#4f8ef7'}}>
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <div style={{fontWeight:700,fontSize:'15px',marginBottom:'6px'}}>
          {selCustomerId?'Dekont Yükleyin':'Önce müşteri seçin'}
        </div>
        <div style={{color:'#64748b',fontSize:'13px',marginBottom:'16px'}}>PNG, JPG sürükleyip bırakın veya seçin (çoklu seçim yapılabilir)</div>
        <label style={{display:'inline-block',padding:'9px 22px',borderRadius:'8px',background:'#4f8ef7',color:'#fff',cursor:selCustomerId?'pointer':'not-allowed',fontWeight:700,fontSize:'13px'}}>
          Dosya Seç
          <input type="file" multiple style={{display:'none'}} accept="image/*,.pdf"
            onChange={e=>addFiles(e.target.files)} disabled={!selCustomerId}/>
        </label>
        {confirmed>0&&<div style={{marginTop:'12px',color:'#22c55e',fontSize:'12px',fontWeight:600}}>✓ {confirmed} dekont cariye eklendi</div>}
      </Card>

      {/* Kuyruk */}
      {queue.length>0&&(
        <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontWeight:700,fontSize:'14px',color:'#94a3b8'}}>Yüklenen Dekontlar ({queue.length})</span>
            <div style={{display:'flex',gap:'8px'}}>
              {waiting.length>0&&(
                <button onClick={()=>waiting.forEach(x=>runOCR(x.id))}
                  style={{display:'flex',alignItems:'center',gap:'6px',background:'linear-gradient(135deg,#a855f7,#9333ea)',border:'none',borderRadius:'8px',padding:'8px 16px',color:'#fff',cursor:'pointer',fontWeight:700,fontSize:'12px'}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                  Tümünü OCR ile Tara ({waiting.length})
                </button>
              )}
              {queue.some(x=>(x.status==='done'||x.status==='waiting')&&parseFloat(x.form.amount)>0)&&(
                <button onClick={confirmAll}
                  style={{display:'flex',alignItems:'center',gap:'6px',background:'linear-gradient(135deg,#22c55e,#16a34a)',border:'none',borderRadius:'8px',padding:'8px 16px',color:'#fff',cursor:'pointer',fontWeight:700,fontSize:'12px'}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                  Tümünü Cariye Ekle
                </button>
              )}
            </div>
          </div>

          {queue.map(item=>(
            <Card key={item.id} style={{padding:0,overflow:'hidden',border:item.status==='confirmed'?'1px solid rgba(34,197,94,0.3)':item.status==='error'?'1px solid rgba(239,68,68,0.3)':'1px solid rgba(255,255,255,0.07)'}}>
              <div style={{display:'flex',gap:'0',minHeight:'200px'}}>
                {/* Sol: Görsel önizleme */}
                <div style={{width:'180px',flexShrink:0,background:'#080c18',display:'flex',alignItems:'center',justifyContent:'center',borderRight:'1px solid rgba(255,255,255,0.07)'}}>
                  {item.previewUrl
                    ?<img src={item.previewUrl} alt="dekont" style={{maxWidth:'100%',maxHeight:'180px',objectFit:'contain',padding:'8px'}}/>
                    :<div style={{color:'#64748b',fontSize:'12px',textAlign:'center',padding:'16px'}}>
                      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{marginBottom:'6px'}}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="14 2 14 9 21 9"/></svg>
                      <div>{item.file.name}</div>
                    </div>
                  }
                </div>

                {/* Sağ: Form */}
                <div style={{flex:1,padding:'16px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'12px'}}>
                    <div>
                      <div style={{fontWeight:600,fontSize:'13px',color:'#e2e8f0'}}>{item.file.name}</div>
                      <div style={{fontSize:'11px',color:'#64748b',marginTop:'2px'}}>{(item.file.size/1024).toFixed(0)} KB</div>
                    </div>
                    <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                      {item.status==='waiting'&&(
                        <button onClick={()=>runOCR(item.id)}
                          style={{fontSize:'11px',padding:'5px 12px',borderRadius:'6px',border:'1px solid rgba(168,85,247,0.4)',background:'rgba(168,85,247,0.1)',color:'#a855f7',cursor:'pointer',fontWeight:600}}>
                          OCR Tara
                        </button>
                      )}
                      {item.status==='processing'&&(
                        <div style={{display:'flex',alignItems:'center',gap:'6px',fontSize:'12px',color:'#a855f7'}}>
                          <div style={{width:'12px',height:'12px',borderRadius:'50%',border:'2px solid #a855f7',borderTopColor:'transparent',animation:'spin 0.8s linear infinite'}}/>
                          Taranıyor %{item.progress}
                        </div>
                      )}
                      {item.status==='done'&&<Badge color="#f59e0b">OCR Tamamlandı</Badge>}
                      {item.status==='confirmed'&&<Badge color="#22c55e">✓ Cariye Eklendi</Badge>}
                      {item.status==='error'&&<Badge color="#ef4444">Hata</Badge>}
                      <button onClick={()=>removeItem(item.id)}
                        style={{padding:'4px 8px',borderRadius:'6px',border:'1px solid rgba(239,68,68,0.3)',background:'rgba(239,68,68,0.08)',color:'#ef4444',cursor:'pointer',fontSize:'12px'}}>✕</button>
                    </div>
                  </div>

                  {item.status==='error'&&(
                    <div style={{color:'#ef4444',fontSize:'12px',marginBottom:'8px'}}>OCR hatası: {item.errorMsg}</div>
                  )}

                  {(item.status==='done'||item.status==='waiting')&&(
                    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr) auto',gap:'10px',alignItems:'flex-end'}}>
                      <div style={{display:'flex',flexDirection:'column',gap:'3px'}}>
                        <label style={{fontSize:'10px',color:'#64748b',fontWeight:600,textTransform:'uppercase'}}>Tarih</label>
                        <input type="date" value={item.form.date} onChange={e=>setForm(item.id,'date',e.target.value)}
                          style={{...inS,fontSize:'12px',padding:'6px 10px'}}/>
                      </div>
                      <div style={{display:'flex',flexDirection:'column',gap:'3px'}}>
                        <label style={{fontSize:'10px',color:'#64748b',fontWeight:600,textTransform:'uppercase'}}>Çekim Tutarı (₺)</label>
                        <input type="number" step="0.01" min="0" value={item.form.amount} onChange={e=>setForm(item.id,'amount',e.target.value)}
                          placeholder="10000" style={{...inS,fontSize:'12px',padding:'6px 10px',color:'#4f8ef7',fontWeight:700}}/>
                      </div>
                      <div style={{display:'flex',flexDirection:'column',gap:'3px'}}>
                        <label style={{fontSize:'10px',color:'#64748b',fontWeight:600,textTransform:'uppercase'}}>Banka</label>
                        <select value={item.form.bank} onChange={e=>setForm(item.id,'bank',e.target.value)}
                          style={{...inS,fontSize:'12px',padding:'6px 10px'}}>
                          {banks.map(b=><option key={b.id} value={b.name}>{b.name}</option>)}
                        </select>
                      </div>
                      <div style={{display:'flex',flexDirection:'column',gap:'3px'}}>
                        <label style={{fontSize:'10px',color:'#64748b',fontWeight:600,textTransform:'uppercase'}}>Taksit</label>
                        <select value={item.form.installment} onChange={e=>{
                          const inst=parseInt(e.target.value);
                          const autoRate=selCustomer?.installmentRates?.[inst-1]??selCustomer?.commissionRate??0;
                          setForm(item.id,'installment',inst);setForm(item.id,'customerRate',autoRate);
                        }} style={{...inS,fontSize:'12px',padding:'6px 10px'}}>
                          {Array.from({length:12},(_,i)=><option key={i+1} value={i+1}>{i===0?'Peşin':`${i+1} Taksit`}</option>)}
                        </select>
                      </div>
                      <div style={{display:'flex',flexDirection:'column',gap:'3px'}}>
                        <label style={{fontSize:'10px',color:'#64748b',fontWeight:600,textTransform:'uppercase'}}>Müşteri Oranı (%)</label>
                        <input type="number" step="0.1" min="0" max="100" value={item.form.customerRate} onChange={e=>setForm(item.id,'customerRate',parseFloat(e.target.value)||0)}
                          style={{...inS,fontSize:'12px',padding:'6px 10px',color:'#f59e0b',fontWeight:700}}/>
                      </div>
                      <div style={{display:'flex',flexDirection:'column',gap:'3px'}}>
                        <label style={{fontSize:'10px',color:'#64748b',fontWeight:600,textTransform:'uppercase'}}>Açıklama</label>
                        <input type="text" value={item.form.description} onChange={e=>setForm(item.id,'description',e.target.value)}
                          style={{...inS,fontSize:'12px',padding:'6px 10px'}}/>
                      </div>
                      <button onClick={()=>confirmItem(item.id)}
                        style={{gridColumn:'4',padding:'8px 16px',borderRadius:'8px',border:'none',background:'linear-gradient(135deg,#22c55e,#16a34a)',color:'#fff',cursor:'pointer',fontWeight:700,fontSize:'12px',alignSelf:'flex-end'}}>
                        ✓ Cariye Ekle
                      </button>
                    </div>
                  )}

                  {item.status==='confirmed'&&(
                    <div style={{color:'#22c55e',fontSize:'13px',fontWeight:600}}>
                      ✓ {item.form.amount} ₺ — {item.form.bank} — {item.form.installment===1?'Peşin':`${item.form.installment} Taksit`} — {selCustomer?.name} carisine eklendi
                    </div>
                  )}
                </div>
              </div>
            </Card>
          ))}
        </div>
      )}

      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}

/* ── BANKA AYARLARI PAGE ── */
function BankSettingsPage({banks,onUpdateBanks}){
  const[open,setOpen]=useState(null);
  const[compareInst,setCompareInst]=useState(1);
  const updateRate=(bankId,idx,val)=>{
    onUpdateBanks(banks.map(b=>{
      if(b.id!==bankId)return b;
      const rates=[...b.rates];
      rates[idx]=parseFloat(val)||0;
      return{...b,rates};
    }));
  };
  const updateFee=(bankId,val)=>{
    onUpdateBanks(banks.map(b=>b.id===bankId?{...b,fee:parseFloat(val)||0}:b));
  };
  return(
    <div>
      <div style={{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'24px'}}>
        {banks.map(b=>(
          <Card key={b.id} style={{padding:0,overflow:'hidden'}}>
            <button onClick={()=>setOpen(open===b.id?null:b.id)} style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'16px 20px',background:'none',border:'none',cursor:'pointer',color:'#e2e8f0'}}>
              <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
                <div style={{width:'12px',height:'12px',borderRadius:'50%',background:b.color,flexShrink:0}}/>
                <span style={{fontWeight:700,fontSize:'15px'}}>{b.name}</span>
                <Badge color="#64748b">İşlem Bedeli: ₺{b.fee}</Badge>
              </div>
              <div style={{color:'#64748b',transform:open===b.id?'rotate(180deg)':'none',transition:'transform 0.2s'}}><IcoChevronDown size={18}/></div>
            </button>
            {open===b.id&&(
              <div style={{padding:'0 20px 20px',borderTop:'1px solid rgba(255,255,255,0.06)'}}>
                <div style={{marginBottom:'16px',display:'flex',alignItems:'center',gap:'12px',paddingTop:'16px'}}>
                  <span style={{color:'#94a3b8',fontSize:'13px'}}>İşlem Bedeli (₺):</span>
                  <input type="number" step="0.01" value={b.fee} onChange={e=>updateFee(b.id,e.target.value)}
                    style={{...inputStyle,width:'100px',padding:'6px 10px',fontSize:'13px'}}/>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:'8px'}}>
                  {b.rates.map((r,i)=>(
                    <div key={i} style={{background:'#131929',borderRadius:'8px',padding:'10px',border:'1px solid rgba(255,255,255,0.06)'}}>
                      <div style={{color:'#64748b',fontSize:'10px',fontWeight:700,marginBottom:'6px',textTransform:'uppercase'}}>{i+1}. Taksit</div>
                      <input type="number" step="0.01" value={r} onChange={e=>updateRate(b.id,i,e.target.value)}
                        style={{...inputStyle,padding:'5px 8px',fontSize:'13px',fontWeight:700,color:b.color,marginBottom:'4px'}}/>
                      <div className="tabular-nums" style={{color:'#64748b',fontSize:'10px'}}>10K net: ₺{fmt(10000-(10000*r/100+b.fee))}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </Card>
        ))}
      </div>
      {/* Comparison Table */}
      <Card style={{padding:0,overflow:'hidden'}}>
        <div style={{padding:'16px 20px',borderBottom:'1px solid rgba(255,255,255,0.07)',display:'flex',alignItems:'center',gap:'16px'}}>
          <span style={{fontWeight:700}}>Banka Karşılaştırma</span>
          <Select value={compareInst} onChange={e=>setCompareInst(parseInt(e.target.value))} style={{width:'140px',padding:'6px 10px',fontSize:'13px'}}>
            {Array.from({length:12},(_,i)=><option key={i+1} value={i+1}>{i+1} Taksit</option>)}
          </Select>
        </div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
            <thead>
              <tr style={{borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
                {['Banka','Oran (%)','İşlem Bedeli','10.000₺ Maliyet','10.000₺ Net'].map(h=>(
                  <th key={h} style={{padding:'10px 14px',textAlign:'left',color:'#64748b',fontWeight:600,fontSize:'11px',textTransform:'uppercase'}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {[...banks].sort((a,b)=>a.rates[compareInst-1]-b.rates[compareInst-1]).map(b=>{
                const rate=b.rates[compareInst-1];
                const cost=+(10000*rate/100+b.fee).toFixed(2);
                const net=+(10000-cost).toFixed(2);
                return(
                  <tr key={b.id} style={{borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                    <td style={{padding:'10px 14px'}}>
                      <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                        <div style={{width:'10px',height:'10px',borderRadius:'50%',background:b.color,flexShrink:0}}/>
                        <span style={{fontWeight:700}}>{b.name}</span>
                      </div>
                    </td>
                    <td className="tabular-nums" style={{padding:'10px 14px',color:b.color,fontWeight:700}}>%{rate}</td>
                    <td className="tabular-nums" style={{padding:'10px 14px',color:'#94a3b8'}}>{fmtTL(b.fee)}</td>
                    <td className="tabular-nums" style={{padding:'10px 14px',color:'#ef4444',fontWeight:600}}>{fmtTL(cost)}</td>
                    <td className="tabular-nums" style={{padding:'10px 14px',color:'#22c55e',fontWeight:700}}>{fmtTL(net)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

function Sidebar({page,setPage,collapsed,setCollapsed,onReset,saveStatus,onExport,onImport,onLogout,role,username,mobileOpen,onMobileClose,waqCount}){
  const isMobile=useIsMobile();
  const nav=[
    {id:'dashboard',label:'Dashboard',icon:<IcoHome/>},
    {id:'customers',label:'Müşteriler',icon:<IcoUsers/>},
    {id:'reports',label:'Raporlamalar',icon:<IcoPDF/>},
    {id:'pos',label:'POS Hesap',icon:<IcoChart/>},
    {id:'profit',label:'Kar Analizi',icon:<IcoChart/>},
    {id:'dekont',label:'Dekont Yükle',icon:<IcoUpload/>},
    {id:'banks',label:'Banka Ayarları',icon:<IcoCog/>},
    ...(role==='admin'?[{id:'admin',label:'Kullanıcı Yönetimi',icon:<IcoUsers/>},{id:'waq',label:'WA Kuyruk',icon:<IcoUpload/>}]:[]),
  ];
  const w=isMobile?236:(collapsed?64:236);
  const statusLabel=saveStatus==='saving'?'Kaydediliyor…':saveStatus==='saved'?'✓ Sunucuya Kaydedildi':saveStatus==='error'?'Kayıt Hatası':'Hazır';
  const statusColor=saveStatus==='saved'?'#22c55e':saveStatus==='saving'?'#f59e0b':saveStatus==='error'?'#ef4444':'#64748b';
  const navClick=function(id){setPage(id);if(isMobile&&onMobileClose)onMobileClose();};
  const sidebarStyle={width:w,minWidth:w,background:'#0c1021',borderRight:'1px solid rgba(255,255,255,0.07)',display:'flex',flexDirection:'column',height:'100vh',flexShrink:0,transition:'width 0.2s'};
  if(isMobile){
    sidebarStyle.position='fixed';
    sidebarStyle.top=0;
    sidebarStyle.left=0;

/* ── ADMIN USERS PAGE ── */
function AdminUsersPage({token}){
  const[users,setUsers]=useState([]);

    setLoading(true);setError('');
    try{const u=await apiAdminUsers(token);setUsers(u);}
    catch(e){setError(e.message);}
    finally{setLoading(false);}
  };

            <tbody>
