const {useState,useEffect,useCallback,useMemo,useRef} = React;

function useIsMobile(){
  const[m,setM]=useState(()=>window.innerWidth<=768);
  useEffect(()=>{const fn=()=>setM(window.innerWidth<=768);window.addEventListener('resize',fn);return()=>window.removeEventListener('resize',fn);},[]);
  return m;
}

/* ── STORAGE ── */
const STORAGE_PREFIX='fintrack_v1__';
function isStorageAvailable(){try{const t='__ft_test__';localStorage.setItem(t,'1');localStorage.removeItem(t);return true;}catch{return false;}}
function readKey(key){try{const r=localStorage.getItem(STORAGE_PREFIX+key);return r!==null?JSON.parse(r):undefined;}catch{return undefined;}}
function writeKey(key,value){try{localStorage.setItem(STORAGE_PREFIX+key,JSON.stringify(value));return true;}catch{return false;}}
function usePersist(key,init){
  const[val,setVal]=useState(()=>{const s=readKey(key);return s!==undefined?s:init;});
  useEffect(()=>{writeKey(key,val);},[val]);
  return[val,setVal];
}

/* ── INDEXEDDB (dir handle kalıcılığı) ── */
function idbOpen(){return new Promise((res,rej)=>{const r=indexedDB.open('fintrack_fs',1);r.onupgradeneeded=e=>e.target.result.createObjectStore('kv');r.onsuccess=e=>res(e.target.result);r.onerror=()=>rej(r.error);});}
async function idbGet(key){try{const db=await idbOpen();return new Promise(res=>{const r=db.transaction('kv','readonly').objectStore('kv').get(key);r.onsuccess=()=>res(r.result);r.onerror=()=>res(undefined);});}catch{return undefined;}}
async function idbSet(key,val){try{const db=await idbOpen();return new Promise(res=>{const tx=db.transaction('kv','readwrite');tx.objectStore('kv').put(val,key);tx.oncomplete=()=>res(true);tx.onerror=()=>res(false);});}catch{return false;}}

/* ── API ── */
const AUTH_KEY='zyreos_auth';
function getAuth(){try{const a=localStorage.getItem(AUTH_KEY)||sessionStorage.getItem(AUTH_KEY);return a?JSON.parse(a):null;}catch{return null;}}
function setAuth(a){const s=JSON.stringify(a);sessionStorage.setItem(AUTH_KEY,s);localStorage.setItem(AUTH_KEY,s);}
function clearAuth(){sessionStorage.removeItem(AUTH_KEY);localStorage.removeItem(AUTH_KEY);}
function getToken(){const a=getAuth();return a?.token||null;}

async function apiLogin(username,password){
  const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
  const data=await r.json();
  if(!r.ok)throw Object.assign(new Error(data.error||'Giriş başarısız'),{code:data.code});
  return data;
}
async function apiRegister(username,password){
  const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
  const data=await r.json();
  if(!r.ok)throw new Error(data.error||'Kayıt başarısız');
  return data;
}
async function apiFetchData(token){
  const r=await fetch('/api/data',{headers:{Authorization:'Bearer '+token}});
  if(r.status===401)throw new Error('AUTH_EXPIRED');
  if(!r.ok)throw new Error('Veri alınamadı');
  return r.json();
}
async function apiSaveData(token,payload){
  const r=await fetch('/api/data',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify(payload)});
  if(r.status===401)throw new Error('AUTH_EXPIRED');
  if(!r.ok)throw new Error('Kayıt başarısız');
  return r.json();
}
function stableSerialize(value){
  if(Array.isArray(value))return'['+value.map(stableSerialize).join(',')+']';
  if(value&&typeof value==='object'){
    return'{'+Object.keys(value).sort().map(k=>JSON.stringify(k)+':'+stableSerialize(value[k])).join(',')+'}';
  }
  return JSON.stringify(value);
}

}

}

function rateNum(v){return +(String(v??0).replace(',','.'))||0;}
function normalizeBanks(banks,applyLatestRates=false){
  const src=Array.isArray(banks)?banks:[];
  const byName=new Map(src.map(b=>[String(b.name||'').toLowerCase(),b]));
  const normalized=INIT_BANKS.map(def=>{
    const saved=byName.get(def.name.toLowerCase());
    if(!saved)return{...def,rates:[...def.rates]};
    const savedRates=Array.isArray(saved.rates)&&saved.rates.length===12?saved.rates.map(rateNum):def.rates;
    return{...def,...saved,fee:rateNum(saved.fee),rates:applyLatestRates?[...def.rates]:savedRates};
  });
  src.forEach(b=>{
    if(!INIT_BANKS.some(def=>def.name.toLowerCase()===String(b.name||'').toLowerCase())){
      normalized.push({...b,fee:rateNum(b.fee),rates:Array.isArray(b.rates)?b.rates.map(rateNum):Array(12).fill(0)});
    }
  });
  return normalized;
}

/* ── UTILS ── */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function localDateStr(d){
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

// ── Bankacılık günü yardımcıları ──
const TR_FIXED_HOLIDAYS=['01-01','04-23','05-01','05-19','07-15','08-30','10-29'];
const TR_VARIABLE_HOLIDAYS=new Set([
  '2026-03-19','2026-03-20','2026-03-21','2026-03-22',
  '2026-05-26','2026-05-27','2026-05-28','2026-05-29','2026-05-30',
  '2027-03-09','2027-03-10','2027-03-11',
  '2027-05-16','2027-05-17','2027-05-18','2027-05-19',
]);
function isWeekend(s){
  const d=new Date(s+'T00:00:00');
  const dow=d.getDay();
  return dow===0||dow===6;
}
function isTurkishHoliday(s){
  const mmdd=s.slice(5);
  return TR_FIXED_HOLIDAYS.includes(mmdd)||TR_VARIABLE_HOLIDAYS.has(s);
}
function isBankingDay(s){
  if(isWeekend(s))return false;
  if(isTurkishHoliday(s))return false;
  return true;
}
function addBusinessDays(dateStr,count){
  const d=new Date(dateStr+'T00:00:00');
  let added=0;
  for(let i=0;i<30&&added<count;i++){
    d.setDate(d.getDate()+1);
    const s=localDateStr(d);
    if(isBankingDay(s))added++;
  }
  return localDateStr(d);
}
function addCalendarDays(dateStr,days){
  const d=new Date(dateStr+'T12:00:00');
  d.setDate(d.getDate()+days);
  return localDateStr(d);
}
function getSettlementDate(cekimDate){return addBusinessDays(cekimDate,2);}
function getTransferDate(cekimDate){return getSettlementDate(cekimDate);}
function isWeekendOrHoliday(s){return !isBankingDay(s);}


function fmt(n){return new Intl.NumberFormat('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n??0);}
function fmtTL(n){return '₺'+fmt(n);}
function fmtDate(d){return d?d.split('-').reverse().join('.'):'';}
function fmtEntryTime(ts){
  if(!ts)return'';
  const parsed=new Date(ts);
  if(Number.isNaN(parsed.getTime()))return'';
  return parsed.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
}
function renderDateCell(entry){
  const time=fmtEntryTime(entry.createdAt);
  if(!time)return<>{fmtDate(entry.date||'')}</>;
  return(
    <div style={{display:'flex',flexDirection:'column',lineHeight:1.2}}>
      <span>{fmtDate(entry.date||'')}</span>
      <span style={{fontSize:'11px',color:'#64748b'}}>{time}</span>
    </div>
  );
}
function calcBalance(entries,openingBalance=0){
  return openingBalance+(entries||[]).reduce((s,e)=>{
    if(e.type==='cekim')return s+e.netToCustomer;
    if(e.type==='bakiye_duzeltme')return s+(e.direction==='azalis'?-e.amount:e.amount);
    if(e.type==='nakit_tahsilat')return s+e.amount;
    return s-e.amount;
  },0);
}
function applyCariRunningBalance(running,e){
  if(e.type==='cekim')return+(running+e.netToCustomer).toFixed(2);
  if(e.type==='bakiye_duzeltme')return+(running+(e.direction==='azalis'?-e.amount:e.amount)).toFixed(2);
  if(e.type==='nakit_tahsilat')return+(running+e.amount).toFixed(2);
  return+(running-e.amount).toFixed(2);
}
function buildCariRows(entries,openingBalance=0){
  const indexed=(entries||[]).map((e,i)=>({e,i}));
  const chronological=[...indexed].sort((a,b)=>{
    const d=a.e.date.localeCompare(b.e.date);
    return d!==0?d:a.i-b.i;
  });
  const balanceMap=new Map();
  let running=openingBalance;
  chronological.forEach(({e})=>{
    running=applyCariRunningBalance(running,e);
    balanceMap.set(e.id,running);
  });
  return [...indexed].sort((a,b)=>{
    const d=b.e.date.localeCompare(a.e.date);
    return d!==0?d:b.i-a.i;
  }).map(({e})=>({...e,runningBal:balanceMap.get(e.id)}));
}
function calcCekim(amount,installment,customerRate,bank){
  const bankRate=bank.rates[installment-1];
  const customerComm=+(amount*customerRate/100).toFixed(2);
  const netToCustomer=+(amount-customerComm).toFixed(2);
  const bankCost=+(amount*bankRate/100).toFixed(2);
  const profit=+(amount*(customerRate-bankRate)/100).toFixed(2);
  return{customerComm,netToCustomer,bankRate,bankCost,profit};
}

/* ── AUTH SCREENS ── */
function LoginPage({onLogin,onGoRegister}){
  const[username,setUsername]=useState('');
  const[password,setPassword]=useState('');
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState('');
  const submit=async e=>{
    e.preventDefault();setError('');setLoading(true);
    try{
      const data=await apiLogin(username,password);
      setAuth({token:data.token,username:data.username,role:data.role});
      onLogin({token:data.token,username:data.username,role:data.role});
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  };
  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'#0a0d14'}}>
      <div style={{background:'#0f1320',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'20px',padding:'48px 40px',width:'100%',maxWidth:'400px',margin:'16px'}}>
        <div style={{textAlign:'center',marginBottom:'32px'}}>
          <div style={{fontSize:'32px',fontWeight:800,color:'#e2e8f0',letterSpacing:'-1px'}}>ZYRE<span style={{color:'#4f8ef7'}}>OS</span></div>
          <div style={{color:'#64748b',fontSize:'13px',marginTop:'6px'}}>Finansal Takip Sistemi</div>
        </div>
        <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:'16px'}}>
          <div>
            <label style={{display:'block',color:'#94a3b8',fontSize:'12px',fontWeight:600,marginBottom:'6px',textTransform:'uppercase'}}>Kullanıcı Adı</label>
            <input value={username} onChange={e=>setUsername(e.target.value)} autoFocus required placeholder="admin"
              style={{width:'100%',background:'#1a2035',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'8px',padding:'11px 14px',color:'#e2e8f0',fontSize:'14px',outline:'none'}}/>
          </div>
          <div>
            <label style={{display:'block',color:'#94a3b8',fontSize:'12px',fontWeight:600,marginBottom:'6px',textTransform:'uppercase'}}>Şifre</label>
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)} required
              style={{width:'100%',background:'#1a2035',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'8px',padding:'11px 14px',color:'#e2e8f0',fontSize:'14px',outline:'none'}}/>
          </div>
          {error&&<div style={{color:'#ef4444',fontSize:'13px',background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:'8px',padding:'10px 14px'}}>{error}</div>}
          <button type="submit" disabled={loading}
            style={{background:'linear-gradient(135deg,#4f8ef7,#6ba3f9)',border:'none',borderRadius:'10px',padding:'13px',color:'#fff',fontSize:'15px',fontWeight:700,cursor:loading?'default':'pointer',opacity:loading?0.7:1,marginTop:'4px'}}>
            {loading?'Giriş yapılıyor…':'Giriş Yap'}
          </button>
          <div style={{textAlign:'center',marginTop:'4px'}}>
            <span style={{color:'#64748b',fontSize:'13px'}}>Hesabınız yok mu? </span>
            <button type="button" onClick={onGoRegister}
              style={{background:'none',border:'none',color:'#4f8ef7',fontSize:'13px',fontWeight:600,cursor:'pointer',padding:0,textDecoration:'underline'}}>
              Üye Ol
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

function RegisterPage({onGoLogin}){
  const[username,setUsername]=useState('');
  const[password,setPassword]=useState('');
  const[password2,setPassword2]=useState('');
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState('');
  const[done,setDone]=useState(false);
  const submit=async e=>{
    e.preventDefault();setError('');
    if(password!==password2)return setError('Şifreler eşleşmiyor');
    setLoading(true);
    try{await apiRegister(username,password);setDone(true);}
    catch(e){setError(e.message);}
    finally{setLoading(false);}
  };
  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'#0a0d14'}}>
      <div style={{background:'#0f1320',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'20px',padding:'48px 40px',width:'100%',maxWidth:'400px',margin:'16px'}}>
        <div style={{textAlign:'center',marginBottom:'32px'}}>
          <div style={{fontSize:'32px',fontWeight:800,color:'#e2e8f0',letterSpacing:'-1px'}}>ZYRE<span style={{color:'#4f8ef7'}}>OS</span></div>
          <div style={{color:'#64748b',fontSize:'13px',marginTop:'6px'}}>Yeni Hesap Oluştur</div>
        </div>
        {done?(
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:'48px',marginBottom:'16px'}}>⏳</div>
            <div style={{fontWeight:700,fontSize:'16px',marginBottom:'8px',color:'#e2e8f0'}}>Kaydınız Alındı</div>
            <div style={{color:'#94a3b8',fontSize:'13px',lineHeight:1.6,marginBottom:'24px'}}>
              Hesabınız oluşturuldu. Admin onayından sonra giriş yapabileceksiniz.
            </div>
            <button onClick={onGoLogin}
              style={{background:'linear-gradient(135deg,#4f8ef7,#6ba3f9)',border:'none',borderRadius:'10px',padding:'11px 28px',color:'#fff',fontSize:'14px',fontWeight:700,cursor:'pointer'}}>
              Giriş Sayfasına Dön
            </button>
          </div>
        ):(
          <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:'16px'}}>
            <div>
              <label style={{display:'block',color:'#94a3b8',fontSize:'12px',fontWeight:600,marginBottom:'6px',textTransform:'uppercase'}}>Kullanıcı Adı</label>
              <input value={username} onChange={e=>setUsername(e.target.value)} autoFocus required placeholder="orn_kullanici"
                style={{width:'100%',background:'#1a2035',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'8px',padding:'11px 14px',color:'#e2e8f0',fontSize:'14px',outline:'none'}}/>
              <div style={{color:'#64748b',fontSize:'11px',marginTop:'4px'}}>Harf, rakam ve _ kullanılabilir (min 3 karakter)</div>
            </div>
            <div>
              <label style={{display:'block',color:'#94a3b8',fontSize:'12px',fontWeight:600,marginBottom:'6px',textTransform:'uppercase'}}>Şifre</label>
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)} required placeholder="En az 6 karakter"
                style={{width:'100%',background:'#1a2035',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'8px',padding:'11px 14px',color:'#e2e8f0',fontSize:'14px',outline:'none'}}/>
            </div>
            <div>
              <label style={{display:'block',color:'#94a3b8',fontSize:'12px',fontWeight:600,marginBottom:'6px',textTransform:'uppercase'}}>Şifre Tekrar</label>
              <input type="password" value={password2} onChange={e=>setPassword2(e.target.value)} required placeholder="Şifreyi tekrar girin"
                style={{width:'100%',background:'#1a2035',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'8px',padding:'11px 14px',color:'#e2e8f0',fontSize:'14px',outline:'none'}}/>
            </div>
            {error&&<div style={{color:'#ef4444',fontSize:'13px',background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',borderRadius:'8px',padding:'10px 14px'}}>{error}</div>}
            <button type="submit" disabled={loading}
              style={{background:'linear-gradient(135deg,#22c55e,#16a34a)',border:'none',borderRadius:'10px',padding:'13px',color:'#fff',fontSize:'15px',fontWeight:700,cursor:loading?'default':'pointer',opacity:loading?0.7:1,marginTop:'4px'}}>
              {loading?'Kaydediliyor…':'Üye Ol'}
            </button>
            <div style={{textAlign:'center',marginTop:'4px'}}>
              <button type="button" onClick={onGoLogin}
                style={{background:'none',border:'none',color:'#64748b',fontSize:'13px',cursor:'pointer',textDecoration:'underline'}}>
                Giriş sayfasına dön
              </button>
            </div>
          </form>
        )}
      </div>
    </div>
  );
}

/* ── EXPORT PDF ── */
function exportPDF(customer,opts){
  const allEntries=customer.cariEntries||[];
  const dateFrom=opts?.dateFrom||'';
  const dateTo=opts?.dateTo||'';
  const entries=allEntries.filter(e=>{
    if(dateFrom&&e.date<dateFrom)return false;
    if(dateTo&&e.date>dateTo)return false;
    return true;
  });
  const totalCekim=entries.filter(e=>e.type==='cekim').reduce((s,e)=>s+e.amount,0);
  const totalKomisyon=entries.filter(e=>e.type==='cekim').reduce((s,e)=>s+(e.customerComm||0),0);
  const totalOdenen=entries.filter(e=>e.type==='nakit_odeme').reduce((s,e)=>s+e.amount,0);
  const bakiye=calcBalance(entries,customer.openingBalance||0);
  const periodLabel=dateFrom||dateTo?`${dateFrom||'Başlangıç'} — ${dateTo||'Bugün'}`:'Tüm İşlemler';
  const rows=buildCariRows(entries,customer.openingBalance||0).map(e=>{
    const running=e.runningBal;
    const rColor=running>=0?'#c53030':'#276749';
    if(e.type==='cekim'){
      return`<tr>
        <td>${fmtDate(e.date)}${e.createdAt?`<br/><small style="color:#64748b">${fmtEntryTime(e.createdAt)}</small>`:''}</td><td>${e.description}<br/><small style="color:#666">${e.bank} • ${e.installment===1?'Peşin':`${e.installment} Taksit`}</small></td>
        <td class="num">₺${fmt(e.amount)}</td><td class="num">₺${fmt(e.customerComm||0)} (%${e.customerRate})</td>
        <td class="num">₺${fmt(e.netToCustomer)}</td><td class="num">—</td>
        <td class="num" style="color:${rColor}">₺${fmt(Math.abs(running))} ${running>=0?'Borç':'Alacak'}</td></tr>`;
    }else if(e.type==='bakiye_duzeltme'){
      return`<tr style="background:#fffbeb">
        <td>${fmtDate(e.date)}${e.createdAt?`<br/><small style="color:#64748b">${fmtEntryTime(e.createdAt)}</small>`:''}</td><td>${e.description}<br/><small style="color:#b7791f">Bakiye Düzeltme • ${e.direction==='azalis'?'Azalış':'Artış'}</small></td>
        <td class="num">—</td><td class="num">—</td><td class="num">—</td>
        <td class="num" style="color:#b7791f">${e.direction==='azalis'?'-':'+'}₺${fmt(e.amount)}</td>
        <td class="num" style="color:${rColor}">₺${fmt(Math.abs(running))} ${running>=0?'Borç':'Alacak'}</td></tr>`;
    }else if(e.type==='nakit_tahsilat'){
      return`<tr>
        <td>${fmtDate(e.date)}${e.createdAt?`<br/><small style="color:#64748b">${fmtEntryTime(e.createdAt)}</small>`:''}</td><td>${e.description}<br/><small style="color:#0891b2">Nakit Tahsilat</small></td>
        <td class="num">—</td><td class="num">—</td><td class="num">—</td>
        <td class="num" style="color:#0891b2">₺${fmt(e.amount)}</td>
        <td class="num" style="color:${rColor}">₺${fmt(Math.abs(running))} ${running>=0?'Borç':'Alacak'}</td></tr>`;
    }else{
      return`<tr>
        <td>${fmtDate(e.date)}${e.createdAt?`<br/><small style="color:#64748b">${fmtEntryTime(e.createdAt)}</small>`:''}</td><td>${e.description}</td>
        <td class="num">—</td><td class="num">—</td><td class="num">—</td>
        <td class="num" style="color:#276749">₺${fmt(e.amount)}</td>
        <td class="num" style="color:${rColor}">₺${fmt(Math.abs(running))} ${running>=0?'Borç':'Alacak'}</td></tr>`;
    }
  }).join('');
  const bLabel=bakiye>=0?'BORÇLUYUM':'ALACAKLIYIM';
  const bColor=bakiye>=0?'#c53030':'#276749';
  const html=`<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"/>
  <title>Ekstre — ${customer.name}</title>
  <style>
    @page{size:A4;margin:16mm 14mm;}
    body{font-family:Arial,sans-serif;font-size:12px;color:#1a202c;margin:0;padding:0;}
    .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid #2d3748;}
    .logo{font-size:22px;font-weight:800;color:#1a202c;letter-spacing:-0.5px;}
    .logo span{color:#4f8ef7;}
    .title{font-size:11px;color:#4a5568;margin-top:2px;}
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 24px;margin-bottom:14px;padding:12px;background:#f7fafc;border-radius:8px;border:1px solid #e2e8f0;}
    .info-row{display:flex;gap:8px;font-size:11px;}
    .info-label{color:#718096;font-weight:600;min-width:100px;}
    .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0;}
    .sum-card{padding:10px;background:#ebf8ff;border-radius:8px;text-align:center;border:1px solid #bee3f8;}
    .sum-card .val{font-size:14px;font-weight:700;color:#2b6cb0;}
    .sum-card .lbl{font-size:9px;color:#4a5568;text-transform:uppercase;letter-spacing:0.05em;margin-top:2px;}
    table{width:100%;border-collapse:collapse;margin-top:10px;}
    th{background:#2d3748;color:#fff;padding:7px 9px;text-align:left;font-size:10px;font-weight:700;}
    td{padding:6px 9px;border-bottom:1px solid #e2e8f0;font-size:11px;vertical-align:top;}
    tr:nth-child(even)td{background:#f7fafc;}
    .num{text-align:right;font-variant-numeric:tabular-nums;}
    .balance-box{margin-top:16px;padding:16px;border-radius:10px;background:${bakiye>=0?'#fff5f5':'#f0fff4'};border:2px solid ${bColor};text-align:center;}
    .balance-box .amount{font-size:26px;font-weight:800;color:${bColor};}
    .balance-box .label{font-size:14px;font-weight:700;color:${bColor};margin-top:4px;}
    .footer{margin-top:16px;text-align:center;color:#a0aec0;font-size:9px;border-top:1px solid #e2e8f0;padding-top:10px;}
    @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
  </style></head><body>
  <div class="header">
    <div><div class="logo">ZY<span>REOS</span></div><div class="title">Finansal Takip Sistemi</div></div>
    <div style="text-align:right"><div style="font-size:15px;font-weight:700">Cari Hesap Ekstresi</div><div style="color:#718096;font-size:10px;margin-top:3px">Dönem: ${periodLabel}</div><div style="color:#718096;font-size:10px">Oluşturma: ${new Date().toLocaleDateString('tr-TR')}</div></div>
  </div>
  <div class="info-grid">
    <div class="info-row"><span class="info-label">Müşteri Adı:</span><span>${customer.name}</span></div>
    <div class="info-row"><span class="info-label">Müşteri Kodu:</span><span>${customer.code}</span></div>
    <div class="info-row"><span class="info-label">Telefon:</span><span>${customer.phone||'—'}</span></div>
    <div class="info-row"><span class="info-label">E-posta:</span><span>${customer.email||'—'}</span></div>
    <div class="info-row"><span class="info-label">Adres:</span><span>${customer.address||'—'}</span></div>
    <div class="info-row"><span class="info-label">Vergi No:</span><span>${customer.taxNo||'—'}</span></div>
  </div>
  <div class="summary">
    <div class="sum-card"><div class="val">₺${fmt(totalCekim)}</div><div class="lbl">Toplam Çekim</div></div>
    <div class="sum-card"><div class="val">₺${fmt(totalKomisyon)}</div><div class="lbl">Toplam Komisyon</div></div>
    <div class="sum-card"><div class="val">₺${fmt(totalOdenen)}</div><div class="lbl">Ödenen Nakit</div></div>
    <div class="sum-card" style="background:${bakiye>=0?'#fff5f5':'#f0fff4'};border-color:${bColor}"><div class="val" style="color:${bColor}">₺${fmt(Math.abs(bakiye))}</div><div class="lbl">Kalan Bakiye</div></div>
  </div>
  <table>
    <thead><tr><th>Tarih</th><th>Açıklama</th><th class="num">Çekim Tutarı</th><th class="num">Müşteri Kom.</th><th class="num">Müşteriye Nakit</th><th class="num">Ödenen Nakit</th><th class="num">Bakiye</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div class="balance-box">
    <div class="amount">₺${fmt(Math.abs(bakiye))}</div>
    <div class="label">${bLabel}</div>
  </div>
  <div class="footer">ZYREOS Finansal Takip Sistemi — Bu ekstre bilgisayar ortamında oluşturulmuştur. Toplam ${entries.length} işlem.</div>
  </body></html>`;
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`ekstre_${customer.code}_${dateFrom||'tum'}_${dateTo||'donem'}.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

/* ── DASHBOARD PAGE ── */
function DashboardPage({customers,onNavigateCustomer}){
  const allEntries=useMemo(()=>customers.flatMap(c=>(c.cariEntries||[]).map(e=>({...e,customerName:c.name,customerCode:c.code,customerId:c.id}))),[customers]);
  const allCekim=allEntries.filter(e=>e.type==='cekim');

  const today=todayStr();
  const d=new Date(today);
  // Haftanın başı (Pazartesi)
  const dow=d.getDay()===0?6:d.getDay()-1;
  const weekStart=new Date(d);weekStart.setDate(d.getDate()-dow);
  const weekStartStr=weekStart.toISOString().slice(0,10);
  // Ayın başı
  const monthStartStr=today.slice(0,7)+'-01';

  const sum=(arr,field)=>arr.reduce((s,e)=>s+(e[field]||0),0);
  const filter=(from,to)=>allCekim.filter(e=>e.date>=from&&e.date<=to);
  const filterSettlement=(from,to)=>allCekim.filter(e=>{
    const settlementDate=getSettlementDate(e.date);
    return settlementDate>=from&&settlementDate<=to;
  });

  const todayCekim=filter(today,today);
  const weekCekim=filter(weekStartStr,today);
  const monthCekim=filter(monthStartStr,today);
  const todaySettlement=filterSettlement(today,today);

  const recentCekim=[...allCekim].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8);

  const PeriodCard=({label,sub,entries})=>{
    const total=sum(entries,'amount');
    const realProfit=entries.reduce((s,e)=>{
      const bankCut=e.bankCost||+(e.amount*(e.bankRate||0)/100).toFixed(2);
      const netDeposit=e.amount-bankCut;
      const ownerShare=+(netDeposit*0.01).toFixed(2);
      const customerComm=e.customerComm||0;
      return s+customerComm-bankCut-ownerShare;
    },0);
    return(
      <div style={{background:'linear-gradient(135deg,rgba(15,23,42,0.9),rgba(20,30,60,0.9))',borderRadius:'14px',border:'1px solid rgba(255,255,255,0.08)',padding:'20px 22px',display:'flex',flexDirection:'column',gap:'10px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <div style={{fontSize:'12px',fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'0.06em'}}>{label}</div>
            <div style={{fontSize:'10px',color:'#475569',marginTop:'2px'}}>{sub}</div>
          </div>
          <Badge color="#4f8ef7">{entries.length} işlem</Badge>
        </div>
        <div>
          <div style={{fontSize:'11px',color:'#64748b',marginBottom:'2px'}}>Toplam Çekim</div>
          <div className="tabular-nums" style={{fontSize:'22px',fontWeight:800,color:'#4f8ef7',letterSpacing:'-0.5px'}}>{fmtTL(total)}</div>
        </div>
        <div style={{borderTop:'1px solid rgba(255,255,255,0.06)',paddingTop:'10px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:'11px',color:'#64748b'}}>Net Kârım</div>
          <div className="tabular-nums" style={{fontSize:'16px',fontWeight:800,color:realProfit>=0?'#a855f7':'#ef4444'}}>{fmtTL(realProfit)}</div>
        </div>
      </div>
    );
  };

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'20px'}}>

      {/* Dönem Kartları */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'16px'}}>
        <PeriodCard label="Bugün Yatacak" sub={today} entries={todaySettlement}/>
        <PeriodCard label="Bu Hafta" sub={`${weekStartStr} — ${today}`} entries={weekCekim}/>
        <PeriodCard label="Bu Ay" sub={today.slice(0,7)} entries={monthCekim}/>
      </div>

      {/* Müşteri Bakiye + Son Çekimler */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'}}>
        <Card>
          <div style={{fontWeight:700,marginBottom:'16px',fontSize:'14px',color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.05em'}}>Müşteri Bakiye Özeti</div>
          <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
            {customers.map(c=>{
              const bak=calcBalance(c.cariEntries||[],c.openingBalance||0);
              const isBorc=bak>0;
              return(
                <div key={c.id} onClick={()=>onNavigateCustomer(c.id)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',borderRadius:'10px',background:'#131929',cursor:'pointer',border:'1px solid transparent',transition:'border-color 0.15s'}} className="hover:border-blue-500/30">
                  <div>
                    <span style={{fontWeight:600,marginRight:'8px'}}>{c.name}</span>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div className="tabular-nums" style={{color:isBorc?'#ef4444':'#22c55e',fontWeight:700,fontSize:'14px'}}>{fmtTL(Math.abs(bak))}</div>
                    <div style={{fontSize:'10px',color:isBorc?'#ef4444':'#22c55e'}}>{isBorc?'Borçlu':'Alacaklı'}</div>
                  </div>
                </div>
              );
            })}
            {customers.length===0&&<div style={{textAlign:'center',padding:'24px',color:'#64748b',fontSize:'13px'}}>Henüz müşteri yok</div>}
          </div>
        </Card>
        <Card>
          <div style={{fontWeight:700,marginBottom:'16px',fontSize:'14px',color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.05em'}}>Son Çekimler</div>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
              <thead>
                <tr style={{borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
                  {['Tarih','Müşteri','Tutar','Kar'].map(h=><th key={h} style={{textAlign:'left',padding:'6px 8px',color:'#64748b',fontWeight:600,fontSize:'11px',textTransform:'uppercase'}}>{h}</th>)}
                </tr>
              </thead>
              <tbody>
                {recentCekim.map(e=>(
                  <tr key={e.id} style={{borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                    <td style={{padding:'8px',color:'#94a3b8',whiteSpace:'nowrap'}}>{renderDateCell(e)}</td>
                    <td style={{padding:'8px'}}><span style={{fontWeight:600}}>{e.customerName}</span></td>
                    <td className="tabular-nums" style={{padding:'8px',color:'#4f8ef7',fontWeight:600}}>{fmtTL(e.amount)}</td>
                    <td className="tabular-nums" style={{padding:'8px',color:e.profit>=0?'#22c55e':'#ef4444',fontWeight:700}}>{fmtTL(e.profit)}</td>
                  </tr>
                ))}
                {recentCekim.length===0&&<tr><td colSpan={4} style={{padding:'20px',textAlign:'center',color:'#64748b'}}>Henüz çekim yok</td></tr>}
              </tbody>
            </table>
          </div>
        </Card>
      </div>
    </div>
  );
}

      <div style={{marginTop:'16px',background:'rgba(15,23,42,0.6)',borderRadius:'10px',border:'1px solid rgba(255,255,255,0.08)',padding:'14px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}}>
          <span style={{fontSize:'12px',fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.06em'}}>Taksit Bazlı Komisyon Oranları (%)</span>
          <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
            <input type="number" step="0.1" min="0" max="100" placeholder="0.0"
              style={{width:'72px',background:'rgba(30,39,64,.8)',border:'1px solid rgba(245,158,11,0.4)',borderRadius:'6px',padding:'4px 8px',color:'#f59e0b',fontWeight:700,fontSize:'12px',textAlign:'center'}}

          {Array.from({length:12},(_,i)=>{
            const rates=form.installmentRates||Array(12).fill(3.5);

/* ── ADD ENTRY MODAL ── */
function AddEntryModal({open,onClose,onSave,onUpdate,editingEntry,customer,banks,companies}){
  const[type,setType]=useState('cekim');
  const today=todayStr();
  const[form,setForm]=useState({date:today,description:'Kart Çekimi',amount:'',bank:'',installment:1,customerRate:customer?.installmentRates?.[0]??customer?.commissionRate??3.5});
  const[nakit,setNakit]=useState({date:today,description:'Nakit Ödeme',amount:''});
  const newBulkRow=()=>({id:uid(),date:today,amount:'',bank:'',installment:1,customerRate:customer?.installmentRates?.[0]??customer?.commissionRate??3.5});
  const[bulkRows,setBulkRows]=useState([newBulkRow()]);
  const[selCompanyId,setSelCompanyId]=useState('');
  const[posType,setPosType]=useState('sanal');

  const migrateCompany=(c)=>{
    if(c.bankRates&&c.bankRates.length>0)return c;
    const oldRates=c.rates||Array(12).fill(0);
    return{...c,bankRates:INIT_BANKS.map(b=>({bankName:b.name,sanalRates:[...oldRates],fizikiRate:parseFloat(oldRates[0])||0}))};
  };

  const selCompany=selCompanyId?(companies||[]).find(c=>c.id===selCompanyId):null;
  const mc=selCompany?migrateCompany(selCompany):null;
  const allowedPos=mc?(mc.posTypes||{sanal:true,fiziki:true}):{sanal:true,fiziki:true};
  const companyBankList=mc?mc.bankRates.map(br=>br.bankName):banks.map(b=>b.name);

  useEffect(()=>{
    if(open){
      if(editingEntry){
        if(editingEntry.type==='nakit_odeme'){
          setType('nakit_odeme');
          setNakit({date:editingEntry.date||today,description:editingEntry.description||'Nakit Ödeme',amount:String(editingEntry.amount||'')});
        }else if(editingEntry.type==='nakit_tahsilat'){
          setType('nakit_tahsilat');
          setNakit({date:editingEntry.date||today,description:editingEntry.description||'Nakit Tahsilat',amount:String(editingEntry.amount||'')});
        }else if(editingEntry.type==='bakiye_duzeltme'){
          setType('bakiye_duzeltme');
          setNakit({date:editingEntry.date||today,description:editingEntry.description||'Bakiye Düzeltme',amount:String(editingEntry.amount||''),direction:editingEntry.direction||'artis'});
        }else{
          setType('cekim');
          setForm({date:editingEntry.date||today,description:editingEntry.description||'Kart Çekimi',amount:String(editingEntry.amount||''),bank:editingEntry.bank||'',installment:editingEntry.installment||1,customerRate:editingEntry.customerRate??customer?.commissionRate??3.5});
          setSelCompanyId(editingEntry.companyId||'');
          setPosType(editingEntry.posType||'sanal');
        }
        setBulkRows([newBulkRow()]);
      }else{
        setType('cekim');
        const defRate=customer?.installmentRates?.[0]??customer?.commissionRate??3.5;
        setForm({date:today,description:'Kart Çekimi',amount:'',bank:'',installment:1,customerRate:defRate});
        setNakit({date:today,description:'Nakit Ödeme',amount:''});
        setBulkRows([newBulkRow()]);
        setSelCompanyId('');
        setPosType('sanal');
      }
    }
  },[open,customer,editingEntry]);

  // Şirket değiştiğinde ilk bankayı seç
  useEffect(()=>{
    if(mc&&mc.bankRates.length>0&&!mc.bankRates.find(br=>br.bankName===form.bank)){
      setForm(f=>({...f,bank:mc.bankRates[0].bankName}));
    }
  },[selCompanyId]);

  // Şirketin desteklemediği POS tipi seçiliyse otomatik değiştir
  useEffect(()=>{
    if(!mc)return;
    const ap=mc.posTypes||{sanal:true,fiziki:true};
    if(posType==='sanal'&&!ap.sanal&&ap.fiziki){setPosType('fiziki');setForm(f=>({...f,installment:1}));setBulkRows(p=>p.map(r=>({...r,installment:1})));}
    else if(posType==='fiziki'&&!ap.fiziki&&ap.sanal){setPosType('sanal');}
  },[selCompanyId]);

  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const handleInstallmentChange=(val)=>{
    const inst=parseInt(val);
    const autoRate=customer?.installmentRates?.[inst-1]??customer?.commissionRate??3.5;
    setForm(p=>({...p,installment:inst,customerRate:autoRate}));
  };

  // Efektif banka oranı hesabı
  const getEffectiveRate=()=>{
    if(!mc)return null;
    const brEntry=mc.bankRates.find(br=>br.bankName===form.bank);
    if(!brEntry)return null;
    if(posType==='fiziki')return brEntry.fizikiRate||0;
    return brEntry.sanalRates[(form.installment||1)-1]||0;
  };

  const effectiveRate=getEffectiveRate();
  const effectiveBank=effectiveRate!==null?{name:form.bank,rates:Array(12).fill(effectiveRate),fee:0}:(banks.find(b=>b.name===form.bank)||banks[0]);

  const calc=useMemo(()=>{
    if(!form.amount)return null;
    const amt=parseFloat(form.amount)||0;
    if(!amt)return null;
    if(mc&&effectiveRate!==null){
      const bankRate=effectiveRate;
      const customerComm=+(amt*(form.customerRate||0)/100).toFixed(2);
      const netToCustomer=+(amt-customerComm).toFixed(2);
      const bankCost=+(amt*bankRate/100).toFixed(2);
      const profit=+(amt*((form.customerRate||0)-bankRate)/100).toFixed(2);
      return{customerComm,netToCustomer,bankRate,bankCost,profit};
    }
    if(!effectiveBank)return null;
    return calcCekim(amt,posType==='fiziki'?1:form.installment,form.customerRate,effectiveBank);
  },[form.amount,form.installment,form.customerRate,form.bank,selCompanyId,posType,effectiveRate]);

  const computeSettlementDate=(date)=>{
    if(!mc)return null;
    if(posType==='fiziki')return addCalendarDays(date,1);
    return addBusinessDays(date,mc.valorDays||1);
  };

  const buildCekimEntry=(entryBase,amt,bankName,inst,custRate)=>{
    const br=mc?mc.bankRates.find(b=>b.bankName===bankName):null;
    let bankRate,bankCost,profit,customerComm,netToCustomer;
    if(br){
      bankRate=posType==='fiziki'?(br.fizikiRate||0):(br.sanalRates[(inst||1)-1]||0);
      customerComm=+(amt*custRate/100).toFixed(2);
      netToCustomer=+(amt-customerComm).toFixed(2);
      bankCost=+(amt*bankRate/100).toFixed(2);
      profit=+(amt*(custRate-bankRate)/100).toFixed(2);
    }else{
      const fb=banks.find(b=>b.name===bankName)||banks[0];
      const c2=calcCekim(amt,inst,custRate,fb);
      bankRate=c2.bankRate;customerComm=c2.customerComm;netToCustomer=c2.netToCustomer;bankCost=c2.bankCost;profit=c2.profit;
    }
    const settlementDate=computeSettlementDate(entryBase.date);
    return{...entryBase,amount:amt,bank:bankName,installment:posType==='fiziki'?1:parseInt(inst),customerRate:custRate,
      companyId:selCompanyId,companyName:mc?.name||'',posType,settlementDate:settlementDate||'',
      bankRate,customerComm,netToCustomer,bankCost,profit};
  };

  const handleSave=()=>{
    if(editingEntry){
      if(type==='cekim'){
        const amt=parseFloat(form.amount)||0;
        if(!amt)return alert('Tutar giriniz.');
        if(!selCompanyId)return alert('Şirket seçiniz.');
        const entry=buildCekimEntry({...editingEntry,date:form.date,description:form.description||'Kart Çekimi',type:'cekim'},amt,form.bank,form.installment,form.customerRate);
        onUpdate(entry);
      }else if(type==='bakiye_duzeltme'){
        const amt=parseFloat(nakit.amount)||0;
        if(!amt)return alert('Tutar giriniz.');
        onUpdate({...editingEntry,date:nakit.date,description:nakit.description||'Bakiye Düzeltme',amount:amt,direction:nakit.direction||'artis'});
      }else if(type==='nakit_tahsilat'){
        const amt=parseFloat(nakit.amount)||0;
        if(!amt)return alert('Tutar giriniz.');
        onUpdate({...editingEntry,date:nakit.date,description:nakit.description||'Nakit Tahsilat',amount:amt,type:'nakit_tahsilat'});
      }else{
        const amt=parseFloat(nakit.amount)||0;
        if(!amt)return alert('Tutar giriniz.');
        onUpdate({...editingEntry,date:nakit.date,description:nakit.description||'Nakit Ödeme',amount:amt});
      }
      onClose();
      return;
    }
    if(type==='cekim'){
      const amt=parseFloat(form.amount)||0;
      if(!amt)return alert('Tutar giriniz.');
      if(!selCompanyId)return alert('Şirket seçiniz.');
      const entry=buildCekimEntry({id:uid(),date:form.date,type:'cekim',description:form.description||'Kart Çekimi',createdAt:new Date().toISOString()},amt,form.bank,form.installment,form.customerRate);
      onSave(entry);
    }else if(type==='nakit_odeme'){
      const amt=parseFloat(nakit.amount)||0;
      if(!amt)return alert('Tutar giriniz.');
      onSave({id:uid(),date:nakit.date,type:'nakit_odeme',description:nakit.description||'Nakit Ödeme',amount:amt,createdAt:new Date().toISOString()});
    }else if(type==='nakit_tahsilat'){
      const amt=parseFloat(nakit.amount)||0;
      if(!amt)return alert('Tutar giriniz.');
      onSave({id:uid(),date:nakit.date,type:'nakit_tahsilat',description:nakit.description||'Nakit Tahsilat',amount:amt,createdAt:new Date().toISOString()});
    }else if(type==='bakiye_duzeltme'){
      const amt=parseFloat(nakit.amount)||0;
      if(!amt)return alert('Tutar giriniz.');
      onSave({id:uid(),date:nakit.date,type:'bakiye_duzeltme',description:nakit.description||'Bakiye Düzeltme',amount:amt,direction:nakit.direction||'artis',createdAt:new Date().toISOString()});
    }else{
      const valid=bulkRows.filter(r=>parseFloat(r.amount)>0);
      if(!valid.length)return alert('En az bir satıra tutar giriniz.');
      if(!selCompanyId)return alert('Şirket seçiniz.');
      const allEntries=valid.map(r=>{
        const amt=parseFloat(r.amount);
        const inst=parseInt(r.installment)||1;
        const rate=parseFloat(r.customerRate)||(customer?.installmentRates?.[inst-1]??3.5);
        const bName=r.bank||form.bank;
        return buildCekimEntry({id:uid(),date:r.date,type:'cekim',description:'Kart Çekimi',createdAt:new Date().toISOString()},amt,bName,inst,rate);
      });
      onSave(allEntries);
    }
    onClose();
  };

  const setBulkRow=(id,k,v)=>setBulkRows(p=>p.map(r=>r.id===id?{...r,[k]:v}:r));
  const setBulkInstallment=(id,val)=>{
    const inst=parseInt(val)||1;
    const autoRate=customer?.installmentRates?.[inst-1]??customer?.commissionRate??3.5;
    setBulkRows(p=>p.map(r=>r.id===id?{...r,installment:inst,customerRate:autoRate}:r));
  };
  const previewRow=(lbl,val,color='#e2e8f0')=>(
    <div style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
      <span style={{color:'#94a3b8',fontSize:'13px'}}>{lbl}</span>
      <span className="tabular-nums" style={{color,fontWeight:700,fontSize:'13px'}}>{val}</span>
    </div>
  );
  const inS={background:'rgba(30,39,64,.8)',border:'1px solid rgba(255,255,255,.1)',borderRadius:'6px',padding:'6px 8px',color:'#e2e8f0',fontSize:'12px',width:'100%',boxSizing:'border-box'};

  return(
    <Modal open={open} onClose={onClose} title={editingEntry?'Kaydı Düzenle':'Yeni Kayıt Ekle'} width={type==='bulk'?820:520}>
      <div style={{display:'flex',gap:'8px',marginBottom:'20px',flexWrap:'wrap'}}>
        {[['cekim','Kart Çekimi','#4f8ef7'],['nakit_odeme','Nakit Ödeme','#22c55e'],['nakit_tahsilat','Nakit Tahsilat','#06b6d4'],...(!editingEntry?[['bulk','Toplu Giriş','#f59e0b']]:[])].map(([v,l,c])=>(
          <button key={v} onClick={()=>setType(v)}
            style={{flex:1,padding:'10px',borderRadius:'8px',border:`2px solid ${type===v?c:'rgba(255,255,255,0.1)'}`,background:type===v?c+'22':'transparent',color:type===v?c:'#94a3b8',cursor:'pointer',fontWeight:700,fontSize:'13px',transition:'all 0.15s'}}>{l}</button>
        ))}
      </div>
      {type==='cekim'?(
        <div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 16px'}}>
            <Field label="Tarih" required><Input type="date" value={form.date} onChange={e=>set('date',e.target.value)}/></Field>
            <Field label="Açıklama"><Input value={form.description} onChange={e=>set('description',e.target.value)}/></Field>
            <Field label="Çekim Tutarı (₺)" required><Input type="number" step="0.01" min="0" value={form.amount} onChange={e=>set('amount',e.target.value)} placeholder="10000"/></Field>
            <Field label="Şirket" required>
              <Select value={selCompanyId} onChange={e=>{setSelCompanyId(e.target.value);setPosType('sanal');}}>
                <option value="">— Şirket Seçiniz —</option>
                {(companies||[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </Select>
            </Field>
            {selCompanyId&&(
              <Field label="Banka" required>
                <Select value={form.bank} onChange={e=>set('bank',e.target.value)}>
                  {companyBankList.map(bn=><option key={bn} value={bn}>{bn}</option>)}
                </Select>
              </Field>
            )}
            {selCompanyId&&(
              <Field label="POS Tipi">
                <div style={{display:'flex',gap:'8px',paddingTop:'4px'}}>
                  {allowedPos.sanal&&<label style={{display:'flex',alignItems:'center',gap:'6px',cursor:'pointer',fontSize:'13px',color:posType==='sanal'?'#4f8ef7':'#94a3b8',fontWeight:posType==='sanal'?700:400}}>
                    <input type="radio" name="posType" checked={posType==='sanal'} onChange={()=>{setPosType('sanal');}} style={{accentColor:'#4f8ef7'}}/>
                    Sanal POS
                  </label>}
                  {allowedPos.fiziki&&<label style={{display:'flex',alignItems:'center',gap:'6px',cursor:'pointer',fontSize:'13px',color:posType==='fiziki'?'#f59e0b':'#94a3b8',fontWeight:posType==='fiziki'?700:400}}>
                    <input type="radio" name="posType" checked={posType==='fiziki'} onChange={()=>{setPosType('fiziki');setForm(f=>({...f,installment:1}));}} style={{accentColor:'#f59e0b'}}/>
                    Fiziki POS
                  </label>}
                </div>
              </Field>
            )}
            <Field label="Taksit" required>
              <Select value={posType==='fiziki'?1:form.installment} onChange={e=>handleInstallmentChange(e.target.value)} disabled={posType==='fiziki'}>
                {posType==='fiziki'
                  ?<option value={1}>Peşin</option>
                  :Array.from({length:12},(_,i)=><option key={i+1} value={i+1}>{i===0?'Peşin':`${i+1} Taksit`}</option>)
                }
              </Select>
            </Field>
            <Field label="Müşteri Oranı (%)">
              <Input type="number" step="0.1" min="0" max="100" value={form.customerRate}
                onChange={e=>set('customerRate',parseFloat(e.target.value)||0)}
                style={{...inputStyle,background:'#2d1f04',borderColor:'#f59e0b88',color:'#f59e0b',fontWeight:700}}/>
            </Field>
          </div>
          {calc&&(
            <div style={{background:'#131929',borderRadius:'10px',padding:'14px',marginTop:'4px',border:'1px solid rgba(255,255,255,0.07)'}}>
              <div style={{color:'#94a3b8',fontSize:'11px',fontWeight:700,letterSpacing:'0.05em',marginBottom:'8px',textTransform:'uppercase'}}>Hesaplama Önizlemesi</div>
              {previewRow('Müşteri Komisyonu',fmtTL(calc.customerComm)+' (%'+(form.customerRate||0)+')','#a855f7')}
              {previewRow('Müşteriye Nakit',fmtTL(calc.netToCustomer),'#4f8ef7')}
              {previewRow('POS Maliyeti (%'+calc.bankRate+')',fmtTL(calc.bankCost),'#ef4444')}
              {previewRow('NET KAR',fmtTL(calc.profit),calc.profit>=0?'#22c55e':'#ef4444')}
              {mc&&<div style={{color:'#64748b',fontSize:'11px',marginTop:'6px'}}>
                {posType==='fiziki'?'Fiziki POS — Ertesi gün yatar (haftasonu dahil)':'Sanal POS — '+(mc.valorDays===1?'Ertesi iş günü':'2 iş günü')+' valör'}
                {form.date&&(' → Tahmini yatma: '+fmtDate(computeSettlementDate(form.date)))}
              </div>}
            </div>
          )}
        </div>
      ):type==='nakit_odeme'?(
        <div>
          <Field label="Tarih" required><Input type="date" value={nakit.date} onChange={e=>setNakit(p=>({...p,date:e.target.value}))}/></Field>
          <Field label="Açıklama"><Input value={nakit.description} onChange={e=>setNakit(p=>({...p,description:e.target.value}))}/></Field>
          <Field label="Ödeme Tutarı (₺)" required><Input type="number" step="0.01" min="0" value={nakit.amount} onChange={e=>setNakit(p=>({...p,amount:e.target.value}))} placeholder="5000"/></Field>
        </div>
      ):type==='nakit_tahsilat'?(
        <div>
          <Field label="Tarih" required><Input type="date" value={nakit.date} onChange={e=>setNakit(p=>({...p,date:e.target.value}))}/></Field>
          <Field label="Açıklama"><Input value={nakit.description} onChange={e=>setNakit(p=>({...p,description:e.target.value}))} placeholder="Nakit tahsilat açıklaması..."/></Field>
          <Field label="Tahsilat Tutarı (₺)" required><Input type="number" step="0.01" min="0" value={nakit.amount} onChange={e=>setNakit(p=>({...p,amount:e.target.value}))} placeholder="5000"/></Field>
          <div style={{background:'rgba(6,182,212,0.08)',border:'1px solid rgba(6,182,212,0.2)',borderRadius:'8px',padding:'10px 12px',fontSize:'12px',color:'#67e8f9',marginTop:'8px'}}>
            Bu kayıt bakiyeyi azaltır ve kasaya nakit giriş olarak yansır.
          </div>
        </div>
      ):type==='bakiye_duzeltme'?(
        <div>
          <Field label="Tarih" required><Input type="date" value={nakit.date} onChange={e=>setNakit(p=>({...p,date:e.target.value}))}/></Field>
          <Field label="Yön" required>
            <select value={nakit.direction||'artis'} onChange={e=>setNakit(p=>({...p,direction:e.target.value}))} style={{background:'rgba(30,39,64,.8)',border:'1px solid rgba(255,255,255,.1)',borderRadius:'6px',padding:'8px 12px',color:'#e2e8f0',fontSize:'13px',width:'100%',boxSizing:'border-box'}}>
              <option value="artis">Artış (Bakiye artar)</option>
              <option value="azalis">Azalış (Bakiye azalır)</option>
            </select>
          </Field>
          <Field label="Tutar (₺)" required><Input type="number" step="0.01" min="0" value={nakit.amount} onChange={e=>setNakit(p=>({...p,amount:e.target.value}))} placeholder="1000"/></Field>
          <Field label="Açıklama"><Input value={nakit.description} onChange={e=>setNakit(p=>({...p,description:e.target.value}))} placeholder="Bakiye düzeltme nedeni..."/></Field>
        </div>
      ):(
        <div>
          {selCompanyId&&<div style={{marginBottom:'10px',padding:'8px 12px',borderRadius:'8px',background:'rgba(79,142,247,0.08)',border:'1px solid rgba(79,142,247,0.2)',fontSize:'12px',color:'#4f8ef7'}}>
            Şirket: <b>{mc?.name}</b> | POS: <b>{posType==='fiziki'?'Fiziki':'Sanal'}</b>
          </div>}
          <div style={{marginBottom:'10px',display:'grid',gridTemplateColumns:selCompanyId?'1fr auto':'1fr',gap:'0 16px',alignItems:'end'}}>
            <Field label="Şirket" required>
              <Select value={selCompanyId} onChange={e=>{setSelCompanyId(e.target.value);setPosType('sanal');}}>
                <option value="">— Şirket Seçiniz —</option>
                {(companies||[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </Select>
            </Field>
            {selCompanyId&&(
              <Field label="POS Tipi">
                <div style={{display:'flex',gap:'12px',paddingTop:'4px',paddingBottom:'8px',whiteSpace:'nowrap'}}>
                  {allowedPos.sanal&&<label style={{display:'flex',alignItems:'center',gap:'6px',cursor:'pointer',fontSize:'13px',color:posType==='sanal'?'#4f8ef7':'#94a3b8',fontWeight:posType==='sanal'?700:400}}>
                    <input type="radio" name="posTypeBulk" checked={posType==='sanal'} onChange={()=>{setPosType('sanal');}} style={{accentColor:'#4f8ef7'}}/>
                    Sanal POS
                  </label>}
                  {allowedPos.fiziki&&<label style={{display:'flex',alignItems:'center',gap:'6px',cursor:'pointer',fontSize:'13px',color:posType==='fiziki'?'#f59e0b':'#94a3b8',fontWeight:posType==='fiziki'?700:400}}>
                    <input type="radio" name="posTypeBulk" checked={posType==='fiziki'} onChange={()=>{setPosType('fiziki');setBulkRows(p=>p.map(r=>({...r,installment:1})));}} style={{accentColor:'#f59e0b'}}/>
                    Fiziki POS
                  </label>}
                </div>
              </Field>
            )}
          </div>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px'}}>
              <thead>
                <tr style={{borderBottom:'1px solid rgba(255,255,255,0.1)'}}>
                  {['Tarih','Tutar (₺)','Banka','Taksit','Müş. Oranı %',''].map(h=>(
                    <th key={h} style={{padding:'6px 8px',textAlign:'left',color:'#64748b',fontWeight:600,fontSize:'11px',whiteSpace:'nowrap'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {bulkRows.map((r,i)=>(
                  <tr key={r.id} style={{borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
                    <td style={{padding:'4px 4px'}}><input type="date" value={r.date} onChange={e=>setBulkRow(r.id,'date',e.target.value)} style={inS}/></td>
                    <td style={{padding:'4px 4px'}}><input type="number" min="0" step="0.01" value={r.amount} onChange={e=>setBulkRow(r.id,'amount',e.target.value)} placeholder="10000" style={{...inS,width:'100px'}}/></td>
                    <td style={{padding:'4px 4px'}}>
                      <select value={r.bank||companyBankList[0]||''} onChange={e=>setBulkRow(r.id,'bank',e.target.value)} style={inS}>
                        {companyBankList.map(bn=><option key={bn} value={bn}>{bn}</option>)}
                      </select>
                    </td>
                    <td style={{padding:'4px 4px'}}>
                      <select value={posType==='fiziki'?1:r.installment} onChange={e=>setBulkInstallment(r.id,e.target.value)} style={{...inS,width:'90px'}} disabled={posType==='fiziki'}>
                        {posType==='fiziki'?<option value={1}>Peşin</option>:Array.from({length:12},(_,i)=><option key={i+1} value={i+1}>{i===0?'Peşin':`${i+1} Taksit`}</option>)}
                      </select>
                    </td>
                    <td style={{padding:'4px 4px'}}><input type="number" step="0.1" min="0" max="100" value={r.customerRate} onChange={e=>setBulkRow(r.id,'customerRate',e.target.value)} style={{...inS,width:'70px',color:'#f59e0b'}}/></td>
                    <td style={{padding:'4px 4px'}}>
                      <button onClick={()=>setBulkRows(p=>p.filter(x=>x.id!==r.id))} style={{background:'#ef444422',border:'1px solid #ef444444',borderRadius:'4px',color:'#ef4444',padding:'4px 8px',cursor:'pointer',fontSize:'12px'}}>✕</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <button onClick={()=>setBulkRows(p=>[...p,newBulkRow()])}
            style={{marginTop:'10px',padding:'7px 16px',background:'rgba(79,142,247,0.15)',border:'1px dashed #4f8ef7',borderRadius:'8px',color:'#4f8ef7',cursor:'pointer',fontWeight:600,fontSize:'13px',width:'100%'}}>
            + Satır Ekle
          </button>
          <div style={{marginTop:'8px',color:'#64748b',fontSize:'11px'}}>
            Toplam {bulkRows.filter(r=>parseFloat(r.amount)>0).length} satır / {fmtTL(bulkRows.reduce((s,r)=>s+(parseFloat(r.amount)||0),0))} TL
          </div>
        </div>
      )}
      <div style={{display:'flex',gap:'12px',justifyContent:'flex-end',marginTop:'16px'}}>
        <button onClick={onClose} style={{padding:'10px 20px',borderRadius:'8px',border:'1px solid rgba(255,255,255,0.1)',background:'transparent',color:'#94a3b8',cursor:'pointer',fontWeight:600}}>İptal</button>
        <button onClick={handleSave}
          style={{padding:'10px 20px',borderRadius:'8px',border:'none',background:'#4f8ef7',color:'#fff',cursor:'pointer',fontWeight:700}}>{type==='bulk'?'Tümünü Kaydet':'Kaydet'}</button>
      </div>
    </Modal>
  );
}

/* ── CUSTOMER DETAIL ── */
function CustomerDetail({customer,banks,companies,onBack,onUpdateCustomer,onUpdateKasa}){
  const[tab,setTab]=useState('cari');
  const[addOpen,setAddOpen]=useState(false);
  const[editOpen,setEditOpen]=useState(false);
  const[editingEntry,setEditingEntry]=useState(null);
  const[waOpen,setWaOpen]=useState(false);
  const[exFrom,setExFrom]=useState('');
  const[exTo,setExTo]=useState('');
  const yesterday=(()=>{const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);})();
  const[waDate,setWaDate]=useState(yesterday);
  const[waSending,setWaSending]=useState(false);
  const entries=customer.cariEntries||[];
  const cekimler=entries.filter(e=>e.type==='cekim');
  const odemeler=entries.filter(e=>e.type==='nakit_odeme');
  const totalCekim=cekimler.reduce((s,e)=>s+e.amount,0);
  const totalKom=cekimler.reduce((s,e)=>s+(e.customerComm||0),0);
  const totalOdedi=odemeler.reduce((s,e)=>s+e.amount,0);
  const bakiye=calcBalance(entries,customer.openingBalance||0);
  const handleAddEntry=entry=>{
    const newEntries=Array.isArray(entry)?entry:[entry];
    const current=customer.cariEntries||[];
    const kasaEntries=newEntries.map(e=>{
      if(e.type==='nakit_odeme'){
        return{id:uid(),date:e.date,type:'cikis',amount:e.amount,description:'Ödeme - '+customer.name,refId:e.id,refCustomer:customer.name,auto:true,createdAt:e.createdAt||new Date().toISOString()};
      }
      if(e.type==='nakit_tahsilat'){
        return{id:uid(),date:e.date,type:'giris',amount:e.amount,description:'Nakit Tahsilat - '+customer.name,refId:e.id,refCustomer:customer.name,auto:true,createdAt:e.createdAt||new Date().toISOString()};
      }
      return null;
    }).filter(Boolean);
    onUpdateCustomer({...customer,cariEntries:[...current,...newEntries]},kasaEntries);
  };
  const handleDeleteEntry=id=>{
    const entry=entries.find(e=>e.id===id);
    onUpdateCustomer({...customer,cariEntries:entries.filter(e=>e.id!==id)},null,'delete',entry&&(entry.type==='nakit_odeme'||entry.type==='nakit_tahsilat')?id:null);
    if(entry&&entry.queueId&&entry.source==='whatsapp'){
      fetch(`/api/whatsapp/queue/${entry.queueId}/unassign`,{method:'PATCH',headers:{Authorization:'Bearer '+(localStorage.getItem('zyreos_token')||'')}}).catch(()=>{});
    }
  };
  const handleUpdateEntry=updated=>{
    const arr=Array.isArray(updated)?updated:[updated];
    const kasaUpdates=arr.map(e=>{
      if(e.type==='nakit_odeme'){
        return{refId:e.id,date:e.date,type:'cikis',amount:e.amount,description:'Ödeme - '+customer.name};
      }
      if(e.type==='nakit_tahsilat'){
        return{refId:e.id,date:e.date,type:'giris',amount:e.amount,description:'Nakit Tahsilat - '+customer.name};
      }
      return null;
    }).filter(Boolean);
    onUpdateCustomer({...customer,cariEntries:entries.map(e=>{const u=arr.find(a=>a.id===e.id);return u||e;})},null,kasaUpdates.length?'update':null,null,kasaUpdates);
  };
  const rows=buildCariRows(entries,customer.openingBalance||0);
  const[bdForm,setBdForm]=useState({date:new Date().toISOString().slice(0,10),direction:'azalis',amount:'',description:''});
  const tabs=[['cari','Cari Hesap'],['bilgi','Müşteri Bilgileri'],['ekstre','Ekstre'],['bakiye_duzeltme','Bakiye Düzeltme']];
  return(
    <div>
      <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'20px'}}>
        <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:'6px',background:'none',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'8px',padding:'8px 14px',color:'#94a3b8',cursor:'pointer',fontWeight:600,fontSize:'13px'}}><IcoArrowLeft size={16}/>Geri</button>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
            <h2 style={{fontWeight:800,fontSize:'20px'}}>{customer.name}</h2>
            <Badge color="#4f8ef7">{customer.code}</Badge>
          </div>
          <div style={{color:'#64748b',fontSize:'13px',marginTop:'2px'}}>{customer.phone}</div>
        </div>
        <div style={{marginLeft:'auto',display:'flex',gap:'8px'}}>
          <button onClick={()=>setEditOpen(true)} style={{display:'flex',alignItems:'center',gap:'6px',background:'#1a2035',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'8px',padding:'8px 14px',color:'#94a3b8',cursor:'pointer',fontWeight:600,fontSize:'13px'}}><IcoEdit size={14}/>Düzenle</button>
        </div>
      </div>
      {/* tabs */}
      <div style={{display:'flex',gap:'4px',marginBottom:'20px',borderBottom:'1px solid rgba(255,255,255,0.07)',paddingBottom:'0'}}>
        {tabs.map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)}
            style={{padding:'10px 20px',border:'none',background:'none',cursor:'pointer',fontWeight:700,fontSize:'13px',color:tab===v?'#4f8ef7':'#64748b',borderBottom:tab===v?'2px solid #4f8ef7':'2px solid transparent',marginBottom:'-1px',transition:'color 0.15s'}}>{l}</button>
        ))}
      </div>
      {/* CARI */}
      {tab==='cari'&&(
        <div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:'12px',marginBottom:'20px'}}>
            <MetricCard label="Toplam Çekim Tutarı" value={fmtTL(totalCekim)} color="#4f8ef7"/>
            <MetricCard label="Toplam Komisyon" value={fmtTL(totalKom)} color="#a855f7"/>
            <MetricCard label="Toplam Ödedim" value={fmtTL(totalOdedi)} color="#22c55e"/>
            <MetricCard label={bakiye>=0?'Kalan Bakiye (Borçluyum)':'Kalan Bakiye (Alacaklıyım)'} value={fmtTL(Math.abs(bakiye))} color={bakiye>=0?'#ef4444':'#22c55e'}/>
          </div>
          <Card style={{padding:0,overflow:'hidden'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'16px 20px',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
              <span style={{fontWeight:700}}>Cari Hareketler</span>
              <button onClick={()=>setAddOpen(true)} style={{display:'flex',alignItems:'center',gap:'6px',background:'#4f8ef7',border:'none',borderRadius:'8px',padding:'8px 16px',color:'#fff',cursor:'pointer',fontWeight:700,fontSize:'13px'}}><IcoPlus size={14}/>Kayıt Ekle</button>
              <button onClick={()=>{setWaDate(yesterday);setWaOpen(true);}} style={{display:'flex',alignItems:'center',gap:'6px',background:'#22c55e',border:'none',borderRadius:'8px',padding:'8px 16px',color:'#fff',cursor:'pointer',fontWeight:700,fontSize:'13px',marginLeft:'8px'}}>📤 WA Ekstre</button>
            </div>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
                <thead>
                  <tr style={{borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
                    {['Tarih','Açıklama / Banka / Taksit','Çekim Tutarı','Müşteri Kom. (%)','Müşteriye Nakit','Ödenen Nakit','Koşan Bakiye',''].map(h=>(
                      <th key={h} style={{padding:'10px 12px',textAlign:h===''?'center':'left',color:'#64748b',fontWeight:600,fontSize:'11px',textTransform:'uppercase',whiteSpace:'nowrap'}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {rows.map(e=>{
                    const isCekim=e.type==='cekim';
                    const isDuzeltme=e.type==='bakiye_duzeltme';
                    const isTahsilat=e.type==='nakit_tahsilat';
                    const rIsPos=e.runningBal>0;
                    return(
                      <tr key={e.id} style={{borderBottom:'1px solid rgba(255,255,255,0.04)',background:isDuzeltme?'rgba(245,158,11,0.05)':isTahsilat?'rgba(6,182,212,0.05)':''}}>
                        <td style={{padding:'10px 12px',color:'#94a3b8',whiteSpace:'nowrap'}}>{renderDateCell(e)}</td>
                        <td style={{padding:'10px 12px'}}>
                          <div style={{fontWeight:600}}>{e.description}</div>
                          {isCekim&&<div style={{color:'#64748b',fontSize:'11px',marginTop:'2px'}}>{e.bank} • {e.installment} Taksit</div>}
                          {isDuzeltme&&<div style={{color:'#f59e0b',fontSize:'11px',marginTop:'2px'}}>Bakiye Düzeltme • {e.direction==='azalis'?'Azalış':'Artış'}</div>}
                          {isTahsilat&&<div style={{color:'#06b6d4',fontSize:'11px',marginTop:'2px'}}>Nakit Tahsilat</div>}
                        </td>
                        <td className="tabular-nums" style={{padding:'10px 12px',color:isCekim?'#4f8ef7':'#475569',fontWeight:isCekim?700:400}}>{isCekim?fmtTL(e.amount):'—'}</td>

          </div>
          <Card style={{padding:0,overflow:'hidden'}}>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>

      <AddEntryModal open={addOpen||!!editingEntry} onClose={()=>{setAddOpen(false);setEditingEntry(null);}} onSave={handleAddEntry} onUpdate={handleUpdateEntry} editingEntry={editingEntry||null} customer={customer} banks={banks} companies={companies}/>
      {waOpen&&(()=>{
        const fmtDate=d=>d?d.split('-').reverse().join('.'):'';
        const filteredE=(customer.cariEntries||[]).filter(e=>e.date&&e.date<=waDate);
        let rb=customer.openingBalance||0;
        filteredE.forEach(e=>{if(e.type==='cekim')rb=+(rb+(e.netToCustomer||0)).toFixed(2);else if(e.type==='bakiye_duzeltme')rb=+(rb+(e.direction==='azalis'?-e.amount:e.amount)).toFixed(2);else if(e.type==='nakit_tahsilat')rb=+(rb+(e.amount||0)).toFixed(2);else rb=+(rb-(e.amount||0)).toFixed(2);});
        const balLabel=rb>=0?'Borç':'Alacak';
        const balAbs=Math.abs(rb);
        const preview=`Merhaba ${customer.name}, ${fmtDate(waDate)} itibarıyla bakiyeniz: ${balAbs.toLocaleString('tr-TR',{minimumFractionDigits:2})} TL ${balLabel}.`;
        const handleSendWa=async()=>{
          setWaSending(true);
          try{
            const token=(getAuth()?.token)||'';
            const r=await fetch('/api/whatsapp/send-statement',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify({customerName:customer.name,date:waDate,entries:customer.cariEntries||[],openingBalance:customer.openingBalance||0})});
            const d=await r.json();
            if(!r.ok)throw new Error(d.error||'Hata');
            alert('Ekstre gönderildi!');
            setWaOpen(false);
          }catch(e){alert('Hata: '+e.message);}
          finally{setWaSending(false);}
        };
        return(
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <div style={{background:'#1a2035',borderRadius:'12px',padding:'28px',width:'420px',boxShadow:'0 8px 40px rgba(0,0,0,0.5)'}}>
              <h3 style={{margin:'0 0 20px',fontSize:'16px',fontWeight:700}}>WA Ekstre Gönder</h3>
              <div style={{marginBottom:'14px'}}>
                <label style={{display:'block',fontSize:'12px',color:'#94a3b8',marginBottom:'6px'}}>Bakiye tarihi (bu tarihe kadar olan tüm kayıtlar dahil edilir)</label>
                <input type="date" value={waDate} onChange={e=>setWaDate(e.target.value)} style={{width:'100%',background:'rgba(30,39,64,.8)',border:'1px solid rgba(255,255,255,.15)',borderRadius:'6px',padding:'8px 10px',color:'#e2e8f0',fontSize:'13px',boxSizing:'border-box'}}/>
              </div>
              <div style={{background:'rgba(255,255,255,0.05)',borderRadius:'8px',padding:'12px',marginBottom:'20px',fontSize:'12px',color:'#94a3b8',lineHeight:1.5}}>
                <strong style={{color:'#e2e8f0'}}>Gönderilecek mesaj:</strong><br/>{preview}
              </div>
              <div style={{display:'flex',gap:'10px',justifyContent:'flex-end'}}>
                <button onClick={()=>setWaOpen(false)} style={{background:'none',border:'1px solid rgba(255,255,255,0.15)',borderRadius:'8px',padding:'8px 16px',color:'#94a3b8',cursor:'pointer',fontWeight:600,fontSize:'13px'}}>İptal</button>
                <button onClick={handleSendWa} disabled={waSending} style={{background:'#22c55e',border:'none',borderRadius:'8px',padding:'8px 20px',color:'#fff',cursor:'pointer',fontWeight:700,fontSize:'13px',opacity:waSending?0.6:1}}>
                  {waSending?'Gönderiliyor...':'Gönder'}
                </button>
              </div>
            </div>
          </div>
        );
      })()}
      {tab==='bakiye_duzeltme'&&(()=>{
        const duzeltmeler=entries.filter(e=>e.type==='bakiye_duzeltme').sort((a,b)=>a.date<b.date?1:-1);
        const inS={background:'rgba(30,39,64,.8)',border:'1px solid rgba(255,255,255,.1)',borderRadius:'8px',padding:'8px 12px',color:'#e2e8f0',fontSize:'13px',width:'100%',boxSizing:'border-box'};
        const handleBdSave=()=>{
          const amt=parseFloat(bdForm.amount)||0;
          if(!amt)return;
          const entry={id:uid(),date:bdForm.date,type:'bakiye_duzeltme',description:bdForm.description||'Bakiye Düzeltme',amount:amt,direction:bdForm.direction,createdAt:new Date().toISOString()};
          handleAddEntry(entry);
          setBdForm({date:new Date().toISOString().slice(0,10),direction:'azalis',amount:'',description:''});
        };
        return(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'24px',alignItems:'start'}}>
            <div style={{background:'rgba(30,39,64,.6)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'12px',padding:'20px'}}>
              <h3 style={{fontWeight:700,fontSize:'14px',marginBottom:'16px',color:'#f59e0b'}}>Yeni Bakiye Düzeltme</h3>
              <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
                <div><label style={{fontSize:'12px',color:'#94a3b8',display:'block',marginBottom:'4px'}}>Tarih</label>
                  <input type="date" value={bdForm.date} onChange={e=>setBdForm(p=>({...p,date:e.target.value}))} style={inS}/>
                </div>
                <div><label style={{fontSize:'12px',color:'#94a3b8',display:'block',marginBottom:'4px'}}>İşlem Yönü</label>
                  <select value={bdForm.direction} onChange={e=>setBdForm(p=>({...p,direction:e.target.value}))} style={inS}>
                    <option value="azalis">Azalış — bakiyeyi düşür (müşteri borcu azalır)</option>
                    <option value="artis">Artış — bakiyeyi artır (müşteri borcu artar)</option>
                  </select>
                </div>
                <div><label style={{fontSize:'12px',color:'#94a3b8',display:'block',marginBottom:'4px'}}>Tutar (₺)</label>
                  <input type="number" min="0" step="0.01" value={bdForm.amount} onChange={e=>setBdForm(p=>({...p,amount:e.target.value}))} placeholder="0.00" style={inS}/>
                </div>
                <div><label style={{fontSize:'12px',color:'#94a3b8',display:'block',marginBottom:'4px'}}>Açıklama</label>
                  <input type="text" value={bdForm.description} onChange={e=>setBdForm(p=>({...p,description:e.target.value}))} placeholder="Ör: Küsuratı sıfırlama" style={inS}/>
                </div>
                <div style={{background:'rgba(245,158,11,.07)',border:'1px solid rgba(245,158,11,.2)',borderRadius:'8px',padding:'10px',fontSize:'12px',color:'#fcd34d'}}>
                  Kasa ve kart çekimleri etkilenmez. Yalnızca bakiye ve ekstrede görünür.
                </div>
                <button onClick={handleBdSave} disabled={!parseFloat(bdForm.amount)} style={{background:'#f59e0b',border:'none',borderRadius:'8px',padding:'10px',color:'#000',cursor:'pointer',fontWeight:700,fontSize:'13px',opacity:!parseFloat(bdForm.amount)?0.5:1}}>Kaydet</button>
              </div>
            </div>
            <div>
              <h3 style={{fontWeight:700,fontSize:'14px',marginBottom:'16px',color:'#94a3b8'}}>Geçmiş Düzeltmeler</h3>
              {duzeltmeler.length===0?(
                <div style={{color:'#475569',fontSize:'13px',padding:'20px 0'}}>Henüz bakiye düzeltme kaydı yok.</div>
              ):(
                <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                  {duzeltmeler.map(e=>(
                    <div key={e.id} style={{background:'rgba(30,39,64,.6)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'10px',padding:'12px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <div>
                        <div style={{fontSize:'12px',color:'#94a3b8',marginBottom:'3px'}}>{e.date}</div>
                        <div style={{fontWeight:600,fontSize:'13px'}}>{e.description}</div>
                        <div style={{fontSize:'12px',marginTop:'3px',color:e.direction==='azalis'?'#22c55e':'#ef4444',fontWeight:700}}>
                          {(e.direction==='azalis'?'− ':'+ ')+(+(e.amount||0)).toLocaleString('tr-TR',{minimumFractionDigits:2})+' ₺'}
                        </div>
                      </div>
                      <button onClick={()=>{if(window.confirm('Silinsin mi?'))handleDeleteEntry(e.id);}} style={{background:'none',border:'1px solid rgba(239,68,68,.3)',borderRadius:'6px',padding:'5px 10px',color:'#ef4444',cursor:'pointer',fontSize:'12px',display:'flex',alignItems:'center',gap:'4px'}}><IcoTrash size={12}/>Sil</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        );
      })()}
      <CustomerFormModal open={editOpen} onClose={()=>setEditOpen(false)} initial={customer}
        onSave={updated=>onUpdateCustomer({
          ...updated,
          id:customer.id,
          cariEntries:customer.cariEntries||[]
        })}/>
    </div>
  );
}

/* ── CUSTOMERS PAGE ── */
function CustomersPage({customers,banks,onUpdateCustomers,onUpdateKasa}){
  const[detailId,setDetailId]=useState(null);
  const[addOpen,setAddOpen]=useState(false);
  const[deleteId,setDeleteId]=useState(null);
  const detail=customers.find(c=>c.id===detailId);
  if(detail){
    return(
      <CustomerDetail
        customer={detail}
        banks={banks}
        onBack={()=>setDetailId(null)}
        onUpdateCustomer={(updated,kasaEntries,action,refId,kasaUpdates)=>{
          onUpdateCustomers(customers.map(c=>c.id===updated.id?updated:c));
          if(!onUpdateKasa)return;
          if(kasaEntries&&kasaEntries.length>0)onUpdateKasa(prev=>({...prev,transactions:[...(prev.transactions||[]),...kasaEntries]}));
          if(action==='delete'&&refId)onUpdateKasa(prev=>({...prev,transactions:(prev.transactions||[]).filter(t=>t.refId!==refId)}));
          if(action==='update'&&kasaUpdates&&kasaUpdates.length>0)onUpdateKasa(prev=>({...prev,transactions:(prev.transactions||[]).map(t=>{const u=kasaUpdates.find(k=>k.refId===t.refId);return u?{...t,...u}:t;})}));
        }}
        onUpdateKasa={onUpdateKasa}
      />
    );
  }
  const handleAdd=form=>{
    onUpdateCustomers([...customers,{id:uid(),cariEntries:[],...form}]);
  };
  const handleDelete=id=>{
    onUpdateCustomers(customers.filter(c=>c.id!==id));
  };
  return(
    <div>
      {(()=>{const toplamBakiye=customers.reduce((s,c)=>s+calcBalance(c.cariEntries||[],c.openingBalance||0),0);return(
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px',flexWrap:'wrap',gap:'10px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'16px'}}>
          <h2 style={{fontWeight:700,fontSize:'16px',color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.05em'}}>Müşteriler ({customers.length})</h2>
          <span style={{fontSize:'13px',color:'#64748b'}}>Toplam Bakiye: <span style={{fontWeight:700,color:toplamBakiye>=0?'#22c55e':'#ef4444'}}>{toplamBakiye.toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})} ₺</span></span>
        </div>
        <button onClick={()=>setAddOpen(true)} style={{display:'flex',alignItems:'center',gap:'6px',background:'#4f8ef7',border:'none',borderRadius:'8px',padding:'10px 18px',color:'#fff',cursor:'pointer',fontWeight:700,fontSize:'13px'}}><IcoPlus size={15}/>Yeni Müşteri</button>
      </div>
      );})()}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:'16px'}}>
        {customers.map(c=>{
          const bak=calcBalance(c.cariEntries||[],c.openingBalance||0);
          const cekim=(c.cariEntries||[]).filter(e=>e.type==='cekim').length;
          const isBorc=bak>0;
          return(
            <Card key={c.id} style={{cursor:'pointer',transition:'border-color 0.15s',borderColor:'rgba(255,255,255,0.07)'}} className="hover:border-blue-500/30">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'12px'}}>
                <div onClick={()=>setDetailId(c.id)} style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'}}>
                    <span style={{fontWeight:700,fontSize:'15px'}}>{c.name}</span>
                  </div>
                  <div style={{color:'#64748b',fontSize:'12px'}}>{c.phone}</div>
                </div>
                <div style={{display:'flex',gap:'6px',flexShrink:0}}>
                  <button onClick={()=>handleCopy(c)} title="Kopyala" style={{background:'none',border:'1px solid rgba(79,142,247,0.25)',borderRadius:'6px',padding:'5px',cursor:'pointer',color:'#4f8ef7',display:'flex',alignItems:'center'}}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                  </button>
                  <button onClick={()=>setDeleteId(c.id)} style={{background:'none',border:'1px solid rgba(239,68,68,0.25)',borderRadius:'6px',padding:'5px',cursor:'pointer',color:'#ef4444',display:'flex',alignItems:'center'}}><IcoTrash size={13}/></button>
                </div>
              </div>
              <div onClick={()=>setDetailId(c.id)} style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
                  <Badge color="#f59e0b">%{c.commissionRate} Kom.</Badge>
                  <Badge color="#64748b">{cekim} çekim</Badge>
                </div>
                <div style={{textAlign:'right'}}>
                  <div className="tabular-nums" style={{color:isBorc?'#ef4444':'#22c55e',fontWeight:700,fontSize:'14px'}}>{fmtTL(Math.abs(bak))}</div>
                  <div style={{fontSize:'10px',color:isBorc?'#ef4444':'#22c55e',fontWeight:600}}>{isBorc?'Borçlu':'Alacaklı'}</div>
                </div>
              </div>
            </Card>
          );
        })}
        {customers.length===0&&(
          <div style={{gridColumn:'1/-1',textAlign:'center',padding:'60px',color:'#64748b'}}>
            <div style={{fontSize:'40px',marginBottom:'12px'}}>👥</div>
            <div style={{fontSize:'16px',fontWeight:600,marginBottom:'6px'}}>Henüz müşteri yok</div>
            <div style={{fontSize:'13px'}}>Yeni müşteri eklemek için butona tıklayın</div>
          </div>
        )}
      </div>
      <CustomerFormModal open={addOpen} onClose={()=>setAddOpen(false)} onSave={handleAdd}/>
      <ConfirmModal open={!!deleteId} onClose={()=>setDeleteId(null)} onConfirm={()=>handleDelete(deleteId)} title="Müşteriyi Sil" message="Bu müşteriyi ve tüm cari kayıtlarını silmek istediğinizden emin misiniz? Bu işlem geri alınamaz."/>
    </div>
  );
}
